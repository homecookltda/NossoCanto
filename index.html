<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apartamentos · Painel</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<style>
  :root{
    --bg:#f6f7f9; --card:#ffffff; --ink:#171a21; --muted:#6b7280; --line:#e8eaee;
    --accent:#2563eb; --accent-soft:#eaf1ff; --good:#0f9d58; --bad:#e5484d; --warn:#f59e0b;
    --radius:14px; --shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06);
    --shadow-lg:0 12px 40px rgba(16,24,40,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  input,select,textarea{font:inherit;color:inherit}
  ::selection{background:var(--accent-soft)}

  /* ---------- Login ---------- */
  #login{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(160deg,#eef2f7,#f8fafc)}
  .login-card{background:var(--card);width:min(380px,92vw);padding:34px 30px;border-radius:18px;
              box-shadow:var(--shadow-lg);animation:pop .5s cubic-bezier(.2,.8,.2,1)}
  .login-card h1{font-size:20px;margin:0 0 4px}
  .login-card p{color:var(--muted);margin:0 0 22px;font-size:13px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  .field input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:#fbfcfe;
               transition:.18s}
  .field input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{background:var(--accent);color:#fff;padding:11px 16px;border-radius:10px;font-weight:600;width:100%;
       transition:.18s;box-shadow:0 2px 8px rgba(37,99,235,.25)}
  .btn:hover{filter:brightness(1.05);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:var(--accent-soft);color:var(--accent);box-shadow:none}
  .btn.sm{width:auto;padding:7px 12px;font-size:13px;border-radius:9px}
  .err{color:var(--bad);font-size:12.5px;min-height:16px;margin-top:4px}

  /* ---------- Layout ---------- */
  #app{display:none;min-height:100%}
  header.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
             border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:12px 18px}
  header.top .brand{font-weight:700;letter-spacing:-.2px}
  header.top .brand small{color:var(--muted);font-weight:500;margin-left:6px}
  header.top .spacer{flex:1}
  header.top .who{color:var(--muted);font-size:12.5px}
  .layout{display:grid;grid-template-columns:290px 1fr;gap:18px;padding:18px;align-items:start}
  @media(max-width:980px){.layout{grid-template-columns:1fr}}

  aside.filters{position:sticky;top:70px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
                box-shadow:var(--shadow);padding:16px;max-height:calc(100vh - 90px);overflow:auto}
  aside.filters h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:18px 0 8px}
  aside.filters h3:first-child{margin-top:0}
  .chk{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:8px;transition:.12s;cursor:pointer;user-select:none}
  .chk:hover{background:var(--accent-soft)}
  .chk input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .chk .cnt{margin-left:auto;color:var(--muted);font-size:12px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .mini{padding:8px 10px;border:1px solid var(--line);border-radius:9px;width:100%;background:#fbfcfe}
  .mini:focus{outline:none;border-color:var(--accent)}
  .filclear{margin-top:16px}

  main{display:flex;flex-direction:column;gap:18px;min-width:0}
  .tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:5px;width:fit-content;box-shadow:var(--shadow)}
  .tab{padding:8px 16px;border-radius:9px;color:var(--muted);font-weight:600;transition:.15s}
  .tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
  .panel{display:none;animation:fade .3s}
  .panel.active{display:block}

  /* Stats */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);transition:.2s}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
  .stat .k{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .v{font-size:24px;font-weight:700;margin-top:6px;letter-spacing:-.5px}
  .stat .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .scope-row{display:flex;gap:8px;align-items:center;margin:2px 0 12px;flex-wrap:wrap}
  .pill{padding:6px 12px;border:1px solid var(--line);border-radius:20px;font-size:12.5px;font-weight:600;color:var(--muted);transition:.15s}
  .pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* Map */
  #map{height:70vh;min-height:460px;border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);z-index:1}
  .leaflet-popup-content{margin:12px 14px;font-size:13px}

  /* Table */
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:auto}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{padding:10px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
  th{position:sticky;top:0;background:#fbfcfe;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);cursor:pointer;user-select:none;z-index:2}
  th:hover{color:var(--ink)}
  th .arrow{opacity:.4;font-size:10px}
  tbody tr{transition:background .12s}
  tbody tr:hover{background:var(--accent-soft)}
  tbody tr.inativo{opacity:.5}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
  .tag.n{background:#eef4ff;color:#2563eb}.tag.s{background:#fff1e8;color:#c2410c}
  .tag.ativo{background:#e7f7ee;color:#0f9d58}.tag.inativo{background:#fdecec;color:#e5484d}
  .tag.venda{background:#f0e9ff;color:#7c3aed}.tag.aluguel{background:#e8f6ff;color:#0284c7}
  .badge{background:var(--accent);color:#fff;border-radius:20px;font-size:10px;font-weight:700;padding:1px 7px}
  .rowbtn{padding:4px 9px;border-radius:7px;background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:12px}
  .rowbtn:hover{filter:brightness(.98)}
  .visited-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
  .count-line{color:var(--muted);font-size:12.5px;margin:2px 2px 8px}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(16,24,40,.45);backdrop-filter:blur(3px);z-index:40;
            display:none;align-items:center;justify-content:center;padding:20px}
  .modal-bg.open{display:flex;animation:fade .2s}
  .modal{background:var(--card);width:min(760px,96vw);max-height:92vh;overflow:auto;border-radius:18px;
         box-shadow:var(--shadow-lg);animation:pop .35s cubic-bezier(.2,.8,.2,1)}
  .modal .mhead{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 6px}
  .modal .mhead h2{font-size:17px;margin:0}
  .modal .mhead .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .modal .x{margin-left:auto;font-size:20px;color:var(--muted);padding:2px 8px;border-radius:8px}
  .modal .x:hover{background:var(--line)}
  .mbody{padding:8px 22px 22px}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin:12px 0}
  .gallery img{width:100%;height:96px;object-fit:cover;border-radius:10px;cursor:zoom-in;transition:.2s;background:#eef0f3}
  .gallery img:hover{transform:scale(1.03);box-shadow:var(--shadow)}
  .kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:10px 0}
  .kv .cell{background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .kv .cell .kk{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase}
  .kv .cell .vv{font-weight:600;margin-top:2px}
  .crm{border-top:1px solid var(--line);margin-top:14px;padding-top:16px}
  .crm h3{margin:0 0 12px;font-size:14px}
  .crm .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.crm .grid{grid-template-columns:1fr}}
  .crm label{font-size:11.5px;color:var(--muted);font-weight:600;display:block;margin-bottom:5px}
  .crm input,.crm select,.crm textarea{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:#fbfcfe}
  .crm input:focus,.crm select:focus,.crm textarea:focus{outline:none;border-color:var(--accent)}
  .crm .togs{display:flex;gap:10px;flex-wrap:wrap}
  .tog{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;cursor:pointer;font-weight:600;transition:.15s}
  .tog.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .savebar{display:flex;gap:10px;align-items:center;margin-top:14px}
  .saved{color:var(--good);font-size:12.5px;opacity:0;transition:.3s}
  .saved.show{opacity:1}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .lightbox.open{display:flex}
  .lightbox img{max-width:96vw;max-height:92vh;border-radius:8px}

  .loading{padding:40px;text-align:center;color:var(--muted)}
  .spin{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;
        display:inline-block;animation:spin 1s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
         padding:11px 18px;border-radius:12px;box-shadow:var(--shadow-lg);z-index:70;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}

  /* ---------- botão de filtros + gaveta (mobile) ---------- */
  .menu-btn{display:none}
  .drawer-bg{position:fixed;inset:0;background:rgba(16,24,40,.4);backdrop-filter:blur(2px);z-index:44;display:none}
  .drawer-bg.open{display:block;animation:fade .2s}
  .filters-close{display:none}
  .sortbar{display:none;gap:8px;align-items:center;background:var(--card);border:1px solid var(--line);
           border-radius:12px;padding:8px 10px;box-shadow:var(--shadow)}
  .sortbar select{flex:1;padding:9px 10px;border:1px solid var(--line);border-radius:9px;background:#fbfcfe}
  .sortbar button{padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:#fbfcfe;font-weight:700}

  /* ============================ RESPONSIVO ============================ */
  @media (max-width: 820px){
    header.top{padding:10px 12px;gap:8px}
    header.top .brand{font-size:15px}
    header.top .who{display:none}
    .menu-btn{display:inline-flex;align-items:center;gap:6px}
    .layout{grid-template-columns:1fr;padding:12px;gap:12px}

    /* filtros viram GAVETA lateral deslizante */
    aside.filters{position:fixed;top:0;left:0;height:100dvh;width:86vw;max-width:340px;border-radius:0;
                  max-height:none;transform:translateX(-100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
                  z-index:45;box-shadow:var(--shadow-lg);padding-top:14px}
    aside.filters.open{transform:translateX(0)}
    .filters-close{display:flex;align-items:center;justify-content:space-between;margin:-2px 0 8px}
    .filters-close b{font-size:13px}
    .filters-close .x{font-size:20px;color:var(--muted);padding:2px 8px;border-radius:8px}

    /* inputs a 16px evitam o zoom automatico do iOS */
    input,select,textarea,.mini{font-size:16px}
    .tabs{width:100%}
    .tab{flex:1;text-align:center;padding:10px 8px}

    #map{height:64vh;min-height:360px}

    /* TABELA -> CARTOES */
    .sortbar{display:flex}
    .tablewrap{border:none;background:transparent;box-shadow:none;overflow:visible}
    #tbl thead{display:none}
    #tbl,#tbl tbody,#tbl tr,#tbl td{display:block;width:100%}
    #tbl tr{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
            margin-bottom:12px;padding:8px 6px;animation:fade .2s}
    #tbl tr:hover{background:var(--card)}
    #tbl td{border:none;white-space:normal;display:flex;justify-content:space-between;align-items:center;
            gap:12px;padding:8px 12px;border-bottom:1px solid var(--line)}
    #tbl td:last-child{border-bottom:none}
    #tbl td::before{content:attr(data-label);color:var(--muted);font-size:11px;font-weight:700;
                    text-transform:uppercase;letter-spacing:.4px;flex:0 0 auto}
    #tbl td[data-label="Preço"]{font-size:18px;font-weight:700}
    #tbl td[data-label="Ações"]{justify-content:flex-start;gap:10px}

    /* modal vira folha quase cheia */
    .modal-bg{padding:0;align-items:flex-end}
    .modal{width:100%;max-height:94dvh;border-radius:20px 20px 0 0;animation:slideup .3s cubic-bezier(.2,.8,.2,1)}
    .mhead{padding:16px 16px 4px}
    .mbody{padding:8px 16px 20px}
    .kv{grid-template-columns:1fr 1fr}
    .gallery{grid-template-columns:repeat(auto-fill,minmax(96px,1fr))}
    .gallery img{height:80px}
  }
  @media (max-width: 420px){
    .stats-grid{grid-template-columns:1fr 1fr}
    .kv{grid-template-columns:1fr}
    .crm .grid{grid-template-columns:1fr}
  }
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}

</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <div class="login-card">
    <h1>Painel de Apartamentos</h1>
    <p>Acesso restrito. Entre com seu e-mail e senha.</p>
    <div class="field"><label>E-mail</label><input id="email" type="email" autocomplete="username" placeholder="voce@email.com"></div>
    <div class="field"><label>Senha</label><input id="senha" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn" id="btnLogin">Entrar</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <header class="top">
    <button class="btn ghost sm menu-btn" id="btnFilters">☰ Filtros</button>
    <div class="brand">Apartamentos <small id="totalHint"></small></div>
    <div class="spacer"></div>
    <span class="who" id="who"></span>
    <button class="btn ghost sm" id="btnReload">Atualizar</button>
    <button class="btn ghost sm" id="btnLogout">Sair</button>
  </header>

  <div class="drawer-bg" id="drawerBg"></div>

  <div class="layout">
    <!-- ---------- FILTROS ---------- -->
    <aside class="filters" id="filters">
      <div class="filters-close"><b>Filtros</b><button class="x" id="btnCloseFilters">✕</button></div>
      <h3>Região</h3>
      <label class="chk"><input type="checkbox" class="f-regiao" value="Asa Norte" checked> Asa Norte <span class="cnt" data-cnt="regiao:Asa Norte"></span></label>
      <label class="chk"><input type="checkbox" class="f-regiao" value="Asa Sul" checked> Asa Sul <span class="cnt" data-cnt="regiao:Asa Sul"></span></label>

      <h3>Operação</h3>
      <label class="chk"><input type="checkbox" class="f-tipo" value="Venda" checked> Compra / Venda <span class="cnt" data-cnt="tipo:Venda"></span></label>
      <label class="chk"><input type="checkbox" class="f-tipo" value="Aluguel" checked> Aluguel <span class="cnt" data-cnt="tipo:Aluguel"></span></label>

      <h3>Status</h3>
      <label class="chk"><input type="checkbox" id="f-ativo" checked> Ativos</label>
      <label class="chk"><input type="checkbox" id="f-inativo"> Inativos</label>

      <h3>Anunciado há (no site)</h3>
      <select class="mini" id="f-dias">
        <option value="">Qualquer tempo</option>
        <option value="1">Até 1 dia</option>
        <option value="3">Até 3 dias</option>
        <option value="7">Até 7 dias</option>
        <option value="15">Até 15 dias</option>
        <option value="30">Até 30 dias</option>
        <option value="60">Até 60 dias</option>
        <option value="90">Até 90 dias</option>
      </select>
      <div class="row2" style="margin-top:8px">
        <input class="mini" id="f-dias-min" type="number" min="0" placeholder="mín dias">
        <input class="mini" id="f-dias-max" type="number" min="0" placeholder="máx dias">
      </div>

      <h3>Preço (R$)</h3>
      <div class="row2"><input class="mini" id="f-preco-min" type="number" placeholder="mín"><input class="mini" id="f-preco-max" type="number" placeholder="máx"></div>

      <h3>R$/m²</h3>
      <div class="row2"><input class="mini" id="f-m2-min" type="number" placeholder="mín"><input class="mini" id="f-m2-max" type="number" placeholder="máx"></div>

      <h3>Metragem (m²)</h3>
      <div class="row2"><input class="mini" id="f-area-min" type="number" placeholder="mín"><input class="mini" id="f-area-max" type="number" placeholder="máx"></div>

      <h3>Quartos</h3>
      <div id="f-quartos"></div>
      <h3>Banheiros</h3>
      <div id="f-banheiros"></div>
      <h3>Suítes</h3>
      <div id="f-suites"></div>
      <h3>Vagas</h3>
      <div id="f-vagas"></div>

      <h3>Andar</h3>
      <div id="f-andar"></div>

      <h3>Minhas marcações</h3>
      <label class="chk"><input type="checkbox" id="f-visitado"> Só visitados</label>
      <label class="chk"><input type="checkbox" id="f-contatado"> Só contatados</label>
      <label class="chk"><input type="checkbox" id="f-nota"> Só com nota</label>

      <h3>Exibição</h3>
      <label class="chk"><input type="checkbox" id="f-fotos"> Mostrar fotos na tabela</label>

      <button class="btn ghost sm filclear" id="btnClear">Limpar filtros</button>
      <button class="btn sm filclear menu-btn" id="btnApplyClose" style="width:100%;margin-top:8px">Ver resultados</button>
    </aside>

    <!-- ---------- CONTEÚDO ---------- -->
    <main>
      <div class="tabs">
        <button class="tab active" data-tab="stats">Resumo</button>
        <button class="tab" data-tab="map">Mapa</button>
        <button class="tab" data-tab="table">Tabela</button>
      </div>
      <div class="count-line" id="countLine"></div>

      <!-- RESUMO -->
      <section class="panel active" data-panel="stats">
        <div class="scope-row" id="scopeRow">
          <span style="color:var(--muted);font-weight:600;font-size:12.5px">Escopo:</span>
          <button class="pill active" data-scope="GERAL">Geral</button>
          <button class="pill" data-scope="Asa Norte">Asa Norte</button>
          <button class="pill" data-scope="Asa Sul">Asa Sul</button>
          <select class="mini" id="scopeQuadra" style="width:auto;min-width:130px">
            <option value="">Por quadra…</option>
          </select>
        </div>
        <div class="stats-grid" id="statsGrid"></div>
      </section>

      <!-- MAPA -->
      <section class="panel" data-panel="map">
        <div id="map"></div>
      </section>

      <!-- TABELA -->
      <section class="panel" data-panel="table">
        <div class="sortbar">
          <span style="color:var(--muted);font-weight:700;font-size:12px">Ordenar</span>
          <select id="sortCol"></select>
          <button id="sortDir" title="Inverter ordem">▼</button>
        </div>
        <div class="tablewrap"><table id="tbl">
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table></div>
      </section>
    </main>
  </div>
</div>

<!-- Modal detalhe + CRM -->
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="lightbox" id="lightbox"><img id="lightImg" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================================================

const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4aGd5bGJhanZhdmR2cnRiYnRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjU5NzgsImV4cCI6MjA5ODgwMTk3OH0.UL32kC6UYH4goT532jGVgVVhmDZLpaYMFDWInRadM74";

/* ---------- estado ---------- */
let RAW = [];           // todos os imóveis (view v_dashboard) do usuário logado
let VIEW = [];          // filtrados
let USER = null;
let map, cluster, markersById = {};
let sort = { col:"preco", dir:-1 };
let statScope = "GERAL";

const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmtBRL = v => v==null ? "—" : "R$"+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtBRL2 = v => v==null ? "—" : "R$"+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
const today = new Date();

/* dias desde a publicação NO SITE (data_publicacao) até hoje */
function diasDesdePub(r){
  if(!r.data_publicacao) return null;
  const d = new Date(r.data_publicacao+"T00:00:00");
  return Math.max(0, Math.round((today - d)/86400000));
}
/* extrai o andar (melhor esforço) do título/descrição — o site nem sempre informa */
function andarDe(r){
  const t = ((r.titulo||"")+" "+(r.descricao||"")).toLowerCase();
  if(/t[ée]rreo/.test(t)) return 0;
  if(/cobertura/.test(t)) return 99;
  let m = t.match(/(\d{1,2})\s*[º°o]?\s*(?:andar|pavimento|pav\.)/);
  if(m) return parseInt(m[1]);
  m = t.match(/(?:andar|pavimento)\s*(\d{1,2})/);
  if(m) return parseInt(m[1]);
  return null;
}
function andarLabel(a){ if(a==null)return "—"; if(a===0)return "Térreo"; if(a===99)return "Cobertura"; return a+"º"; }

/* ============================================================================================
   AUTENTICAÇÃO
============================================================================================ */
async function initAuth(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){ USER = session.user; enterApp(); }
}
$("#btnLogin").onclick = doLogin;
$("#senha").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
async function doLogin(){
  const email = $("#email").value.trim(), password = $("#senha").value;
  $("#loginErr").textContent = "";
  if(!email||!password){ $("#loginErr").textContent="Preencha e-mail e senha."; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if(error){ $("#loginErr").textContent = "Falha no login: "+error.message; return; }
  USER = data.user; enterApp();
}
$("#btnLogout").onclick = async ()=>{ await sb.auth.signOut(); location.reload(); };

function enterApp(){
  $("#login").style.display="none";
  $("#app").style.display="block";
  $("#who").textContent = USER?.email || "";
  buildFilterBoxes();
  loadData();
}

/* ============================================================================================
   DADOS
============================================================================================ */
async function loadData(){
  $("#countLine").innerHTML = '<span class="spin"></span> Carregando do banco…';
  // paginação (PostgREST limita ~1000/req)
  let all=[], from=0, size=1000;
  while(true){
    const { data, error } = await sb.from("v_dashboard").select("*").range(from, from+size-1);
    if(error){ $("#countLine").textContent = "Erro: "+error.message; return; }
    all = all.concat(data);
    if(data.length < size) break;
    from += size;
  }
  RAW = all.map(r => ({ ...r, _dias: diasDesdePub(r), _andar: andarDe(r) }));
  // popular quadras no seletor de escopo
  const quadras = [...new Set(RAW.map(r=>r.quadra).filter(Boolean))].sort();
  $("#scopeQuadra").innerHTML = '<option value="">Por quadra…</option>'+quadras.map(q=>`<option value="${q}">${q}</option>`).join("");
  $("#totalHint").textContent = `· ${RAW.length} anúncios`;
  applyFilters();
}
$("#btnReload").onclick = loadData;

/* ============================================================================================
   FILTROS (checkboxes dinâmicos) + aplicação
============================================================================================ */
function buildFilterBoxes(){
  const mk = (host, values, cls)=>{ $(host).innerHTML = values.map(v=>
    `<label class="chk"><input type="checkbox" class="${cls}" value="${v}"> ${v==="4"?"4+":v}</label>`).join(""); };
  mk("#f-quartos", ["1","2","3","4"], "f-quartos");
  mk("#f-banheiros", ["1","2","3","4"], "f-banheiros");
  mk("#f-suites", ["0","1","2","3"], "f-suites");
  mk("#f-vagas", ["0","1","2","3"], "f-vagas");
  $("#f-andar").innerHTML = ["Térreo","1º","2º","3º","4º+","Cobertura"].map(v=>
    `<label class="chk"><input type="checkbox" class="f-andar" value="${v}"> ${v}</label>`).join("");
  // liga todos os inputs de filtro ao applyFilters
  document.addEventListener("input", e=>{ if(e.target.closest("aside.filters")) applyFilters(); });
}
$("#btnClear").onclick = ()=>{
  $$("aside.filters input[type=checkbox]").forEach(c=>{
    c.checked = ["f-ativo"].includes(c.id) || c.classList.contains("f-regiao") || c.classList.contains("f-tipo");
  });
  $$("aside.filters input[type=number]").forEach(i=>i.value="");
  $("#f-dias").value=""; applyFilters();
};

function getChecked(cls){ return $$("."+cls+":checked").map(c=>c.value); }

function applyFilters(){
  const regioes = getChecked("f-regiao");
  const tipos = getChecked("f-tipo");
  const ativo = $("#f-ativo").checked, inativo = $("#f-inativo").checked;
  const diasSel = $("#f-dias").value ? +$("#f-dias").value : null;
  const diasMin = $("#f-dias-min").value!==""? +$("#f-dias-min").value : null;
  const diasMax = $("#f-dias-max").value!==""? +$("#f-dias-max").value : null;
  const pMin=num("#f-preco-min"), pMax=num("#f-preco-max");
  const mMin=num("#f-m2-min"), mMax=num("#f-m2-max");
  const aMin=num("#f-area-min"), aMax=num("#f-area-max");
  const quartos=getChecked("f-quartos"), banh=getChecked("f-banheiros"),
        suites=getChecked("f-suites"), vagas=getChecked("f-vagas"), andares=getChecked("f-andar");
  const soVis=$("#f-visitado").checked, soCont=$("#f-contatado").checked, soNota=$("#f-nota").checked;

  VIEW = RAW.filter(r=>{
    if(regioes.length && !regioes.includes(r.regiao)) return false;
    if(tipos.length && !tipos.includes(r.tipo)) return false;
    if(!(( ativo && r.ativo) || (inativo && !r.ativo))) return false;
    if(diasSel!=null && (r._dias==null || r._dias>diasSel)) return false;
    if(diasMin!=null && (r._dias==null || r._dias<diasMin)) return false;
    if(diasMax!=null && (r._dias==null || r._dias>diasMax)) return false;
    if(pMin!=null && (r.preco==null||r.preco<pMin)) return false;
    if(pMax!=null && (r.preco==null||r.preco>pMax)) return false;
    if(mMin!=null && (r.preco_m2==null||r.preco_m2<mMin)) return false;
    if(mMax!=null && (r.preco_m2==null||r.preco_m2>mMax)) return false;
    if(aMin!=null && (r.metragem_m2==null||r.metragem_m2<aMin)) return false;
    if(aMax!=null && (r.metragem_m2==null||r.metragem_m2>aMax)) return false;
    if(quartos.length && !matchNum(r.quartos, quartos)) return false;
    if(banh.length && !matchNum(r.banheiros, banh)) return false;
    if(suites.length && !matchNum(r.suites, suites)) return false;
    if(vagas.length && !matchNum(r.vagas, vagas)) return false;
    if(andares.length && !matchAndar(r._andar, andares)) return false;
    if(soVis && !r.visitado) return false;
    if(soCont && !r.contatado) return false;
    if(soNota && (r.nota==null)) return false;
    return true;
  });
  renderAll();
}
function num(sel){ const v=$(sel).value; return v===""?null:+v; }
function matchNum(val, arr){ if(val==null) return false;
  return arr.some(a=> a==="4" ? val>=4 : (+a===+val)); }
function matchAndar(a, arr){
  return arr.some(sel=>{
    if(sel==="Térreo") return a===0;
    if(sel==="Cobertura") return a===99;
    if(sel==="4º+") return a!=null && a>=4 && a!==99;
    return a === parseInt(sel);
  });
}

/* ============================================================================================
   RENDER
============================================================================================ */
function renderAll(){
  $("#countLine").innerHTML = `Mostrando <b>${VIEW.length}</b> de ${RAW.length} anúncios`;
  updateCounts();
  renderStats();
  renderTable();
  renderMap();
}
function updateCounts(){
  $$("[data-cnt]").forEach(el=>{
    const [k,v]=el.getAttribute("data-cnt").split(":");
    el.textContent = RAW.filter(r=>r[k]===v).length;
  });
}

/* ---------- RESUMO / estatísticas ---------- */
$$(".pill[data-scope]").forEach(p=>p.onclick=()=>{ statScope=p.dataset.scope;
  $$(".pill").forEach(x=>x.classList.remove("active")); p.classList.add("active");
  $("#scopeQuadra").value=""; renderStats(); });
$("#scopeQuadra").onchange = e=>{ if(e.target.value){ statScope=e.target.value;
  $$(".pill").forEach(x=>x.classList.remove("active")); renderStats(); } };

function renderStats(){
  let set = VIEW;
  if(statScope==="Asa Norte"||statScope==="Asa Sul") set = VIEW.filter(r=>r.regiao===statScope);
  else if(statScope && statScope!=="GERAL") set = VIEW.filter(r=>r.quadra===statScope);
  const card = (k,v,sub)=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div><div class="sub">${sub||""}</div></div>`;
  const agg = (rows, campo)=>{ const a=rows.map(r=>r[campo]).filter(x=>x!=null);
    if(!a.length) return null; const s=a.reduce((x,y)=>x+y,0);
    return { min:Math.min(...a), med:s/a.length, max:Math.max(...a), n:a.length }; };
  const venda = set.filter(r=>r.tipo==="Venda"), alug = set.filter(r=>r.tipo==="Aluguel");
  const vm=agg(venda,"preco_m2"), am=agg(alug,"preco_m2"), vp=agg(venda,"preco"), ap=agg(alug,"preco");
  let h="";
  h+=card("Anúncios no escopo", set.length, statScope);
  h+=card("Venda · R$/m² médio", vm?fmtBRL2(vm.med):"—", vm?`${vm.n} anúncios · ${fmtBRL2(vm.min)}–${fmtBRL2(vm.max)}`:"sem dados");
  h+=card("Aluguel · R$/m² médio", am?fmtBRL2(am.med):"—", am?`${am.n} anúncios · ${fmtBRL2(am.min)}–${fmtBRL2(am.max)}`:"sem dados");
  h+=card("Venda · preço médio", vp?fmtBRL(vp.med):"—", vp?`${fmtBRL(vp.min)} – ${fmtBRL(vp.max)}`:"sem dados");
  h+=card("Aluguel · preço médio", ap?fmtBRL(ap.med):"—", ap?`${fmtBRL(ap.min)} – ${fmtBRL(ap.max)}`:"sem dados");
  h+=card("Visitados / Contatados", set.filter(r=>r.visitado).length+" / "+set.filter(r=>r.contatado).length, "nas suas marcações");
  $("#statsGrid").innerHTML = h;
}

/* ---------- TABELA ---------- */
const COLS = [
  {k:"preco", t:"Preço", fmt:r=>fmtBRL(r.preco)},
  {k:"tipo", t:"Operação", fmt:r=>`<span class="tag ${r.tipo==='Venda'?'venda':'aluguel'}">${r.tipo}</span>`},
  {k:"regiao", t:"Asa", fmt:r=>`<span class="tag ${r.regiao==='Asa Norte'?'n':'s'}">${r.regiao==='Asa Norte'?'Norte':'Sul'}</span>`},
  {k:"quadra", t:"Quadra", fmt:r=>r.localizacao_exata||r.quadra||"—"},
  {k:"quartos", t:"Qtos", fmt:r=>r.quartos??"—"},
  {k:"banheiros", t:"Banh", fmt:r=>r.banheiros??"—"},
  {k:"suites", t:"Suíte", fmt:r=>r.suites??"—"},
  {k:"vagas", t:"Vagas", fmt:r=>r.vagas??"—"},
  {k:"metragem_m2", t:"m²", fmt:r=>r.metragem_m2??"—"},
  {k:"preco_m2", t:"R$/m²", fmt:r=>fmtBRL2(r.preco_m2)},
  {k:"_andar", t:"Andar", fmt:r=>andarLabel(r._andar)},
  {k:"_dias", t:"Dias no site", fmt:r=>r._dias??"—"},
  {k:"ativo", t:"Ativo", fmt:r=>`<span class="tag ${r.ativo?'ativo':'inativo'}">${r.ativo?'S':'N'}</span>`},
  {k:"nota", t:"Nota", fmt:r=>r.nota!=null?`<span class="badge">${r.nota}</span>`:"—"},
  {k:"link", t:"Link", fmt:r=>r.link?`<a href="${r.link}" target="_blank" rel="noopener">abrir ↗</a>`:"—", nosort:true},
];
function renderTable(){
  buildSortSelect();
  $("#thead").innerHTML = COLS.map(c=>{
    const arr = sort.col===c.k ? (sort.dir>0?"▲":"▼") : "↕";
    return `<th data-col="${c.k}" ${c.nosort?'style="cursor:default"':''}>${c.t} <span class="arrow">${c.nosort?'':arr}</span></th>`;
  }).join("") + "<th>Ações</th>";
  $$("#thead th[data-col]").forEach(th=>{ const c=th.dataset.col;
    if(COLS.find(x=>x.k===c)?.nosort) return;
    th.onclick=()=>{ if(sort.col===c) sort.dir*=-1; else {sort.col=c;sort.dir=-1;} renderTable(); };
  });
  const rows = [...VIEW].sort((a,b)=>{
    let x=a[sort.col], y=b[sort.col];
    if(x==null) return 1; if(y==null) return -1;
    if(typeof x==="string") return x.localeCompare(y)*sort.dir;
    return (x-y)*sort.dir;
  });
  const showFotos = $("#f-fotos").checked;
  $("#tbody").innerHTML = rows.map(r=>{
    const foto = (showFotos && r.imagens && r.imagens.length)
      ? `<br><img src="${r.imagens[0]}" style="height:44px;border-radius:6px;margin-top:4px" loading="lazy">` : "";
    const dot = r.visitado?'<span class="visited-dot" style="background:var(--good)"></span>':(r.contatado?'<span class="visited-dot" style="background:var(--warn)"></span>':'');
    return `<tr class="${r.ativo?'':'inativo'}" data-id="${r.id}">`+
      COLS.map(c=>`<td data-label="${c.t}">${c.k==='preco'?dot:''}${c.fmt(r)}${c.k==='quadra'?foto:''}</td>`).join("")+
      `<td data-label="Ações"><button class="rowbtn" data-open="${r.id}">detalhes</button> <button class="rowbtn" data-map="${r.id}">mapa</button></td></tr>`;
  }).join("") || `<tr><td colspan="${COLS.length+1}" class="loading">Nenhum anúncio com esses filtros.</td></tr>`;
  $$("#tbody [data-open]").forEach(b=>b.onclick=()=>openModal(b.dataset.open));
  $$("#tbody [data-map]").forEach(b=>b.onclick=()=>focusPin(b.dataset.map));
}
/* seletor de ordenação (usado no mobile, onde não há cabeçalho clicável) */
function buildSortSelect(){
  const sel=$("#sortCol");
  if(sel.options.length===0){
    sel.innerHTML = COLS.filter(c=>!c.nosort).map(c=>`<option value="${c.k}">${c.t}</option>`).join("");
    sel.onchange=()=>{ sort.col=sel.value; renderTable(); };
    $("#sortDir").onclick=()=>{ sort.dir*=-1; renderTable(); };
  }
  sel.value=sort.col;
  $("#sortDir").textContent = sort.dir>0?"▲":"▼";
}

/* ---------- MAPA ---------- */
function initMap(){
  map = L.map("map",{scrollWheelZoom:true}).setView([-15.79,-47.88], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { maxZoom:19, attribution:'© OpenStreetMap' }).addTo(map);
  cluster = L.markerClusterGroup({ spiderfyOnMaxZoom:true, showCoverageOnHover:false, maxClusterRadius:38 });
  map.addLayer(cluster);
}
function jitter(id){ // espalha pins que compartilham a coord da quadra
  let h=0; for(const ch of String(id)) h=(h*31+ch.charCodeAt(0))>>>0;
  return [ ((h%1000)/1000-0.5)*0.0016, (((h>>10)%1000)/1000-0.5)*0.0016 ];
}
function renderMap(){
  if(!map) initMap();
  cluster.clearLayers(); markersById={};
  const pts=[];
  VIEW.forEach(r=>{
    if(r.latitude==null||r.longitude==null) return;
    const [dy,dx]=jitter(r.id);
    const lat=r.latitude+dy, lng=r.longitude+dx;
    const color = r.tipo==="Venda" ? "#7c3aed" : "#0284c7";
    const m = L.circleMarker([lat,lng], {radius:7,color:"#fff",weight:2,fillColor:color,fillOpacity:.95});
    m.bindPopup(`<b>${fmtBRL(r.preco)}</b> · ${r.tipo}<br>${r.localizacao_exata||r.quadra||""}<br>
      ${r.quartos??"?"}q · ${r.banheiros??"?"}banh · ${r.metragem_m2??"?"}m²<br>
      <a href="#" onclick="openModal('${r.id}');return false;">ver detalhes</a>`);
    m._base=7;
    cluster.addLayer(m); markersById[r.id]=m; pts.push([lat,lng]);
  });
  if(pts.length){ try{ map.fitBounds(pts,{padding:[30,30],maxZoom:15}); }catch(e){} }
}
function focusPin(id){
  $$(".tab").forEach(t=>t.classList.remove("active")); $('.tab[data-tab="map"]').classList.add("active");
  $$(".panel").forEach(p=>p.classList.remove("active")); $('.panel[data-panel="map"]').classList.add("active");
  setTimeout(()=>{ map.invalidateSize();
    const m=markersById[id]; if(!m) return;
    cluster.zoomToShowLayer(m, ()=>{ m.setStyle({radius:14,weight:3}); m.openPopup();
      map.setView(m.getLatLng(), 16);
      setTimeout(()=>m.setStyle({radius:m._base,weight:2}), 2500); });
  },80);
}

/* ---------- MODAL detalhe + CRM ---------- */
async function openModal(id){
  const r = RAW.find(x=>x.id===id); if(!r) return;
  const fotos = (r.imagens||[]).map(u=>`<img src="${u}" loading="lazy" onclick="lightbox('${u}')">`).join("");
  const cell=(k,v)=>`<div class="cell"><div class="kk">${k}</div><div class="vv">${v}</div></div>`;
  $("#modal").innerHTML = `
    <div class="mhead">
      <div>
        <h2>${fmtBRL(r.preco)} · ${r.tipo}</h2>
        <div class="sub">${r.localizacao_exata||r.quadra||""} · ${r.regiao||""} ${r.link?`· <a href="${r.link}" target="_blank" rel="noopener">abrir anúncio ↗</a>`:""}</div>
      </div>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      ${fotos?`<div class="gallery">${fotos}</div>`:""}
      <div class="kv">
        ${cell("Quartos", r.quartos??"—")}${cell("Banheiros", r.banheiros??"—")}
        ${cell("Suítes", r.suites??"—")}${cell("Vagas", r.vagas??"—")}
        ${cell("Metragem", (r.metragem_m2??"—")+" m²")}${cell("Área útil", (r.area_util??"—")+" m²")}
        ${cell("R$/m²", fmtBRL2(r.preco_m2))}${cell("Condomínio", fmtBRL(r.condominio))}
        ${cell("Andar", andarLabel(r._andar))}${cell("Idade", (r.idade_anos??"—")+" anos")}
        ${cell("Publicado há", (r._dias??"—")+" dias")}${cell("Visualizações", r.visualizacoes??"—")}
        ${cell("Ativo", r.ativo?"Sim":"Não")}${cell("CRECI", r.creci??"—")}
      </div>
      ${r.descricao?`<div class="cell" style="margin-top:10px"><div class="kk">Descrição</div><div style="margin-top:4px;white-space:pre-wrap">${escapeHtml(r.descricao)}</div></div>`:""}

      <div class="crm">
        <h3>Minhas anotações</h3>
        <div class="togs" style="margin-bottom:12px">
          <div class="tog ${r.visitado?'on':''}" id="togVis">✔ Visitado ${r.data_visita?`· ${r.data_visita}`:""}</div>
          <div class="tog ${r.contatado?'on':''}" id="togCont">☎ Contatado ${r.data_contato?`· ${r.data_contato}`:""}</div>
        </div>
        <div class="grid">
          <div><label>Nota (0–10)</label><input type="number" id="c-nota" min="0" max="10" value="${r.nota??""}"></div>
          <div><label>Tipo de contato</label><select id="c-tipo">
            ${["","Corretor","Proprietário","Imobiliária","Outro"].map(o=>`<option ${r.contato_tipo===o?"selected":""}>${o}</option>`).join("")}
          </select></div>
          <div><label>Minha proposta (R$)</label><input type="number" id="c-prop" value="${r.proposta??""}"></div>
          <div><label>Valor que eles fazem (R$)</label><input type="number" id="c-contra" value="${r.contraproposta??""}"></div>
          <div><label>Nome do contato</label><input id="c-nome" value="${r.contato_nome??""}"></div>
          <div><label>WhatsApp</label><input id="c-whats" value="${r.contato_whats??""}"></div>
        </div>
        <div style="margin-top:12px"><label>Comentários</label><textarea id="c-com" rows="3">${r.comentarios??""}</textarea></div>
        <div class="savebar">
          <button class="btn sm" id="btnSaveCrm">Salvar anotações</button>
          <span class="saved" id="savedMsg">✓ salvo</span>
        </div>
      </div>
    </div>`;
  // toggles
  let visited=!!r.visitado, contacted=!!r.contatado;
  $("#togVis").onclick=()=>{ visited=!visited; $("#togVis").classList.toggle("on",visited); };
  $("#togCont").onclick=()=>{ contacted=!contacted; $("#togCont").classList.toggle("on",contacted); };
  $("#btnSaveCrm").onclick=()=>saveCrm(r, ()=>visited, ()=>contacted);
  $("#modalBg").classList.add("open");
}
function closeModal(){ $("#modalBg").classList.remove("open"); }
$("#modalBg").onclick=e=>{ if(e.target.id==="modalBg") closeModal(); };
function lightbox(u){ $("#lightImg").src=u; $("#lightbox").classList.add("open"); }
$("#lightbox").onclick=()=>$("#lightbox").classList.remove("open");
function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function saveCrm(r, getVis, getCont){
  const todayISO = new Date().toISOString().slice(0,10);
  const wasVis=!!r.visitado, wasCont=!!r.contatado, vis=getVis(), cont=getCont();
  const payload = {
    imovel_id: r.id, user_id: USER.id,
    visitado: vis, contatado: cont,
    data_visita: vis ? (r.data_visita || todayISO) : null,      // preenche a data automaticamente
    data_contato: cont ? (r.data_contato || todayISO) : null,
    nota: valOrNull("#c-nota", true), proposta: valOrNull("#c-prop"),
    contraproposta: valOrNull("#c-contra"),
    contato_nome: $("#c-nome").value||null, contato_whats: $("#c-whats").value||null,
    contato_tipo: $("#c-tipo").value||null, comentarios: $("#c-com").value||null,
    atualizado_em: new Date().toISOString()
  };
  const { error } = await sb.from("crm").upsert(payload, { onConflict:"imovel_id" });
  if(error){ toast("Erro ao salvar: "+error.message); return; }
  Object.assign(r, payload);              // atualiza em memória
  $("#savedMsg").classList.add("show"); setTimeout(()=>$("#savedMsg").classList.remove("show"),1500);
  toast("Anotações salvas");
  renderAll();
}
function valOrNull(sel, int){ const v=$(sel).value; if(v==="")return null; return int?parseInt(v):parseFloat(v); }

/* ---------- Gaveta de filtros (mobile) ---------- */
function openDrawer(){ $("#filters").classList.add("open"); $("#drawerBg").classList.add("open");
  document.body.style.overflow="hidden"; }
function closeDrawer(){ $("#filters").classList.remove("open"); $("#drawerBg").classList.remove("open");
  document.body.style.overflow=""; }
$("#btnFilters").onclick = openDrawer;
$("#btnCloseFilters").onclick = closeDrawer;
$("#btnApplyClose").onclick = closeDrawer;
$("#drawerBg").onclick = closeDrawer;

/* ---------- Mapa se ajusta ao girar/redimensionar a tela ---------- */
let rz; window.addEventListener("resize", ()=>{ clearTimeout(rz); rz=setTimeout(()=>{
  if(window.innerWidth>820) closeDrawer();
  if(map && $('.panel[data-panel="map"]').classList.contains("active")) map.invalidateSize();
}, 200); });

/* ---------- Tabs / toast ---------- */
$$(".tab").forEach(t=>t.onclick=()=>{
  $$(".tab").forEach(x=>x.classList.remove("active")); t.classList.add("active");
  $$(".panel").forEach(p=>p.classList.remove("active"));
  $(`.panel[data-panel="${t.dataset.tab}"]`).classList.add("active");
  if(t.dataset.tab==="map"){ setTimeout(()=>{ if(!map) initMap(); map.invalidateSize(); renderMap(); },60); }
});
let toastT; function toast(m){ const el=$("#toast"); el.textContent=m; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),2200); }

/* ---------- start ---------- */
initAuth();
</script>
