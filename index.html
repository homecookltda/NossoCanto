<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nossa Casa · Painel de Apartamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root {
  /* ---- Neutros (papel quente) ---- */
  --bg: #f6f5f1;            /* fundo da aplicação */
  --surface-card: #ffffff;  /* cartões, painéis */
  --surface-inset: #fafaf7; /* inputs, células kv, thead */
  --ink: #21252b;           /* texto principal */
  --ink-2: #4b5158;         /* texto secundário */
  --muted: #6e747b;         /* rótulos, legendas */
  --line: #e7e4dd;          /* bordas padrão */
  --line-strong: #d5d1c7;   /* bordas de foco leve / divisores fortes */

  /* ---- Marca ---- */
  --accent: #2f6b4f;        /* verde Nossa Casa — ações, foco, seleção */
  --accent-ink: #24543e;    /* hover/pressed do accent */
  --accent-soft: #e8f1ec;   /* fundos de seleção, hover de linha */
  --accent-ring: rgba(47, 107, 79, 0.22); /* anel de foco */
  --on-accent: #ffffff;

  /* ---- Semânticas de domínio ---- */
  --venda: #6b4ec9;         /* operação Venda (mapa + tags) */
  --venda-soft: #efeafa;
  --aluguel: #0e7490;       /* operação Aluguel (mapa + tags) */
  --aluguel-soft: #e3f2f6;
  --norte: #2563a8;         /* Asa Norte */
  --norte-soft: #e8f0f9;
  --sul: #b45309;           /* Asa Sul */
  --sul-soft: #fdf0e3;

  /* ---- Estado ---- */
  --good: #2e7d4f;
  --good-soft: #e7f4ec;
  --warn: #b45309;
  --warn-soft: #fdf0e3;
  --bad: #c2413b;
  --bad-soft: #fbe9e8;

  /* ---- Aliases semânticos ---- */
  --text-body: var(--ink);
  --text-secondary: var(--ink-2);
  --text-label: var(--muted);
  --border-input: var(--line);
  --border-input-focus: var(--accent);
  --surface-hover: var(--accent-soft);
}

:root {
  --font-sans: "Figtree", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

  /* Escala */
  --text-xs: 11px;    /* rótulos uppercase, contadores */
  --text-sm: 12.5px;  /* legendas, metadados */
  --text-base: 14px;  /* corpo padrão da UI */
  --text-md: 15px;    /* corpo destacado, células principais */
  --text-lg: 17px;    /* títulos de modal/seção */
  --text-xl: 20px;    /* título de página */
  --text-num: 22px;   /* números de destaque (stats) */
  --text-display: 28px; /* preço em destaque */

  /* Pesos */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;

  --leading-tight: 1.2;
  --leading-normal: 1.5;

  /* Rótulo uppercase padrão (filtros, thead, stats) */
  --label-tracking: 0.06em;
}

:root {
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* Raios (herdados do painel original) */
  --radius-card: 14px;
  --radius-modal: 18px;
  --radius-input: 10px;
  --radius-btn: 10px;
  --radius-sm: 8px;
  --radius-pill: 999px;

  /* Alvos de toque */
  --hit-min: 36px;   /* desktop denso */
  --hit-touch: 44px; /* mobile */
}

:root {
  --shadow-card: 0 1px 2px rgba(24, 30, 26, 0.04), 0 8px 24px rgba(24, 30, 26, 0.06);
  --shadow-pop: 0 12px 40px rgba(24, 30, 26, 0.16);
  --shadow-btn: 0 2px 8px rgba(47, 107, 79, 0.25);
  --focus-ring: 0 0 0 3px var(--accent-ring);

  --ease-spring: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */
  --dur-fast: 0.15s; /* @kind other */
  --dur-base: 0.2s; /* @kind other */
  --dur-slow: 0.3s; /* @kind other */

  --backdrop: rgba(24, 30, 26, 0.45);
}




*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:var(--text-base);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
#root,.shell{height:100%}
.shell{display:flex;flex-direction:column}

/* ---------- header ---------- */
header.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:10px 18px;flex:0 0 auto}
header.top .brand{font-weight:800;letter-spacing:-.01em;font-size:16px}
header.top .brand small{color:var(--muted);font-weight:500;margin-left:4px;font-size:12.5px;font-variant-numeric:tabular-nums}
header.top .spacer{flex:1}
header.top .who{color:var(--muted);font-size:var(--text-sm)}
.menuBtn{display:none;align-items:center;gap:6px;font:inherit;font-weight:600;font-size:13px;padding:7px 12px;
  border:1px solid var(--line);border-radius:9px;background:var(--surface-card);color:var(--ink);cursor:pointer}

/* ---------- layout: filtros SEMPRE visíveis ---------- */
.layout{display:grid;grid-template-columns:288px 1fr;gap:0;flex:1;min-height:0}
aside.filters{background:var(--surface-card);border-right:1px solid var(--line);overflow-y:auto;padding:14px 16px 20px;min-height:0}
.fTop{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:4px}
.fTop b{font-size:14px;display:flex;align-items:center;gap:7px}
.fTop .fsecReset{margin-left:auto}
.fsec{padding:10px 0 4px}
.fsecHead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fsecHead h3{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--label-tracking);
  color:var(--muted);margin:0;font-weight:700;display:flex;align-items:center;gap:6px}
.activeDot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block}
.fsecReset{border:none;background:none;color:var(--accent);font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:2px 4px;border-radius:6px}
.fsecReset:hover{background:var(--accent-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.numGroup{display:flex;gap:6px}
.numBtn{flex:1;padding:7px 0;border:1px solid var(--line);border-radius:9px;background:var(--surface-inset);
  font:inherit;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all var(--dur-fast) ease}
.numBtn:hover{border-color:var(--line-strong)}
.numBtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow-btn)}
.fApply{margin-top:14px}
.quadraList{max-height:230px;overflow-y:auto;padding-right:2px}

/* ---------- conteúdo ---------- */
main{display:flex;flex-direction:column;min-width:0;min-height:0;padding:12px 16px 16px;gap:10px}
.chipsBar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:0 0 auto}
.countLine{color:var(--muted);font-size:var(--text-sm)}
.countLine b{color:var(--ink)}

/* topo fixo (chips + KPIs) e area rolavel apenas da tabela */
.topFixed{flex:0 0 auto;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.listCol{display:flex;flex-direction:column;min-height:0;gap:8px;flex:1}
.sortRow{display:flex;gap:8px;align-items:center;flex:0 0 auto}
.dirBtn{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface-card);
  font:inherit;font-weight:700;cursor:pointer;color:var(--ink-2)}
.dirBtn:hover{background:var(--surface-inset)}
.list{overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:8px;padding-right:2px;padding-bottom:4px}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--surface-card);
  border:1px solid var(--line);border-radius:var(--radius-card)}

/* ---------- tabela condensada (sem scroll horizontal) ---------- */
.listCol{overflow:hidden}
.listTable{width:100%;height:100%;border-collapse:collapse;background:var(--surface-card);border:1px solid var(--line);
  border-radius:var(--radius-card);table-layout:fixed;display:flex;flex-direction:column;min-height:0}
.listTable thead,.listTable tbody{display:block;width:100%}
.listTable tr{display:flex;align-items:center;width:100%}
.listTable thead tr{border-bottom:1px solid var(--line);background:var(--surface-inset)}
.listTable th{flex:1 1 0;min-width:0;text-align:left;padding:9px 10px;font-size:10.5px;text-transform:uppercase;
  letter-spacing:var(--label-tracking);color:var(--muted);font-weight:700;cursor:default;user-select:none}
.listTable th:first-child{flex:2 1 0}
.listTable th:nth-child(2){flex:.85 1 0}
.listTable th:nth-child(3){flex:.55 1 0}
.listTable th:nth-child(4){flex:1.7 1 0}
.listTable th.sortable{cursor:pointer}
.listTable th.sortable:hover{color:var(--ink)}
.listTable th .arrow{opacity:.5;font-size:9px;margin-left:3px}
.listTable tbody{overflow-y:auto;flex:1;min-height:0}
.listTable td{flex:1 1 0;min-width:0;padding:10px;border-bottom:1px solid var(--line);vertical-align:middle;overflow:hidden}
.listTable td:first-child{flex:2 1 0}
.listTable td:nth-child(2){flex:.85 1 0}
.listTable td:nth-child(3){flex:.55 1 0}
.listTable td:nth-child(4){flex:1.7 1 0}
.listTable tbody tr{cursor:pointer;transition:background var(--dur-fast) ease}
.listTable tbody tr:nth-child(even){background:var(--surface-inset)}
.listTable tbody tr:hover{background:var(--accent-soft)}
.listTable tbody tr.inativo{opacity:.55}
.listTable tbody tr:last-child td{border-bottom:none}
.tPrimary{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tPreco{font-weight:700;font-size:14.5px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.tDot{width:7px;height:7px;border-radius:50%;flex:0 0 auto}
.tSub{margin-top:3px;font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tSub b{color:var(--ink);font-weight:600}
.tNum{font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink-2);white-space:nowrap}
.tActions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tBtn{padding:5px 9px;border-radius:7px;border:1px solid var(--line);background:var(--surface-inset);
  font:inherit;font-size:11.5px;font-weight:600;color:var(--accent-ink);cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;line-height:1.3}
.tBtn:hover{background:var(--accent-soft);border-color:var(--accent);text-decoration:none}
.tEmpty{padding:40px;text-align:center;color:var(--muted);width:100%}
@media (max-width:560px){
  .listTable th:nth-child(3),.listTable td:nth-child(3){display:none} /* esconde "Dias" no menor breakpoint */
  .listTable th:first-child,.listTable td:first-child{flex:1.6 1 0}
}

/* ---------- resumo (KPIs sempre visíveis, no topo) ---------- */
.statsWrap{display:flex;flex-direction:column;gap:12px}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}

/* ---------- modal ---------- */
.modalBg{position:fixed;inset:0;background:var(--backdrop);backdrop-filter:blur(3px);z-index:40;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
.modal{background:var(--surface-card);width:min(720px,96vw);max-height:92vh;overflow:auto;border-radius:var(--radius-modal);
  box-shadow:var(--shadow-pop);animation:pop .35s var(--ease-spring)}
.mhead{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 6px}
.mhead h2{font-size:20px;margin:0;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.mhead .sub{color:var(--muted);font-size:13px;margin-top:3px}
.xBtn{margin-left:auto;font-size:18px;color:var(--muted);padding:2px 9px;border-radius:8px;border:none;background:none;cursor:pointer;font-family:inherit}
.xBtn:hover{background:var(--line)}
.mbody{padding:8px 22px 22px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:10px 0}
.cell{background:var(--surface-inset);border:1px solid var(--line);border-radius:var(--radius-input);padding:9px 11px}
.cell .kk{color:var(--muted);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:var(--label-tracking)}
.cell .vv{font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.descCell{margin-top:10px}
.descTxt{margin-top:4px;white-space:pre-wrap;font-size:13.5px;color:var(--ink-2)}
.crm{border-top:1px solid var(--line);margin-top:14px;padding-top:16px}
.crm h3{margin:0 0 12px;font-size:14px}
.togs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.crmGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.areaLbl{display:block;margin-top:12px;font-size:var(--text-xs);color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:var(--label-tracking)}
.areaLbl textarea{width:100%;margin-top:6px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius-input);
  background:var(--surface-inset);font:inherit;font-size:14px;color:var(--ink);text-transform:none;letter-spacing:normal;resize:vertical}
.areaLbl textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus-ring);background:#fff}
.savebar{display:flex;gap:10px;align-items:center;margin-top:14px}
.savedMsg{color:var(--good);font-size:12.5px;opacity:0;transition:opacity var(--dur-slow)}
.savedMsg.show{opacity:1}

/* ---------- toast / anims ---------- */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:12px;box-shadow:var(--shadow-pop);z-index:70;opacity:0;transition:opacity var(--dur-slow);pointer-events:none}
.toast.show{opacity:1}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.drawerBg{display:none}
.drawerOnly{display:none}

/* ============================ ANÁLISES / AGENDA (adições) ============================ */
.tabsBar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
.anBlock { background:var(--surface-card); border:1px solid var(--line); border-radius:var(--radius-card, 16px);
  box-shadow:var(--shadow-card); padding:16px; margin-bottom:16px; }
.anBlock > h3 { margin:0 0 4px; font-size:15px; }
.anBlock > .anHint { color:var(--muted); font-size:12.5px; margin:0 0 12px; }
.anGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.miniStat { background:var(--surface-inset); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
.miniStat .ms-k { color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.02em; }
.miniStat .ms-v { font-size:17px; font-weight:700; margin-top:3px; font-variant-numeric:tabular-nums; }
.miniStat .ms-s { color:var(--muted); font-size:11.5px; margin-top:2px; }
.miniStat.hl { background:var(--accent-soft); border-color:var(--accent); }

/* selo de posição no ranking */
.rankPos { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px;
  padding:0 7px; border-radius:8px; background:var(--surface-inset); border:1px solid var(--line);
  font-weight:700; font-variant-numeric:tabular-nums; font-size:12.5px; }
.rankPos.top { background:var(--accent); color:#fff; border-color:var(--accent); }

.rankTable { width:100%; border-collapse:collapse; font-size:13.5px; }
.rankTable th, .rankTable td { padding:9px 10px; border-bottom:1px solid var(--line); text-align:left; }
.rankTable th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.02em; }
.rankTable td.num, .rankTable th.num { text-align:right; font-variant-numeric:tabular-nums; }
.rankTable tr.selRow td { background:var(--accent-soft); }
.rankTable tr.clickRow { cursor:pointer; }
.rankTable tr.clickRow:hover td { background:var(--surface-hover); }

/* info / "como ler" */
.infoTip { position:relative; display:inline-flex; }
.infoDot { width:18px; height:18px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface-inset);
  color:var(--muted); font-size:11px; font-weight:800; display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; font-style:italic; font-family:Georgia,serif; }
.infoDot:hover { border-color:var(--accent); color:var(--accent); }
.infoBox { position:absolute; z-index:40; top:24px; left:0; width:min(320px,80vw); background:var(--surface-card);
  border:1px solid var(--line-strong); border-radius:12px; box-shadow:var(--shadow-pop, 0 12px 30px rgba(0,0,0,.16));
  padding:12px 13px; font-size:12.5px; color:var(--ink-2); line-height:1.5; }
.infoBox b { color:var(--ink); }

.chartHead { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.chartHead .ch-title { font-weight:700; font-size:13.5px; }
.chartWrap svg { width:100%; height:auto; display:block; }
.axisLbl { fill:var(--muted); font-size:10.5px; }
.barLbl { fill:var(--ink-2); font-size:11px; }
.barVal { fill:var(--ink); font-size:11px; font-weight:700; }

/* leitura textual da análise */
.verdict { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px;
  font-weight:700; font-size:12.5px; }
.verdict.caro { background:var(--bad-soft); color:var(--bad); }
.verdict.barato { background:var(--good-soft); color:var(--good); }
.verdict.media { background:var(--surface-inset); color:var(--ink-2); border:1px solid var(--line); }
.readOut { background:var(--surface-inset); border:1px solid var(--line); border-left:3px solid var(--accent);
  border-radius:10px; padding:11px 13px; font-size:13px; line-height:1.6; color:var(--ink-2); }
.readOut b { color:var(--ink); }
.readOut + .readOut { margin-top:8px; }

/* barra de posição min–média–máx */
.posTrack { position:relative; height:44px; margin:6px 0 2px; }
.posLine { position:absolute; top:22px; left:0; right:0; height:4px; border-radius:3px;
  background:linear-gradient(90deg,var(--good-soft),var(--surface-inset),var(--bad-soft)); }
.posTick { position:absolute; top:14px; width:2px; height:20px; background:var(--line-strong); }
.posTickLbl { position:absolute; top:0; transform:translateX(-50%); font-size:10.5px; color:var(--muted); white-space:nowrap; }
.posDot { position:absolute; top:15px; width:16px; height:16px; border-radius:999px; background:var(--accent);
  border:3px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transform:translateX(-50%); }
.posValLbl { position:absolute; top:30px; transform:translateX(-50%); font-size:11px; font-weight:700; color:var(--accent-ink); white-space:nowrap; }

/* agenda */
.agHead { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.agDayTitle { font-weight:700; font-size:16px; text-transform:capitalize; }
.agItem { display:flex; gap:12px; align-items:flex-start; background:var(--surface-card); border:1px solid var(--line);
  border-radius:14px; padding:12px 14px; margin-bottom:10px; box-shadow:var(--shadow-card); }
.agItem.done { opacity:.62; }
.agItem.cancel { opacity:.5; text-decoration:line-through; }
.agTime { font-weight:800; font-size:16px; font-variant-numeric:tabular-nums; min-width:58px; color:var(--accent-ink); }
.agBody { flex:1; min-width:0; }
.agBody .ag-t { font-weight:700; font-size:14px; }
.agBody .ag-m { color:var(--ink-2); font-size:12.5px; margin-top:2px; }
.agBody .ag-m b { color:var(--ink); }
.agTagRow { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.agActions { display:flex; flex-direction:column; gap:6px; }
.agEmpty { color:var(--muted); text-align:center; padding:30px 10px; }
.pill { display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600;
  background:var(--surface-inset); border:1px solid var(--line); color:var(--ink-2); }
.pill.corretor { background:var(--norte-soft); color:var(--norte); border-color:transparent; }
.pill.proprietario { background:var(--sul-soft); color:var(--sul); border-color:transparent; }
.pill.imobiliaria { background:var(--venda-soft); color:var(--venda); border-color:transparent; }

/* ============================ RESPONSIVO ============================ */
@media (max-width:820px){
  header.top{padding:10px 12px;gap:8px}
  header.top .who{display:none}
  .menuBtn{display:inline-flex}
  .layout{grid-template-columns:1fr}
  aside.filters{position:fixed;top:0;left:0;height:100dvh;width:86vw;max-width:340px;z-index:45;
    transform:translateX(-100%);transition:transform .28s var(--ease-spring);box-shadow:var(--shadow-pop)}
  aside.filters.open{transform:translateX(0)}

<div id="login">
  <div class="loginCard">

============================================================================================ */
const SUPABASE_URL = "https://qxhgylbajvavdvrtbbta.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4aGd5bGJhanZhdmR2cnRiYnRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjU5NzgsImV4cCI6MjA5ODgwMTk3OH0.UL32kC6UYH4goT532jGVgVVhmDZLpaYMFDWInRadM74";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY,
  { auth: { persistSession: true, autoRefreshToken: true } });
window.sb = sb;

const VENDA_OUTLIER = 100000000, ALUGUEL_OUTLIER = 200000;
function sanitizaPreco(r) {
  let p = r.preco;
  if (p != null) {
    if (r.tipo === "Venda") { while (p >= VENDA_OUTLIER) p /= 1000; }
    else if (r.tipo === "Aluguel") { while (p >= ALUGUEL_OUTLIER) p /= 1000; }
    p = Math.round(p * 100) / 100;
    if (p !== r.preco) {
      r = { ...r, preco: p, preco_m2: r.metragem_m2 ? Math.round((p / r.metragem_m2) * 100) / 100 : r.preco_m2 };
    }
  }
  return r;
}

function diasDesdePub(r) {
  if (!r.data_publicacao) return null;
  const d = new Date(r.data_publicacao + "T00:00:00");
  return Math.max(0, Math.round((new Date() - d) / 86400000));
}

function andarDe(r) {
  const t = ((r.titulo || "") + " " + (r.descricao || "")).toLowerCase();
  if (/t[ée]rreo/.test(t)) return 0;
  if (/cobertura/.test(t)) return 99;
  let m = t.match(/(\d{1,2})\s*[ºo°]?\s*(?:andar|pavimento|pav\.)/);
  if (m) return parseInt(m[1]);
  m = t.match(/(?:andar|pavimento)\s*(\d{1,2})/);
  if (m) return parseInt(m[1]);
  return null;
}

function emailPrefix(email) {
  return (email || "").split("@")[0];
}

function mapRow(r0) {
  const r = sanitizaPreco(r0);
  return {
    id: r.id, tipo: r.tipo, regiao: r.regiao,
    quadra: r.localizacao_exata || r.quadra, quadraBase: r.quadra,
    quartos: r.quartos, banheiros: r.banheiros, suites: r.suites, vagas: r.vagas,
    m2: r.metragem_m2, preco: r.preco, precoM2: r.preco_m2, condominio: r.condominio,

    meuVisualizado: r.meu_visualizado || false,

}

async function fetchAllData() {
  let all = [], from = 0, size = 1000;
  while (true) {
    const { data, error } = await sb.from("v_dashboard").select("*").range(from, from + size - 1);
    if (error) { console.error(error); throw error; }
    all = all.concat(data);
    if (data.length < size) break;
    from += size;
  }
  return all;
}
window.fetchAllData = fetchAllData;
window.mapRow = mapRow;
window.sanitizaPreco = sanitizaPreco;
window.emailPrefix = emailPrefix;

/* ---------- POOL DE INTERESSE (compartilhado entre usuários) ----------
   Tabela public.interesse (imovel_id, user_id). Um imóvel está no pool se
   pelo menos um usuário o marcou. Buscamos junto a tabela usuarios p/ saber quem. */
async function fetchInteresseMap() {
  try {
    const [ri, ru] = await Promise.all([
      sb.from("interesse").select("imovel_id,user_id,criado_em"),
      sb.from("usuarios").select("id,email"),
    ]);
    if (ri.error) throw ri.error;
    const emailById = new Map((ru.data || []).map((u) => [u.id, u.email]));
    const map = new Map();
    (ri.data || []).forEach((row) => {
      if (!map.has(row.imovel_id)) map.set(row.imovel_id, []);
      map.get(row.imovel_id).push({ user_id: row.user_id, email: emailById.get(row.user_id) || null, data: row.criado_em ? String(row.criado_em).slice(0, 10) : null });
    });
    return map;
  } catch (e) {
    /* tabela ainda não criada? o app segue funcionando; o pool fica vazio até rodar interesse.sql */
    console.warn("Pool de interesse indisponível (rode interesse.sql no Supabase):", e && e.message ? e.message : e);
    return new Map();
  }
}
function applyInteresse(rows, map, uid) {
  return rows.map((r) => {
    const arr = map.get(r.id) || [];
    return { ...r, interessePor: arr, totalInteresse: arr.length, meuInteresse: arr.some((x) => x.user_id === uid) };
  });
}
/* carrega TUDO já mesclado (imóveis + pool) — usado no load inicial e no "Atualizar" */
async function loadAllMapped(uid) {
  const [rows, imap] = await Promise.all([fetchAllData(), fetchInteresseMap()]);
  return applyInteresse(rows.map(mapRow), imap, uid);
}
window.fetchInteresseMap = fetchInteresseMap;
window.applyInteresse = applyInteresse;
window.loadAllMapped = loadAllMapped;

let __resolveAuth;
window.__authReady = new Promise((res) => { __resolveAuth = res; });

function showApp(user) {
  document.getElementById("login").style.display = "none";
  document.getElementById("root").innerHTML = '<div class="bootLoading"><span class="bootSpin"></span> Carregando seus dados…</div>';
  __resolveAuth({ user });
}

async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("senha").value;
  const errEl = document.getElementById("loginErr");
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Preencha e-mail e senha."; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = "Falha no login: " + error.message; return; }
  showApp(data.user);
}
document.getElementById("btnLogin").addEventListener("click", doLogin);
document.getElementById("senha").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp(session.user);
})();

<script type="text/babel">
/* Nossa Casa · Painel — resumo e modal de detalhes (adaptado p/ Supabase) */
const fmtBRL = (v) => (v == null ? "—" : "R$ " + Number(v).toLocaleString("pt-BR", { maximumFractionDigits: 0 }));
const fmtBRL2 = (v) => (v == null ? "—" : "R$ " + Number(v).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
const andarLabel = (a) => (a == null ? "—" : a === 0 ? "Térreo" : a === 99 ? "Cobertura" : a + "º");

/* ---------- RESUMO ---------- */
function StatsView({ view }) {
  const agg = (rows, f) => {
    const a = rows.map((r) => r[f]).filter((x) => x != null);
    if (!a.length) return null;
    return { min: Math.min(...a), med: a.reduce((x, y) => x + y, 0) / a.length, max: Math.max(...a), n: a.length };
  };
  const venda = view.filter((r) => r.tipo === "Venda"), alug = view.filter((r) => r.tipo === "Aluguel");
  const vm = agg(venda, "precoM2"), am = agg(alug, "precoM2"), vp = agg(venda, "preco"), ap = agg(alug, "preco");
  return (
    <div className="statsWrap">
      <div className="statsGrid">
        <StatCard label="Anúncios no escopo" value={view.length} sub="todos os filtros aplicados" />
        <StatCard label="Venda · R$/m² médio" value={vm ? fmtBRL2(vm.med) : "—"} sub={vm ? vm.n + " anúncios · " + fmtBRL2(vm.min) + "–" + fmtBRL2(vm.max) : "sem dados"} />
        <StatCard label="Aluguel · R$/m² médio" value={am ? fmtBRL2(am.med) : "—"} sub={am ? am.n + " anúncios · " + fmtBRL2(am.min) + "–" + fmtBRL2(am.max) : "sem dados"} />
        <StatCard label="Venda · preço médio" value={vp ? fmtBRL(vp.med) : "—"} sub={vp ? fmtBRL(vp.min) + " – " + fmtBRL(vp.max) : "sem dados"} />
        <StatCard label="Aluguel · preço médio" value={ap ? fmtBRL(ap.med) : "—"} sub={ap ? fmtBRL(ap.min) + " – " + fmtBRL(ap.max) : "sem dados"} />
        <StatCard label="Visualizados / Contatados" value={view.filter((r) => r.meuVisualizado).length + " / " + view.filter((r) => r.contatado).length} sub="nas suas marcações" />
      </div>
    </div>
  );
}

/* ---------- MODAL DETALHE + CRM (+ galeria de fotos + lightbox) ---------- */
function DetailModal({ listing: r, allData, onClose, onSave, onToast, onToggleView, onToggleNoInterest, onToggleInteresse }) {
  const [cont, setCont] = React.useState(!!r.contatado);
  const [nota, setNota] = React.useState(r.nota ?? "");
  const [prop, setProp] = React.useState(r.proposta ?? "");
  const [contra, setContra] = React.useState(r.contraproposta ?? "");
  const [nome, setNome] = React.useState(r.contatoNome ?? "");
  const [whats, setWhats] = React.useState(r.contatoWhats ?? "");
  const [ctipo, setCtipo] = React.useState(r.contatoTipo ?? "");
  const [com, setCom] = React.useState(r.comentarios ?? "");
  const [saved, setSaved] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [marcando, setMarcando] = React.useState(false);
  const [zoomIdx, setZoomIdx] = React.useState(null);
  const cell = (k, v) => (
    <div className="cell"><div className="kk">{k}</div><div className="vv">{v}</div></div>
  );
  const save = async () => {
    const patch = {
      contatado: cont,
      dataContato: cont ? (r.dataContato || new Date().toISOString().slice(0, 10)) : null,
      nota: nota === "" ? null : parseInt(nota),
      proposta: prop === "" ? null : parseFloat(prop),
      contraproposta: contra === "" ? null : parseFloat(contra),
      contatoNome: nome || null, contatoWhats: whats || null,
      contatoTipo: ctipo || null, comentarios: com || null,
    };
    setSaving(true);
    try {
      await onSave(r.id, patch);
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
      onToast("Anotações salvas");
    } catch (e) {
      onToast("Erro ao salvar: " + (e && e.message ? e.message : e));
    } finally {
      setSaving(false);
    }
  };
  const marcar = async (fn) => {
    if (marcando) return;
    setMarcando(true);
    try { await fn(r.id); } catch (e) { onToast("Erro: " + (e && e.message ? e.message : e)); }
    finally { setMarcando(false); }
  };
  const imagens = r.imagens || [];
  const zoomNav = (d) => setZoomIdx((i) => { const n = imagens.length; return n ? (((i + d) % n) + n) % n : null; });
  React.useEffect(() => {
    if (zoomIdx == null) return;
    const onKey = (e) => {
      if (e.key === "ArrowRight") zoomNav(1);
      else if (e.key === "ArrowLeft") zoomNav(-1);
      else if (e.key === "Escape") setZoomIdx(null);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [zoomIdx, imagens.length]);
  const listaMarcacao = (arr) => (arr || []).map((v, i) => (
    <li key={i}>{window.emailPrefix(v.email)} <span style={{ color: "var(--muted)" }}>— {v.data || "sem data"}</span></li>
  ));
  return (
    <div className="modalBg" onClick={(e) => { if (e.target.classList.contains("modalBg")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="mhead">
          <div>
            <h2>{fmtBRL(r.preco)} <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"} style={{ verticalAlign: "3px" }}>{r.tipo}</Tag></h2>
            <div className="sub">
              {r.quadra} · {r.regiao}
              {r.link ? <> · <a href={r.link} target="_blank" rel="noopener">abrir anúncio ↗</a></> : null}
            </div>
          </div>
          <button className="xBtn" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="mbody">
          {imagens.length ? (
            <div className="galleryGrid">
              {imagens.map((src, i) => (
                <img key={i} src={src} alt="" loading="lazy" onClick={() => setZoomIdx(i)} />
              ))}
            </div>
          ) : null}
          <div className="kv">
            {cell("Quartos", r.quartos ?? "—")}{cell("Banheiros", r.banheiros ?? "—")}
            {cell("Suítes", r.suites ?? "—")}{cell("Vagas", r.vagas ?? "—")}
            {cell("Metragem", (r.m2 ?? "—") + " m²")}{cell("R$/m²", fmtBRL2(r.precoM2))}
            {cell("Condomínio", fmtBRL(r.condominio))}{cell("Andar", andarLabel(r.andar))}
            {cell("No site há", (r.dias ?? "—") + " dias")}{cell("Ativo", r.ativo ? "Sim" : "Não")}
            {cell("CRECI", r.creci ?? "—")}
          </div>
          {r.descricao ? <div className="cell descCell"><div className="kk">Descrição</div><div className="descTxt">{r.descricao}</div></div> : null}

          {allData && window.ImovelProfile ? <window.ImovelProfile imovel={r} data={allData} /> : null}

          <div className="crm">
            <h3>Visualização e interesse <span style={{ color: "var(--muted)", fontWeight: 500 }}>(compartilhado entre usuários)</span></h3>
            <div className="togs">
              <Toggle label="Eu já visualizei" detail={r.minhaDataVisualizacao || null} on={!!r.meuVisualizado}
                onChange={() => marcar(onToggleView)} />
              <Toggle label="Sem interesse" detail={r.minhaDataSemInteresse || null} on={!!r.meuSemInteresse}
                onChange={() => marcar(onToggleNoInterest)} />
              {onToggleInteresse ? (
                <Toggle label="No pool de interesse" detail={r.totalInteresse > 0 ? (r.totalInteresse + " marcaram") : null} on={!!r.meuInteresse}
                  onChange={() => marcar(onToggleInteresse)} />
              ) : null}
            </div>
            {(r.interessePor || []).length ? (
              <div className="markList">
                <b>No pool de interesse ({r.totalInteresse}):</b>
                <ul>{listaMarcacao(r.interessePor)}</ul>
              </div>
            ) : null}
            {(r.visualizadoPor || []).length ? (
              <div className="markList">
                <b>Visualizado por ({r.totalVisualizadoPor}):</b>
                <ul>{listaMarcacao(r.visualizadoPor)}</ul>
              </div>
            ) : null}
            {(r.semInteressePor || []).length ? (
              <div className="markList">
                <b>Marcaram sem interesse ({r.totalSemInteresse}):</b>
                <ul>{listaMarcacao(r.semInteressePor)}</ul>
              </div>
            ) : null}
          </div>

          <div className="crm">
            <h3>Minhas anotações <span style={{ color: "var(--muted)", fontWeight: 500 }}>(privadas, só eu vejo)</span></h3>
            <div className="togs">
              <Toggle label="Contatado" detail={r.dataContato || null} on={cont} onChange={setCont} />
            </div>
            <div className="crmGrid">
              <Input label="Nota (0–10)" type="number" min="0" max="10" value={nota} onChange={(e) => setNota(e.target.value)} />
              <Select label="Tipo de contato" value={ctipo} onChange={(e) => setCtipo(e.target.value)}
                options={["", "Corretor", "Proprietário", "Imobiliária", "Outro"]} />
              <Input label="Minha proposta (R$)" type="number" value={prop} onChange={(e) => setProp(e.target.value)} />
              <Input label="Valor que eles fazem (R$)" type="number" value={contra} onChange={(e) => setContra(e.target.value)} />
              <Input label="Nome do contato" value={nome} onChange={(e) => setNome(e.target.value)} />
              <Input label="WhatsApp" value={whats} onChange={(e) => setWhats(e.target.value)} />
            </div>
            <label className="areaLbl">Comentários
              <textarea rows="3" value={com} onChange={(e) => setCom(e.target.value)}></textarea>
            </label>
            <div className="savebar">
              <Button onClick={save} disabled={saving}>{saving ? "Salvando…" : "Salvar anotações"}</Button>
              <span className={"savedMsg" + (saved ? " show" : "")}>✓ salvo</span>
            </div>
          </div>
        </div>
      </div>
      {zoomIdx != null && imagens.length ? (
        <div className="lightboxBg open" onClick={() => setZoomIdx(null)}>
          <button className="lbClose" onClick={(e) => { e.stopPropagation(); setZoomIdx(null); }} aria-label="Fechar">✕</button>
          {imagens.length > 1 ? (
            <button className="lbNav lbPrev" onClick={(e) => { e.stopPropagation(); zoomNav(-1); }} aria-label="Foto anterior">‹</button>
          ) : null}
          <img src={imagens[zoomIdx]} alt="" onClick={(e) => e.stopPropagation()} />
          {imagens.length > 1 ? (
            <button className="lbNav lbNext" onClick={(e) => { e.stopPropagation(); zoomNav(1); }} aria-label="Próxima foto">›</button>
          ) : null}
          {imagens.length > 1 ? (
            <div className="lbThumbs" onClick={(e) => e.stopPropagation()}>
              {imagens.map((src, i) => (
                <img key={i} src={src} alt="" className={i === zoomIdx ? "on" : ""} onClick={() => setZoomIdx(i)} />
              ))}
            </div>
          ) : null}
          <div className="lbCount" onClick={(e) => e.stopPropagation()}>{zoomIdx + 1} / {imagens.length}</div>
        </div>
      ) : null}
    </div>
  );
}

/* ---------- TABELA (condensada — sem scroll horizontal) ---------- */
const TABLE_COLS = [
  { k: "preco", label: "Anúncio", sortable: true },
  { k: "precoM2", label: "R$/m²", sortable: true },
  { k: "dias", label: "Dias", sortable: true },
  { k: "acoes", label: "Ações", sortable: false },
];

function ListingTable({ rows, sortCol, sortDir, onSort, onDetails, showFotos, onToggleView, onToggleNoInterest, onToggleInteresse }) {
  return (
    <table className="listTable">
      <thead>
        <tr>
          {TABLE_COLS.map((c) => (
            <th key={c.k} className={c.sortable ? "sortable" : ""} onClick={() => c.sortable && onSort(c.k)}>
              {c.label}
              {c.sortable ? <span className="arrow">{sortCol === c.k ? (sortDir > 0 ? "▲" : "▼") : "↕"}</span> : null}
            </th>
          ))}
        </tr>
      </thead>
      <tbody>
        {rows.map((r) => {
          const dot = r.meuVisualizado ? "var(--good)" : r.contatado ? "var(--warn)" : null;
          const thumb = showFotos && r.imagens && r.imagens[0];
          return (
            <tr key={r.id} className={r.ativo ? "" : "inativo"} onClick={() => onDetails(r.id)}>
              <td data-label="Anúncio">
                <div className="tPrimary">
                  {thumb ? <img src={thumb} alt="" loading="lazy" className="tThumb" /> : null}
                  {dot ? <span className="tDot" style={{ background: dot }}></span> : null}
                  <span className="tPreco">{fmtBRL(r.preco)}</span>
                  <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"}>{r.tipo}</Tag>
                  {!r.ativo ? <Tag kind="inativo">Inativo</Tag> : null}
                  {r.totalVisualizadoPor > 0 ? <span className="viewsBadge" title="visualizações no app">👁 {r.totalVisualizadoPor}</span> : null}
                </div>
                <div className="tSub">
                  <b>{r.quadra}</b> · {r.quartos ?? "?"}q · {r.banheiros ?? "?"}b · {r.vagas ?? "?"}v · {r.m2 ?? "?"} m²
                </div>
              </td>
              <td data-label="R$/m²" className="tNum">{fmtBRL2(r.precoM2)}</td>
              <td data-label="Dias" className="tNum">{r.dias ?? "—"}</td>
              <td data-label="Ações" className="tActions" onClick={(e) => e.stopPropagation()}>
                <button className="tBtn" onClick={() => onDetails(r.id)}>detalhes</button>
                {r.link ? (
                  <a className="tBtn" href={r.link} target="_blank" rel="noopener" title="Abrir o anúncio original">abrir ↗</a>
                ) : null}
                <button className={"tBtn" + (r.meuVisualizado ? " on" : "")} onClick={() => onToggleView(r.id)}
                  title={r.meuVisualizado ? "Visualizado — clique para desmarcar" : "Marcar como visualizado"}>
                  {r.meuVisualizado ? "✓ 👁" : "👁"}
                </button>
                {onToggleInteresse ? (
                  <button className={"tBtn pool" + (r.meuInteresse ? " on" : "")} onClick={() => onToggleInteresse(r.id)}
                    title={r.meuInteresse ? "No pool de interesse — clique para remover" : "Adicionar ao pool de interesse"}>
                    {(r.meuInteresse ? "✓ pool" : "+ pool") + (r.totalInteresse > 0 ? " " + r.totalInteresse : "")}
                  </button>
                ) : null}
                <button className={"tBtn" + (r.meuSemInteresse ? " on" : "")} onClick={() => onToggleNoInterest(r.id)}
                  title={r.meuSemInteresse ? "Sem interesse — clique para desmarcar" : "Marcar sem interesse"}>
                  ✕
                </button>
              </td>
            </tr>
          );
        })}
        {rows.length === 0 ? (
          <tr><td colSpan={TABLE_COLS.length} className="tEmpty">Nenhum anúncio com esses filtros.</td></tr>
        ) : null}
      </tbody>
    </table>
  );
}

Object.assign(window, { StatsView, DetailModal, ListingTable, fmtBRL, fmtBRL2, andarLabel });

</script>
<script type="text/babel">
/* ============================================================================================
   MÓDULO DE ANÁLISES  —  rankings e comparação de quadras, perfil de cada imóvel,
   gráficos em SVG (com explicação dinâmica, sem pizza, sem emojis) e AGENDA de visitas.
   Tudo consome os mesmos dados já carregados (window.mapRow) e o Supabase para a agenda.
============================================================================================ */
const fmtBRL  = window.fmtBRL;
const fmtBRL2 = window.fmtBRL2;
const fmtInt  = (v) => (v == null ? "—" : Number(v).toLocaleString("pt-BR"));
const pctTxt  = (v) => (v == null || !isFinite(v) ? "—" : (v > 0 ? "+" : "") + v.toFixed(1).replace(".", ",") + "%");
const ord     = (n) => n + "º";

/* ---- parse de quadra: "SQN 316" -> {pre:'SQN', num:316} ---- */
function parseQuadra(qb) {
  const m = String(qb || "").match(/([A-Za-zÀ-ÿ]+)\s*0*(\d+)/);
  return m ? { pre: m[1].toUpperCase(), num: parseInt(m[2], 10) } : { pre: "", num: NaN };
}

/* ---- estatística de um campo (min/média/máx) ---- */
function statsOf(arr, field) {
  const v = arr.map((r) => r[field]).filter((x) => x != null && isFinite(x));
  if (!v.length) return null;
  return { n: v.length, min: Math.min(...v), med: v.reduce((a, b) => a + b, 0) / v.length, max: Math.max(...v) };
}

/* ---- bloco de estatísticas (venda + aluguel) de um conjunto de imóveis ---- */
function statsBlock(rows) {
  const R = rows.filter((r) => r.ativo !== false);
  const v = R.filter((r) => r.tipo === "Venda"), a = R.filter((r) => r.tipo === "Aluguel");
  return {
    venda:   { n: v.length, preco: statsOf(v, "preco"), m2: statsOf(v, "precoM2") },
    aluguel: { n: a.length, preco: statsOf(a, "preco"), m2: statsOf(a, "precoM2") },
    nTotal: R.length,
  };
}

/* ---- estatísticas de TODAS as quadras (só ativos) ---- */
function buildQuadraStats(data) {
  const byQ = new Map();
  data.filter((r) => r.ativo !== false && r.quadraBase).forEach((r) => {
    if (!byQ.has(r.quadraBase)) byQ.set(r.quadraBase, []);
    byQ.get(r.quadraBase).push(r);
  });
  return [...byQ.entries()].map(([quadra, rows]) => {
    const pq = parseQuadra(quadra);
    return { quadra, regiao: rows[0].regiao, pre: pq.pre, num: pq.num, ...statsBlock(rows) };
  });
}

/* ---- métricas disponíveis para ranking ---- */
const METRICS = [
  { key: "venda_med", label: "Venda — preço médio",              pick: (q) => q.venda.preco && q.venda.preco.med, fmt: fmtBRL,  un: "preço médio de venda" },
  { key: "venda_min", label: "Venda — mais barato (real)",       pick: (q) => q.venda.preco && q.venda.preco.min, fmt: fmtBRL,  un: "menor preço de venda" },
  { key: "venda_max", label: "Venda — mais caro (real)",         pick: (q) => q.venda.preco && q.venda.preco.max, fmt: fmtBRL,  un: "maior preço de venda" },
  { key: "venda_m2",  label: "Venda — R$/m² médio",              pick: (q) => q.venda.m2 && q.venda.m2.med,       fmt: fmtBRL2, un: "R$/m² médio de venda" },
  { key: "alug_med",  label: "Aluguel — preço médio",            pick: (q) => q.aluguel.preco && q.aluguel.preco.med, fmt: fmtBRL,  un: "aluguel médio" },
  { key: "alug_min",  label: "Aluguel — mais barato (real)",     pick: (q) => q.aluguel.preco && q.aluguel.preco.min, fmt: fmtBRL,  un: "menor aluguel" },
  { key: "alug_max",  label: "Aluguel — mais caro (real)",       pick: (q) => q.aluguel.preco && q.aluguel.preco.max, fmt: fmtBRL,  un: "maior aluguel" },
  { key: "alug_m2",   label: "Aluguel — R$/m² médio",            pick: (q) => q.aluguel.m2 && q.aluguel.m2.med,   fmt: fmtBRL2, un: "R$/m² médio de aluguel" },
  { key: "qtd_venda", label: "Quantidade à venda",               pick: (q) => q.venda.n || 0,   fmt: fmtInt, un: "imóveis à venda" },
  { key: "qtd_alug",  label: "Quantidade para aluguel",          pick: (q) => q.aluguel.n || 0, fmt: fmtInt, un: "imóveis para aluguel" },
  { key: "qtd_total", label: "Quantidade total (ativos)",        pick: (q) => q.nTotal || 0,    fmt: fmtInt, un: "imóveis ativos" },
];
const metricByKey = (k) => METRICS.find((m) => m.key === k) || METRICS[0];

/* ---- ordena quadras por métrica; devolve [{q,value,rank}] ---- */
function rankQuadras(list, metric, dir) {
  const arr = list.map((q) => ({ q, value: metric.pick(q) })).filter((x) => x.value != null && isFinite(x.value));
  arr.sort((a, b) => (dir === "asc" ? a.value - b.value : b.value - a.value));
  return arr.map((x, i) => ({ ...x, rank: i + 1 }));
}

/* ---- quadras vizinhas (mesmo prefixo; número anterior/próximo que EXISTE) ---- */
function neighborsOf(quadra, list) {
  const me = parseQuadra(quadra);
  const same = list.filter((q) => q.pre === me.pre && isFinite(q.num));
  const menor = same.filter((q) => q.num < me.num).sort((a, b) => b.num - a.num)[0] || null;
  const maior = same.filter((q) => q.num > me.num).sort((a, b) => a.num - b.num)[0] || null;
  return { anterior: menor, proxima: maior };
}

/* ---- veredito caro/barato/na média (tolerância de 5% em torno da média) ---- */
function verdictVs(value, med) {
  if (value == null || med == null || !isFinite(med) || med === 0) return { cls: "media", label: "sem base", diff: null, pct: null };
  const diff = value - med, p = (diff / med) * 100;
  if (Math.abs(p) <= 5) return { cls: "media", label: "na média", diff, pct: p };
  return p > 0 ? { cls: "caro", label: "acima da média", diff, pct: p } : { cls: "barato", label: "abaixo da média", diff, pct: p };
}

/* ================= COMPONENTES VISUAIS ================= */

/* dica "como ler" — um "i" que abre uma caixa explicativa (texto dinâmico) */
function InfoTip({ text }) {
  const [open, setOpen] = React.useState(false);
  return (
    <span className="infoTip">
      <span className="infoDot" title="Como ler" onClick={() => setOpen((o) => !o)}>i</span>
      {open ? <span className="infoBox" onClick={() => setOpen(false)}>{text}</span> : null}
    </span>
  );
}

/* cartão min/valor/legenda */
function MiniStat({ k, v, s, hl }) {
  return (
    <div className={"miniStat" + (hl ? " hl" : "")}>
      <div className="ms-k">{k}</div>
      <div className="ms-v">{v}</div>
      {s ? <div className="ms-s">{s}</div> : null}
    </div>
  );
}

/* gráfico de barras horizontais (comprimento = valor); barra destacada em verde */
function BarsH({ items, fmt, title, info }) {
  const vals = items.map((i) => i.value || 0);
  const max = Math.max(1, ...vals);
  const rowH = 26, pad = 4, labelW = 104, valW = 90, W = 580;
  const h = items.length * rowH + 8;
  return (
    <div className="chartWrap">
      <div className="chartHead"><span className="ch-title">{title}</span>{info ? <InfoTip text={info} /> : null}</div>
      <svg viewBox={"0 0 " + W + " " + h} preserveAspectRatio="xMinYMin meet" role="img">
        {items.map((it, i) => {
          const y = i * rowH + pad;
          const bw = Math.max(2, ((it.value || 0) / max) * (W - labelW - valW));
          return (
            <g key={i}>
              <text x={0} y={y + 15} className="barLbl">{it.label}</text>
              <rect x={labelW} y={y + 3} width={bw} height={rowH - 10} rx="4"
                fill={it.highlight ? "var(--accent)" : "var(--line-strong)"} />
              <text x={labelW + bw + 6} y={y + 15} className="barVal">{fmt(it.value)}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* linha numérica: posiciona um valor entre mínimo, média e máximo */
function RangePos({ min, med, max, value, fmt, title, info }) {
  const span = (max - min) || 1;
  const pos = (x) => Math.max(0, Math.min(100, ((x - min) / span) * 100));
  return (
    <div>
      <div className="chartHead"><span className="ch-title">{title}</span>{info ? <InfoTip text={info} /> : null}</div>
      <div className="posTrack">
        <div className="posLine"></div>
        <div className="posTick" style={{ left: "0%" }}></div>
        <div className="posTickLbl" style={{ left: "0%" }}>mín<br />{fmt(min)}</div>
        <div className="posTick" style={{ left: pos(med) + "%" }}></div>
        <div className="posTickLbl" style={{ left: pos(med) + "%", transform: "translateX(-50%)" }}>média<br />{fmt(med)}</div>
        <div className="posTick" style={{ left: "100%" }}></div>
        <div className="posTickLbl" style={{ left: "100%", transform: "translateX(-100%)" }}>máx<br />{fmt(max)}</div>
        <div className="posDot" style={{ left: pos(value) + "%" }}></div>
        <div className="posValLbl" style={{ left: pos(value) + "%" }}>este: {fmt(value)}</div>
      </div>
    </div>
  );
}

/* trio de cartões min/média/máx para um par (preço + R$/m²) */
function TripletCards({ title, s, sm2 }) {
  return (
    <div style={{ marginBottom: "10px" }}>
      <div style={{ fontWeight: 700, fontSize: "13px", margin: "2px 0 8px" }}>{title}</div>
      <div className="anGrid">
        <MiniStat k="Preço mínimo" v={s ? fmtBRL(s.min) : "—"} s={s ? s.n + " anúncios" : "sem dados"} />
        <MiniStat k="Preço médio"  v={s ? fmtBRL(s.med) : "—"} />
        <MiniStat k="Preço máximo" v={s ? fmtBRL(s.max) : "—"} />
        <MiniStat k="R$/m² mín"    v={sm2 ? fmtBRL2(sm2.min) : "—"} />
        <MiniStat k="R$/m² médio"  v={sm2 ? fmtBRL2(sm2.med) : "—"} />
        <MiniStat k="R$/m² máx"    v={sm2 ? fmtBRL2(sm2.max) : "—"} />
      </div>
    </div>
  );
}

/* ================= PERFIL DE UMA QUADRA ================= */
function QuadraProfile({ quadra, statsAll, allData, onOpenImovel }) {
  const [metricKey, setMetricKey] = React.useState("venda_med");
  const me = statsAll.find((q) => q.quadra === quadra);
  if (!me) return <div className="anBlock">Sem dados ativos para {quadra}.</div>;
  const metric = metricByKey(metricKey);
  const nb = neighborsOf(quadra, statsAll);
  const ranked = rankQuadras(statsAll, metric, "desc");
  const myRank = ranked.find((x) => x.q.quadra === quadra);
  const total = ranked.length;
  const globalMed = (() => {
    const v = ranked.map((x) => x.value); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
  })();

  /* barras: vizinha anterior, esta (destaque), vizinha próxima, média geral */
  const barItems = [];
  if (nb.anterior) barItems.push({ label: nb.anterior.quadra, value: metric.pick(nb.anterior) });
  barItems.push({ label: quadra, value: metric.pick(me), highlight: true });
  if (nb.proxima) barItems.push({ label: nb.proxima.quadra, value: metric.pick(nb.proxima) });
  if (globalMed != null) barItems.push({ label: "Média geral", value: globalMed });

  const listasImoveis = (tipo) => allData.filter((r) => r.ativo !== false && r.quadraBase === quadra && r.tipo === tipo);
  const cheapExp = (tipo) => {
    const arr = listasImoveis(tipo).filter((r) => r.preco != null).sort((a, b) => a.preco - b.preco);
    return { barato: arr[0] || null, caro: arr[arr.length - 1] || null };
  };
  const ceV = cheapExp("Venda"), ceA = cheapExp("Aluguel");

  const infoBar = "Cada barra é uma quadra. O comprimento representa " + metric.un +
    ". A barra verde é a quadra " + quadra + ". Comparamos com a quadra anterior e a próxima (por número) e com a média de todas as quadras (" +
    (globalMed != null ? metric.fmt(globalMed) : "—") + "). Quanto mais à direita, maior o valor.";

  const posTxt = myRank
    ? "A quadra " + quadra + " ocupa a " + ord(myRank.rank) + " posição entre " + total + " quadras em " + metric.label.toLowerCase() +
      " (" + metric.fmt(myRank.value) + "). " + (globalMed != null
        ? "A média de todas as quadras é " + metric.fmt(globalMed) + " — esta quadra está " +
          (myRank.value >= globalMed ? "acima" : "abaixo") + " da média em " + pctTxt(((myRank.value - globalMed) / globalMed) * 100) + "."
        : "")
    : "Sem valor para este critério nesta quadra.";

  return (
    <div>
      <div className="anBlock">
        <h3>Perfil da quadra {quadra} <span style={{ color: "var(--muted)", fontWeight: 500 }}>· {me.regiao} · {me.nTotal} ativos</span></h3>
        <p className="anHint">Valores calculados sobre anúncios ativos das fontes selecionadas.</p>
        <TripletCards title="Venda" s={me.venda.preco} sm2={me.venda.m2} />
        <TripletCards title="Aluguel" s={me.aluguel.preco} sm2={me.aluguel.m2} />
        <div className="anGrid" style={{ marginTop: "4px" }}>
          <MiniStat k="Venda — mais barato" v={ceV.barato ? fmtBRL(ceV.barato.preco) : "—"} s={ceV.barato ? ceV.barato.quadra : ""} />
          <MiniStat k="Venda — mais caro"   v={ceV.caro ? fmtBRL(ceV.caro.preco) : "—"} s={ceV.caro ? ceV.caro.quadra : ""} />
          <MiniStat k="Aluguel — mais barato" v={ceA.barato ? fmtBRL(ceA.barato.preco) : "—"} s={ceA.barato ? ceA.barato.quadra : ""} />
          <MiniStat k="Aluguel — mais caro"   v={ceA.caro ? fmtBRL(ceA.caro.preco) : "—"} s={ceA.caro ? ceA.caro.quadra : ""} />
        </div>
      </div>

      <div className="anBlock">
        <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap", marginBottom: "10px" }}>
          <b style={{ fontSize: "14px" }}>Comparar com vizinhas e média geral</b>
          <div style={{ flex: 1 }}></div>
          <Select size="sm" value={metricKey} onChange={(e) => setMetricKey(e.target.value)}
            options={METRICS.map((m) => ({ value: m.key, label: m.label }))} />
        </div>
        <div className="readOut" style={{ marginBottom: "12px" }}>{posTxt}</div>
        <BarsH items={barItems} fmt={metric.fmt} title={metric.label} info={infoBar} />
        <div className="anHint" style={{ marginTop: "8px" }}>
          Vizinhas de {quadra}: {nb.anterior ? nb.anterior.quadra : "—"} (anterior) e {nb.proxima ? nb.proxima.quadra : "—"} (próxima).
        </div>
      </div>
    </div>
  );
}

/* ================= ABA "QUADRAS": ranking + seleção ================= */
function QuadrasView({ data, onOpenImovel }) {
  const [metricKey, setMetricKey] = React.useState("venda_med");
  const [dir, setDir] = React.useState("desc");
  const [regiao, setRegiao] = React.useState("Todas");
  const [sel, setSel] = React.useState(null);
  const [busca, setBusca] = React.useState("");

  const statsAll = React.useMemo(() => buildQuadraStats(data), [data]);
  const metric = metricByKey(metricKey);
  const listReg = regiao === "Todas" ? statsAll : statsAll.filter((q) => q.regiao === regiao);
  const ranked = React.useMemo(() => rankQuadras(listReg, metric, dir), [listReg, metric, dir]);
  const filtered = ranked.filter((x) => x.q.quadra.toLowerCase().includes(busca.toLowerCase()));
  const values = ranked.map((x) => x.value);
  const media = values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;

  const infoRank = "A lista mostra todas as quadras ordenadas por “" + metric.label + "”. A coluna Posição é o ranking (1 = " +
    (dir === "desc" ? "maior" : "menor") + " valor). O valor de cada quadra é " + metric.un +
    ". Troque o critério ou a ordem (maior/menor) para reorganizar. Clique numa quadra para ver o perfil completo.";

  return (
    <div>
      <div className="anBlock">
        <h3>Ranking de quadras</h3>
        <p className="anHint">Escolha o critério: a lista se reorganiza e mostra a posição de cada quadra. {statsAll.length} quadras com anúncios ativos.</p>
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", alignItems: "center", marginBottom: "12px" }}>
          <Select size="sm" value={metricKey} onChange={(e) => setMetricKey(e.target.value)}
            options={METRICS.map((m) => ({ value: m.key, label: m.label }))} />
          <Segmented size="sm" value={dir} onChange={setDir}
            options={[{ value: "desc", label: "Maior primeiro" }, { value: "asc", label: "Menor primeiro" }]} />
          <Segmented size="sm" value={regiao} onChange={setRegiao}
            options={[{ value: "Todas", label: "Todas" }, { value: "Asa Norte", label: "Asa Norte" }, { value: "Asa Sul", label: "Asa Sul" }]} />
          <Input size="sm" placeholder="buscar quadra…" value={busca} onChange={(e) => setBusca(e.target.value)} style={{ maxWidth: "150px" }} />
          <div style={{ flex: 1 }}></div>
          <InfoTip text={infoRank} />
        </div>
        <div style={{ overflowX: "auto" }}>
          <table className="rankTable">
            <thead>
              <tr>
                <th style={{ width: "60px" }}>Posição</th>
                <th>Quadra</th>
                <th>Região</th>
                <th className="num">{metric.label}</th>
                <th className="num">vs média</th>
                <th className="num">Ativos</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((x) => {
                const vsm = media ? ((x.value - media) / media) * 100 : null;
                return (
                  <tr key={x.q.quadra} className={"clickRow" + (sel === x.q.quadra ? " selRow" : "")} onClick={() => setSel(x.q.quadra)}>
                    <td><span className={"rankPos" + (x.rank <= 3 ? " top" : "")}>{x.rank}</span></td>
                    <td><b>{x.q.quadra}</b></td>
                    <td>{x.q.regiao}</td>
                    <td className="num">{metric.fmt(x.value)}</td>
                    <td className="num" style={{ color: vsm == null ? "var(--muted)" : vsm > 0 ? "var(--bad)" : vsm < 0 ? "var(--good)" : "var(--muted)" }}>{pctTxt(vsm)}</td>
                    <td className="num">{x.q.nTotal}</td>
                  </tr>
                );
              })}
              {filtered.length === 0 ? <tr><td colSpan={6} style={{ textAlign: "center", color: "var(--muted)", padding: "20px" }}>Nenhuma quadra.</td></tr> : null}
            </tbody>
          </table>
        </div>
        <div className="anHint" style={{ marginTop: "8px" }}>Média do critério entre as quadras listadas: <b>{media != null ? metric.fmt(media) : "—"}</b>.</div>
      </div>

      {sel ? <QuadraProfile quadra={sel} statsAll={statsAll} allData={data} onOpenImovel={onOpenImovel} /> : (
        <div className="anBlock" style={{ textAlign: "center", color: "var(--muted)" }}>Selecione uma quadra na lista para ver o perfil completo, vizinhas e gráficos.</div>
      )}
    </div>
  );
}

/* ================= PERFIL DE UM IMÓVEL (usado dentro do modal) ================= */
function ImovelProfile({ imovel: r, data }) {
  const statsAll = React.useMemo(() => buildQuadraStats(data), [data]);
  const [escopo, setEscopo] = React.useState("quadra"); /* quadra | todas | especifica */
  const [quadraEsc, setQuadraEsc] = React.useState(r.quadraBase);
  const tipo = r.tipo;

  const rowsDo = (pred) => data.filter((x) => x.ativo !== false && pred(x));
  const scopeRows =
    escopo === "todas" ? rowsDo(() => true) :
    escopo === "especifica" ? rowsDo((x) => x.quadraBase === quadraEsc) :
    rowsDo((x) => x.quadraBase === r.quadraBase);
  const sb = statsBlock(scopeRows);
  const sPreco = tipo === "Venda" ? sb.venda.preco : sb.aluguel.preco;
  const sM2 = tipo === "Venda" ? sb.venda.m2 : sb.aluguel.m2;

  const vP = verdictVs(r.preco, sPreco && sPreco.med);
  const vM = verdictVs(r.precoM2, sM2 && sM2.med);

  /* posição do imóvel dentro da própria quadra (mesmo tipo) */
  const naQuadra = data.filter((x) => x.ativo !== false && x.quadraBase === r.quadraBase && x.tipo === tipo && x.preco != null)
    .sort((a, b) => b.preco - a.preco);
  const posQuadra = naQuadra.findIndex((x) => x.id === r.id) + 1;

  const escopoNome = escopo === "todas" ? "todas as quadras" : escopo === "especifica" ? ("a quadra " + quadraEsc) : ("a quadra " + r.quadraBase);
  const quadrasOptions = [...new Set(data.filter((x) => x.quadraBase).map((x) => x.quadraBase))].sort().map((q) => ({ value: q, label: q }));

  const leituraPreco = (r.preco == null)
    ? "Este anúncio está sem preço divulgado (sob consulta), então não é possível posicioná-lo na faixa de preço. As comparações abaixo usam o que há disponível."
    : sPreco
    ? "Este imóvel custa " + fmtBRL(r.preco) + ". Em " + escopoNome + ", o preço de " + tipo.toLowerCase() +
      " varia de " + fmtBRL(sPreco.min) + " a " + fmtBRL(sPreco.max) + ", com média de " + fmtBRL(sPreco.med) + " (" + sPreco.n + " anúncios). " +
      "Ele está " + (vP.label) + (vP.pct != null ? " (" + pctTxt(vP.pct) + " frente à média, ou " + fmtBRL(Math.abs(vP.diff)) + " " + (vP.diff >= 0 ? "a mais" : "a menos") + ")" : "") + "."
    : "Sem base de comparação de preço em " + escopoNome + ".";
  const leituraM2 = sM2
    ? "Em R$/m², este imóvel está a " + fmtBRL2(r.precoM2) + ". A faixa em " + escopoNome + " vai de " + fmtBRL2(sM2.min) + " a " + fmtBRL2(sM2.max) +
      " (média " + fmtBRL2(sM2.med) + "). Ele está " + vM.label + (vM.pct != null ? " (" + pctTxt(vM.pct) + ")" : "") + "."
    : "Sem base de comparação de R$/m² em " + escopoNome + ".";
  const leituraPos = posQuadra > 0
    ? "Dentro da própria quadra (" + r.quadraBase + "), é o " + ord(posQuadra) + " mais caro dos " + naQuadra.length + " imóveis de " + tipo.toLowerCase() + " ativos."
    : "";

  /* vizinhas: média de preço do mesmo tipo */
  const nb = neighborsOf(r.quadraBase, statsAll);
  const medPreco = (q) => q ? (tipo === "Venda" ? (q.venda.preco && q.venda.preco.med) : (q.aluguel.preco && q.aluguel.preco.med)) : null;
  const barItems = [];
  if (nb.anterior) barItems.push({ label: nb.anterior.quadra, value: medPreco(nb.anterior) });
  barItems.push({ label: r.quadraBase + " (esta)", value: sPreco ? sPreco.med : null, highlight: false });
  if (nb.proxima) barItems.push({ label: nb.proxima.quadra, value: medPreco(nb.proxima) });
  const barItemsComEste = (r.preco != null ? [{ label: "ESTE imóvel", value: r.preco, highlight: true }] : []).concat(barItems.filter((b) => b.value != null));

  const infoRange = "A linha vai do imóvel mais barato (mín) ao mais caro (máx) de " + escopoNome + " para " + tipo.toLowerCase() +
    ". O ponto verde é ESTE imóvel (" + fmtBRL(r.preco) + "). Se estiver à esquerda da média, é mais barato que o típico; à direita, mais caro.";
  const infoBars = "Comparação do preço deste imóvel (barra verde) com a média de " + tipo.toLowerCase() + " da sua quadra e das quadras vizinhas. Barras maiores = preços maiores.";

  return (
    <div className="crm">
      <h3>Perfil e comparação deste imóvel</h3>
      <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap", marginBottom: "10px" }}>
        <span style={{ color: "var(--muted)", fontSize: "12.5px" }}>Comparar com:</span>
        <Segmented size="sm" value={escopo} onChange={setEscopo}
          options={[{ value: "quadra", label: "Própria quadra" }, { value: "todas", label: "Todas as quadras" }, { value: "especifica", label: "Outra quadra" }]} />
        {escopo === "especifica" ? (
          <Select size="sm" value={quadraEsc} onChange={(e) => setQuadraEsc(e.target.value)} options={quadrasOptions} />
        ) : null}
      </div>

      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "10px" }}>
        <span className={"verdict " + vP.cls}>Preço: {vP.label}</span>
        <span className={"verdict " + vM.cls}>R$/m²: {vM.label}</span>
        {posQuadra > 0 ? <span className="pill">{ord(posQuadra)} mais caro de {naQuadra.length} na quadra</span> : null}
      </div>

      <div className="readOut">{leituraPreco}</div>
      <div className="readOut">{leituraM2}</div>
      {leituraPos ? <div className="readOut">{leituraPos}</div> : null}

      {sPreco && r.preco != null ? (
        <div style={{ marginTop: "14px" }}>
          <RangePos min={sPreco.min} med={sPreco.med} max={sPreco.max} value={r.preco} fmt={fmtBRL}
            title={"Onde este imóvel está na faixa de preço (" + escopoNome + ")"} info={infoRange} />
        </div>
      ) : null}

      {barItemsComEste.length > 1 ? (
        <div style={{ marginTop: "16px" }}>
          <BarsH items={barItemsComEste} fmt={fmtBRL} title={"Este imóvel vs. média das quadras vizinhas (" + tipo.toLowerCase() + ")"} info={infoBars} />
        </div>
      ) : null}
    </div>
  );
}

Object.assign(window, { QuadrasView, ImovelProfile, buildQuadraStats, InfoTip, BarsH, RangePos });
</script>
<script type="text/babel">
/* ============================================================================================
   AGENDA DE VISITAS  —  armazenada no Supabase (tabela public.agendamentos), editável e
   visível em qualquer dispositivo. Abre no dia atual; navega para passado e futuro.
============================================================================================ */
const TIPOS_CONTATO = ["Corretor", "Proprietário", "Imobiliária", "Outro"];
const STATUS_AG = ["Agendada", "Concluída", "Cancelada"];
const pad2 = (n) => String(n).padStart(2, "0");
const dateKey = (d) => d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
const parseWhen = (iso) => new Date(iso);
const horaStr = (d) => pad2(d.getHours()) + ":" + pad2(d.getMinutes());
const diaTitulo = (d) => d.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
const pillClass = (t) => t === "Corretor" ? "pill corretor" : t === "Proprietário" ? "pill proprietario" : t === "Imobiliária" ? "pill imobiliaria" : "pill";

function AgendaForm({ user, data, editing, dayKey, onClose, onSaved, onToast }) {
  const ini = editing || {};
  const iniWhen = ini.quando ? parseWhen(ini.quando) : null;
  const [dataV, setDataV] = React.useState(iniWhen ? dateKey(iniWhen) : dayKey);
  const [hora, setHora] = React.useState(iniWhen ? horaStr(iniWhen) : "10:00");
  const [titulo, setTitulo] = React.useState(ini.titulo || "");
  const [nome, setNome] = React.useState(ini.contato_nome || "");
  const [ctipo, setCtipo] = React.useState(ini.contato_tipo || "Corretor");
  const [tel, setTel] = React.useState(ini.contato_telefone || "");
  const [local, setLocal] = React.useState(ini.local || "");
  const [desc, setDesc] = React.useState(ini.descricao || "");
  const [status, setStatus] = React.useState(ini.status || "Agendada");
  const [busca, setBusca] = React.useState("");
  const [imovel, setImovel] = React.useState(ini.imovel_id ? { id: ini.imovel_id, quadra: ini.imovel_quadra, link: ini.imovel_link } : null);
  const [saving, setSaving] = React.useState(false);

  const matches = busca.trim().length >= 2
    ? data.filter((r) => (r.quadra + " " + r.id + " " + (r.preco || "")).toLowerCase().includes(busca.toLowerCase())).slice(0, 8)
    : [];

  const salvar = async () => {
    if (!dataV || !hora) { onToast("Informe data e hora."); return; }
    const [Y, M, D] = dataV.split("-").map(Number);
    const [h, mi] = hora.split(":").map(Number);
    const quando = new Date(Y, M - 1, D, h, mi).toISOString();
    const payload = {
      user_id: user.id, usuario_email: user.email, quando,
      titulo: titulo || null, contato_nome: nome || null, contato_tipo: ctipo || null,
      contato_telefone: tel || null, local: local || null, descricao: desc || null, status,
      imovel_id: imovel ? imovel.id : null, imovel_quadra: imovel ? imovel.quadra : null, imovel_link: imovel ? imovel.link : null,
      atualizado_em: new Date().toISOString(),
    };
    setSaving(true);
    try {
      let error;
      if (editing && editing.id) ({ error } = await window.sb.from("agendamentos").update(payload).eq("id", editing.id));
      else ({ error } = await window.sb.from("agendamentos").insert(payload));
      if (error) throw error;
      onToast(editing ? "Agendamento atualizado" : "Agendamento criado");
      onSaved();
    } catch (e) { onToast("Erro ao salvar: " + (e && e.message ? e.message : e)); }
    finally { setSaving(false); }
  };

  return (
    <div className="modalBg" onClick={(e) => { if (e.target.classList.contains("modalBg")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" style={{ maxWidth: "560px" }}>
        <div className="mhead">
          <h2 style={{ fontSize: "18px" }}>{editing ? "Editar agendamento" : "Novo agendamento"}</h2>
          <button className="xBtn" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="mbody">
          <div className="crmGrid">
            <Input label="Data" type="date" value={dataV} onChange={(e) => setDataV(e.target.value)} />
            <Input label="Hora" type="time" value={hora} onChange={(e) => setHora(e.target.value)} />
            <Input label="Nome de quem vamos falar" value={nome} onChange={(e) => setNome(e.target.value)} />
            <Select label="Tipo de contato" value={ctipo} onChange={(e) => setCtipo(e.target.value)} options={TIPOS_CONTATO} />
            <Input label="Telefone / WhatsApp" value={tel} onChange={(e) => setTel(e.target.value)} />
            <Select label="Status" value={status} onChange={(e) => setStatus(e.target.value)} options={STATUS_AG} />
            <Input label="Local (endereço do encontro)" value={local} onChange={(e) => setLocal(e.target.value)} />
            <Input label="Título (opcional)" value={titulo} onChange={(e) => setTitulo(e.target.value)} />
          </div>
          <label className="areaLbl">Observações
            <textarea rows="3" value={desc} onChange={(e) => setDesc(e.target.value)}></textarea>
          </label>

          <div style={{ marginTop: "10px" }}>
            <div style={{ fontWeight: 700, fontSize: "13px", marginBottom: "6px" }}>Imóvel vinculado</div>
            {imovel ? (
              <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
                <span className="pill">{imovel.quadra || imovel.id}</span>
                {imovel.link ? <a href={imovel.link} target="_blank" rel="noopener" className="tBtn">abrir anúncio ↗</a> : null}
                <button className="tBtn" onClick={() => setImovel(null)}>remover</button>
              </div>
            ) : (
              <div>
                <Input size="sm" placeholder="buscar por quadra, preço ou id…" value={busca} onChange={(e) => setBusca(e.target.value)} />
                {matches.length ? (
                  <div style={{ border: "1px solid var(--line)", borderRadius: "10px", marginTop: "6px", overflow: "hidden" }}>
                    {matches.map((r) => (
                      <div key={r.id} className="clickRow" style={{ padding: "8px 10px", borderBottom: "1px solid var(--line)", cursor: "pointer", fontSize: "13px" }}
                        onClick={() => { setImovel({ id: r.id, quadra: r.quadra, link: r.link }); setBusca(""); }}>
                        <b>{fmtBRL(r.preco)}</b> · {r.quadra} · {r.tipo} · {r.origem}
                      </div>
                    ))}
                  </div>
                ) : null}
              </div>
            )}
          </div>

          <div className="savebar" style={{ marginTop: "14px" }}>
            <Button onClick={salvar} disabled={saving}>{saving ? "Salvando…" : (editing ? "Salvar alterações" : "Criar agendamento")}</Button>
            <Button variant="outline" onClick={onClose}>Cancelar</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AgendaView({ user, data, onOpenImovel, onToast }) {
  const [agenda, setAgenda] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [day, setDay] = React.useState(() => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; });
  const [modo, setModo] = React.useState("dia"); /* dia | lista */
  const [form, setForm] = React.useState(null); /* null | {} (novo) | registro (editar) */

  const load = React.useCallback(async () => {
    setLoading(true);
    try {
      const { data: rows, error } = await window.sb.from("agendamentos").select("*").order("quando", { ascending: true });
      if (error) throw error;
      setAgenda(rows || []);
    } catch (e) { onToast("Erro ao carregar agenda: " + (e && e.message ? e.message : e)); }
    finally { setLoading(false); }
  }, [onToast]);
  React.useEffect(() => { load(); }, [load]);

  const excluir = async (rec) => {
    if (!window.confirm("Excluir este agendamento?")) return;
    try {
      const { error } = await window.sb.from("agendamentos").delete().eq("id", rec.id);
      if (error) throw error;
      onToast("Agendamento excluído"); load();
    } catch (e) { onToast("Erro ao excluir: " + (e && e.message ? e.message : e)); }
  };

  const addDays = (n) => { const d = new Date(day); d.setDate(d.getDate() + n); setDay(d); };
  const chave = dateKey(day);
  const doDia = agenda.filter((a) => a.quando && dateKey(parseWhen(a.quando)) === chave)
    .sort((a, b) => new Date(a.quando) - new Date(b.quando));
  const futuros = agenda.filter((a) => a.quando).sort((a, b) => new Date(a.quando) - new Date(b.quando));
  const imovelById = (id) => data.find((r) => r.id === id);

  const renderItem = (a) => {
    const w = parseWhen(a.quando);
    const cls = a.status === "Concluída" ? " done" : a.status === "Cancelada" ? " cancel" : "";
    const im = a.imovel_id ? imovelById(a.imovel_id) : null;
    const meu = a.user_id === user.id;
    return (
      <div className={"agItem" + cls} key={a.id}>
        <div className="agTime">{horaStr(w)}</div>
        <div className="agBody">
          <div className="ag-t">{a.titulo || (a.imovel_quadra ? ("Visita — " + a.imovel_quadra) : "Visita")}</div>
          <div className="ag-m">
            {a.contato_nome ? <><b>{a.contato_nome}</b>{a.contato_telefone ? " · " + a.contato_telefone : ""}</> : "Sem contato informado"}
            {a.local ? <> · {a.local}</> : null}
          </div>
          {a.descricao ? <div className="ag-m">{a.descricao}</div> : null}
          <div className="agTagRow">
            {a.contato_tipo ? <span className={pillClass(a.contato_tipo)}>{a.contato_tipo}</span> : null}
            <span className="pill">{a.status || "Agendada"}</span>
            <span className="pill">agendou: {window.emailPrefix(a.usuario_email || "")}</span>
            {a.imovel_link ? <a href={a.imovel_link} target="_blank" rel="noopener" className="tBtn">anúncio ↗</a> : null}
          </div>
        </div>
        <div className="agActions">
          {im ? <button className="tBtn" onClick={() => onOpenImovel(a.imovel_id)}>ver imóvel + análise</button> : null}
          {meu ? <button className="tBtn" onClick={() => setForm(a)}>editar</button> : null}
          {meu ? <button className="tBtn" onClick={() => excluir(a)}>excluir</button> : null}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="anBlock">
        <div className="agHead">
          <Segmented size="sm" value={modo} onChange={setModo}
            options={[{ value: "dia", label: "Por dia" }, { value: "lista", label: "Todos (lista)" }]} />
          {modo === "dia" ? (
            <>
              <Button size="sm" variant="outline" onClick={() => addDays(-1)}>‹ dia anterior</Button>
              <Button size="sm" variant="outline" onClick={() => { const d = new Date(); d.setHours(0, 0, 0, 0); setDay(d); }}>Hoje</Button>
              <Button size="sm" variant="outline" onClick={() => addDays(1)}>próximo dia ›</Button>
              <Input size="sm" type="date" value={chave} onChange={(e) => { const [Y, M, D] = e.target.value.split("-").map(Number); setDay(new Date(Y, M - 1, D)); }} />
            </>
          ) : null}
          <div style={{ flex: 1 }}></div>
          <Button size="sm" onClick={() => setForm({})}>+ Novo agendamento</Button>
        </div>
        {modo === "dia" ? <div className="agDayTitle">{diaTitulo(day)}</div> : <div className="agDayTitle">Todos os agendamentos</div>}
      </div>

      {loading ? <div className="anBlock agEmpty">Carregando agenda…</div> : (
        modo === "dia" ? (
          doDia.length ? <div>{doDia.map(renderItem)}</div> : <div className="anBlock agEmpty">Nenhum agendamento neste dia. Use “+ Novo agendamento”.</div>
        ) : (
          futuros.length ? (
            <div>{(() => {
              let ultimaData = null; const out = [];
              futuros.forEach((a) => {
                const dk = dateKey(parseWhen(a.quando));
                if (dk !== ultimaData) { ultimaData = dk; out.push(<div key={"h" + dk} className="agDayTitle" style={{ margin: "14px 0 8px" }}>{diaTitulo(parseWhen(a.quando))}</div>); }
                out.push(renderItem(a));
              });
              return out;
            })()}</div>
          ) : <div className="anBlock agEmpty">Nenhum agendamento cadastrado ainda.</div>
        )
      )}

      {form ? <AgendaForm user={user} data={data} editing={form.id ? form : null} dayKey={chave}
        onClose={() => setForm(null)} onSaved={() => { setForm(null); load(); }} onToast={onToast} /> : null}
    </div>
  );
}

Object.assign(window, { AgendaView });
</script>
<script type="text/babel">
/* Nossa Casa · Painel — app principal (adaptado p/ Supabase) */
const FILTER_DEFAULTS = {
  origens: ["W Imóveis", "DF Imóveis"],
  regioes: ["Asa Norte", "Asa Sul"],
  tipos: ["Venda", "Aluguel"],
  quadras: [],
  ativos: true, inativos: false,
  dias: "",
  precoMin: "", precoMax: "",
  m2Min: "", m2Max: "",
  pm2Min: "", pm2Max: "",
  quartos: [], banheiros: [], suites: [], vagas: [], andares: [],
  soCont: false, soNota: false,
  soMeuVisualizado: false, visualizadoPor: [],
  mostrarSemInteresse: false, semInteressePor: [],
  fotos: false,
};

const toggleIn = (arr, v) => (arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);

/* grupo de botões numéricos (1 2 3 4+) */
function NumGroup({ values, selected, onToggle }) {
  return (
    <div className="numGroup">
      {values.map((v) => (
        <button key={v} type="button" className={"numBtn" + (selected.includes(v) ? " on" : "")}
          onClick={() => onToggle(v)}>{v === 4 ? "4+" : v}</button>
      ))}
    </div>
  );
}

/* grupo com rótulos (usado no Andar: Térreo, 1º, 2º, 3º, 4º+, Cobertura) */
function LabelGroup({ options, selected, onToggle }) {
  return (
