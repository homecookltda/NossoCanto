<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nossa Casa · Painel de Apartamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
:root {
  /* ---- Neutros (papel quente) ---- */
  --bg: #f6f5f1;            /* fundo da aplicação */
  --surface-card: #ffffff;  /* cartões, painéis */
  --surface-inset: #fafaf7; /* inputs, células kv, thead */
  --ink: #21252b;           /* texto principal */
  --ink-2: #4b5158;         /* texto secundário */
  --muted: #6e747b;         /* rótulos, legendas */
  --line: #e7e4dd;          /* bordas padrão */
  --line-strong: #d5d1c7;   /* bordas de foco leve / divisores fortes */

  /* ---- Marca ---- */
  --accent: #2f6b4f;        /* verde Nossa Casa — ações, foco, seleção */
  --accent-ink: #24543e;    /* hover/pressed do accent */
  --accent-soft: #e8f1ec;   /* fundos de seleção, hover de linha */
  --accent-ring: rgba(47, 107, 79, 0.22); /* anel de foco */
  --on-accent: #ffffff;

  /* ---- Semânticas de domínio ---- */
  --venda: #6b4ec9;         /* operação Venda (mapa + tags) */
  --venda-soft: #efeafa;
  --aluguel: #0e7490;       /* operação Aluguel (mapa + tags) */
  --aluguel-soft: #e3f2f6;
  --norte: #2563a8;         /* Asa Norte */
  --norte-soft: #e8f0f9;
  --sul: #b45309;           /* Asa Sul */
  --sul-soft: #fdf0e3;

  /* ---- Estado ---- */
  --good: #2e7d4f;
  --good-soft: #e7f4ec;
  --warn: #b45309;
  --warn-soft: #fdf0e3;
  --bad: #c2413b;
  --bad-soft: #fbe9e8;

  /* ---- Aliases semânticos ---- */
  --text-body: var(--ink);
  --text-secondary: var(--ink-2);
  --text-label: var(--muted);
  --border-input: var(--line);
  --border-input-focus: var(--accent);
  --surface-hover: var(--accent-soft);
}

:root {
  --font-sans: "Figtree", -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;

  /* Escala */
  --text-xs: 11px;    /* rótulos uppercase, contadores */
  --text-sm: 12.5px;  /* legendas, metadados */
  --text-base: 14px;  /* corpo padrão da UI */
  --text-md: 15px;    /* corpo destacado, células principais */
  --text-lg: 17px;    /* títulos de modal/seção */
  --text-xl: 20px;    /* título de página */
  --text-num: 22px;   /* números de destaque (stats) */
  --text-display: 28px; /* preço em destaque */

  /* Pesos */
  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;

  --leading-tight: 1.2;
  --leading-normal: 1.5;

  /* Rótulo uppercase padrão (filtros, thead, stats) */
  --label-tracking: 0.06em;
}

:root {
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;

  /* Raios (herdados do painel original) */
  --radius-card: 14px;
  --radius-modal: 18px;
  --radius-input: 10px;
  --radius-btn: 10px;
  --radius-sm: 8px;
  --radius-pill: 999px;

  /* Alvos de toque */
  --hit-min: 36px;   /* desktop denso */
  --hit-touch: 44px; /* mobile */
}

:root {
  --shadow-card: 0 1px 2px rgba(24, 30, 26, 0.04), 0 8px 24px rgba(24, 30, 26, 0.06);
  --shadow-pop: 0 12px 40px rgba(24, 30, 26, 0.16);
  --shadow-btn: 0 2px 8px rgba(47, 107, 79, 0.25);
  --focus-ring: 0 0 0 3px var(--accent-ring);

  --ease-spring: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */
  --dur-fast: 0.15s; /* @kind other */
  --dur-base: 0.2s; /* @kind other */
  --dur-slow: 0.3s; /* @kind other */

  --backdrop: rgba(24, 30, 26, 0.45);
}




*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow-x:hidden} /* nunca scroll horizontal na página; áreas com scroll próprio (tabela, etc.) continuam livres */
body{font-family:var(--font-sans);background:var(--bg);color:var(--ink);font-size:var(--text-base);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
#root,.shell{height:100%}
.shell{display:flex;flex-direction:column}

/* ---------- header ---------- */
header.top{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 18px;flex:0 0 auto;
  flex-wrap:wrap;row-gap:6px}
header.top .brand{font-weight:800;letter-spacing:-.01em;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
header.top .brand small{color:var(--muted);font-weight:500;margin-left:4px;font-size:12.5px;font-variant-numeric:tabular-nums}
header.top .spacer{flex:1}
header.top .who{color:var(--muted);font-size:var(--text-sm)}
.menuBtn{display:none;align-items:center;gap:6px;font:inherit;font-weight:600;font-size:13px;padding:7px 12px;
  border:1px solid var(--line);border-radius:9px;background:var(--surface-card);color:var(--ink);cursor:pointer}

/* ---------- layout: filtros SEMPRE visíveis ---------- */
.layout{display:grid;grid-template-columns:256px minmax(0,1fr);gap:0;flex:1;min-height:0}
aside.filters{background:var(--surface-card);border-right:1px solid var(--line);overflow-y:auto;padding:14px 16px 20px;min-height:0}
.fTop{display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:1px solid var(--line);margin-bottom:4px}
.fTop b{font-size:14px;display:flex;align-items:center;gap:7px}
.fTop .fsecReset{margin-left:auto}
.fsec{padding:10px 0 4px}
.fsecHead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fsecHead h3{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--label-tracking);
  color:var(--muted);margin:0;font-weight:700;display:flex;align-items:center;gap:6px}
.activeDot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block}
.fsecReset{border:none;background:none;color:var(--accent);font:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:2px 4px;border-radius:6px}
.fsecReset:hover{background:var(--accent-soft)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.numGroup{display:flex;gap:6px}
.numBtn{flex:1;padding:7px 0;border:1px solid var(--line);border-radius:9px;background:var(--surface-inset);
  font:inherit;font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:all var(--dur-fast) ease}
.numBtn:hover{border-color:var(--line-strong)}
.numBtn.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--shadow-btn)}
.fApply{margin-top:14px}
.quadraList{max-height:230px;overflow-y:auto;padding-right:2px}

/* ---------- conteúdo ---------- */
main{display:flex;flex-direction:column;min-width:0;min-height:0;padding:12px 16px 16px;gap:10px}
.chipsBar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:0 0 auto}
.countLine{color:var(--muted);font-size:var(--text-sm)}
.countLine b{color:var(--ink)}

/* topo fixo (chips + KPIs) e area rolavel apenas da tabela */
.topFixed{flex:0 0 auto;display:flex;flex-direction:column;gap:12px;margin-bottom:12px}
.listCol{display:flex;flex-direction:column;min-height:0;gap:8px;flex:1}
.sortRow{display:flex;gap:8px;align-items:center;flex:0 0 auto}
.dirBtn{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:var(--surface-card);
  font:inherit;font-weight:700;cursor:pointer;color:var(--ink-2)}
.dirBtn:hover{background:var(--surface-inset)}
.list{overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:8px;padding-right:2px;padding-bottom:4px}
.empty{padding:40px;text-align:center;color:var(--muted);background:var(--surface-card);
  border:1px solid var(--line);border-radius:var(--radius-card)}

/* ---------- elementos base da linha (usados tanto na tabela quanto nos cartões) ---------- */
.tPrimary{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tPreco{font-weight:700;font-size:14.5px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.tSub{margin-top:3px;font-size:12px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tSub b{color:var(--ink);font-weight:600}
.tActions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}
.tBtn{padding:5px 9px;border-radius:7px;border:1px solid var(--line);background:var(--surface-inset);
  font:inherit;font-size:11.5px;font-weight:600;color:var(--accent-ink);cursor:pointer;
  text-decoration:none;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;line-height:1.3}
.tBtn:hover{background:var(--accent-soft);border-color:var(--accent);text-decoration:none}
.tEmpty{padding:40px;text-align:center;color:var(--muted);width:100%}
.tThumb{width:34px;height:26px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex:0 0 auto}
.selBox{width:17px;height:17px;accent-color:var(--accent);cursor:pointer;flex:0 0 auto}

/* ============================================================================================
   TABELA EM GRID (desktop/tablet) — cabeçalho e a coluna "Anúncio" ficam fixos ao rolar na
   horizontal; a própria tabela tem scroll vertical interno para que os KPIs e filtros do topo
   nunca precisem rolar junto. Sem "table-layout" nenhum: é tudo CSS Grid controlado pelo React
   (grid-template-columns é montado dinamicamente conforme as colunas escolhidas no "Colunas").
============================================================================================ */
.listCol{position:relative}
.tableScroll{flex:1;min-height:0;overflow:auto;background:var(--surface-card);border:1px solid var(--line);
  border-radius:var(--radius-card);overscroll-behavior:contain}
.gridTable{display:grid;min-width:100%;width:max-content}
.gridRow{display:contents}
.gCell{padding:10px 12px;border-bottom:1px solid var(--line);background:var(--surface-card);
  display:flex;align-items:center;min-width:0;font-size:13.5px;color:var(--ink-2)}
.gCell.num{justify-content:flex-end;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.gCell .cSub{font-size:11.5px;color:var(--muted);font-weight:400}
.gHead{position:sticky;top:0;z-index:3;background:var(--surface-inset);color:var(--muted);
  font-size:10.5px;text-transform:uppercase;letter-spacing:var(--label-tracking);font-weight:700;
  cursor:default;user-select:none;border-bottom:1px solid var(--line-strong)}
.gHead.sortable{cursor:pointer}
.gHead.sortable:hover{color:var(--ink)}
.gHead .arrow{opacity:.5;font-size:9px;margin-left:3px}
.gHeadStatus{justify-content:space-between;gap:8px}
.gMain{flex-direction:column;align-items:flex-start;gap:2px;font-size:13.5px;color:var(--ink)}
.gStatus{flex-direction:column;align-items:flex-start;gap:6px}
.pinLeft0{position:sticky;left:0;z-index:1}
.pinLeft1{position:sticky;left:36px;z-index:1;box-shadow:2px 0 6px -4px rgba(0,0,0,.25)}
.gHead.pinLeft0,.gHead.pinLeft1{z-index:4}
.gridRow:hover .gCell{background:var(--accent-soft)}
.gridRow.rowSel .gCell{background:var(--accent-soft)}
.gridRow.inativo .gCell{opacity:.55}
.gridRow{cursor:pointer}
.gridEmptyRow{grid-column:1/-1;padding:40px;text-align:center;color:var(--muted)}

/* ---------- botão + painel do seletor de colunas ---------- */
.colPickerWrap{position:relative;display:inline-flex}
.colPickerBtn{white-space:nowrap}
.colPickerPanel{position:absolute;top:calc(100% + 6px);right:0;z-index:30;width:240px;max-height:340px;
  overflow-y:auto;background:var(--surface-card);border:1px solid var(--line-strong);border-radius:12px;
  box-shadow:var(--shadow-pop);padding:6px 0}
.colPickerHead{display:flex;align-items:center;justify-content:space-between;padding:6px 12px 8px;
  border-bottom:1px solid var(--line);margin-bottom:4px;text-transform:none;letter-spacing:0}
.colPickerHead b{font-size:12.5px;color:var(--ink);font-weight:700}
.colPickerList{display:flex;flex-direction:column}
.colPickerItem{display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:13px;color:var(--ink-2);
  cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500}
.colPickerItem:hover{background:var(--surface-inset)}
.colPickerItem input{accent-color:var(--accent);cursor:pointer}

/* ============================================================================================
   MODO CARTÃO (celular, <760px) — mesma tabela, mesmas colunas escolhidas, em formato de lista
   vertical fácil de tocar. Nada de scroll horizontal aqui: a página inteira rola normalmente.
============================================================================================ */
.cardListWrap{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
.cardListHead{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  position:sticky;top:0;z-index:5;background:var(--bg);padding:4px 0}
.cardSelAll{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-2);font-weight:600}
.cardList{display:flex;flex-direction:column;gap:10px}
.rowCard{background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:12px 14px;box-shadow:var(--shadow-card);cursor:pointer}
.rowCard.sel{border-color:var(--accent);background:var(--accent-soft)}
.rowCard.inativo{opacity:.6}
.rowCardTop{display:flex;align-items:flex-start;gap:10px}
.rowCardCheck{margin-top:3px}
.rowCardTitle{flex:1;min-width:0}
.rowCardPrice{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.rowCardSub{margin-top:2px;font-size:12.5px;color:var(--ink-2)}
.rowCardGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px 12px;margin:10px 0;
  padding:10px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.rowCardField{display:flex;flex-direction:column;gap:1px;min-width:0}
.rcLbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:var(--label-tracking);font-weight:700}
.rcVal{font-size:13px;color:var(--ink);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rowCard .stIcons{margin-top:4px}
.rowCard .tActions{margin-top:10px}

/* ---------- ícones de status: cores dos novos tipos (visita / negociação) ---------- */
.stIc.visita{background:var(--good-soft);color:var(--good);border-color:transparent}
.stIc.voltar{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
.stIc.negoc{background:var(--venda-soft);color:var(--venda);border-color:transparent}
.stIc.resp{background:var(--sul-soft);color:var(--sul);border-color:transparent}

/* ---------- linha do tempo de negociação (dentro do modal) ---------- */
.negTl{margin-bottom:12px}
.negNossa{color:var(--accent-ink)}
.negDeles{color:var(--sul)}
.negDel{border:none;background:none;color:var(--muted);cursor:pointer;font-size:12px;margin-left:6px;
  padding:2px 5px;border-radius:5px}
.negDel:hover{background:var(--bad-soft);color:var(--bad)}
.negForm{display:grid;grid-template-columns:1.1fr 1fr 1fr 1.4fr auto;gap:8px;align-items:end}
.negForm .Button,.negForm button{white-space:nowrap}

/* ---------- resumo (KPIs sempre visíveis, no topo) ---------- */
.statsWrap{display:flex;flex-direction:column;gap:12px}
.statsGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
@media (max-width:760px){
  /* no celular vira uma tira horizontal de cartões compactos — mesma garantia via flex:0 0 auto
     (nenhum cartão encolhe/sobrepõe o vizinho); rola suave com snap, como um carrossel nativo */
  .statsGrid{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-snap-type:x proximity;
    gap:10px;padding-bottom:6px;scrollbar-width:none}
  .statsGrid::-webkit-scrollbar{display:none}
  .statsGrid > div{flex:0 0 78vw;max-width:280px;scroll-snap-align:start}
}

/* ---------- modal ---------- */
.modalBg{position:fixed;inset:0;background:var(--backdrop);backdrop-filter:blur(3px);z-index:40;
  display:flex;align-items:center;justify-content:center;padding:20px;animation:fade .2s}
.modal{background:var(--surface-card);width:min(720px,96vw);max-height:92vh;overflow:auto;border-radius:var(--radius-modal);
  box-shadow:var(--shadow-pop);animation:pop .35s var(--ease-spring)}
.mhead{display:flex;align-items:flex-start;gap:12px;padding:20px 22px 6px}
.mhead h2{font-size:20px;margin:0;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.mhead .sub{color:var(--muted);font-size:13px;margin-top:3px}
.xBtn{margin-left:auto;font-size:18px;color:var(--muted);padding:2px 9px;border-radius:8px;border:none;background:none;cursor:pointer;font-family:inherit}
.xBtn:hover{background:var(--line)}
.mbody{padding:8px 22px 22px}
.kv{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin:10px 0}
.cell{background:var(--surface-inset);border:1px solid var(--line);border-radius:var(--radius-input);padding:9px 11px}
.cell .kk{color:var(--muted);font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:var(--label-tracking)}
.cell .vv{font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.descCell{margin-top:10px}
.descTxt{margin-top:4px;white-space:pre-wrap;font-size:13.5px;color:var(--ink-2)}
.crm{border-top:1px solid var(--line);margin-top:14px;padding-top:16px}
.crm h3{margin:0 0 12px;font-size:14px}
.togs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.crmGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.areaLbl{display:block;margin-top:12px;font-size:var(--text-xs);color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:var(--label-tracking)}
.areaLbl textarea{width:100%;margin-top:6px;padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius-input);
  background:var(--surface-inset);font:inherit;font-size:14px;color:var(--ink);text-transform:none;letter-spacing:normal;resize:vertical}
.areaLbl textarea:focus{outline:none;border-color:var(--accent);box-shadow:var(--focus-ring);background:#fff}
.savebar{display:flex;gap:10px;align-items:center;margin-top:14px}
.savedMsg{color:var(--good);font-size:12.5px;opacity:0;transition:opacity var(--dur-slow)}
.savedMsg.show{opacity:1}

/* ---------- toast / anims ---------- */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:11px 18px;border-radius:12px;box-shadow:var(--shadow-pop);z-index:70;opacity:0;transition:opacity var(--dur-slow);pointer-events:none}
.toast.show{opacity:1}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:none}}
.drawerBg{display:none}
.drawerOnly{display:none}

/* ============================ ANÁLISES / AGENDA (adições) ============================ */
/* ---------- navegação principal (7 abas) — SEMPRE rola na horizontal, nunca encolhe/sobrepõe ----------
   flex:0 0 auto em cada aba é uma garantia de especificação do CSS: nenhum navegador jamais vai
   comprimir esses botões, então texto de aba nunca fica "esmagado" ou sobreposto, em nenhuma
   largura de tela. */
.mainTabs{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;background:var(--surface-card);border:1px solid var(--line);
  border-radius:12px;padding:4px;box-shadow:var(--shadow-card);margin-bottom:12px;
  scrollbar-width:none;max-width:100%}
.mainTabs::-webkit-scrollbar{display:none}
.mainTab{flex:0 0 auto;scroll-snap-align:start;white-space:nowrap;display:inline-flex;
  align-items:center;gap:6px;padding:8px 16px;min-height:40px;border-radius:9px;border:none;
  background:transparent;color:var(--muted);font:inherit;font-weight:700;font-size:14px;
  cursor:pointer;transition:all var(--dur-fast) ease}
.mainTab:hover{color:var(--ink)}
.mainTab.on{background:var(--accent);color:#fff;box-shadow:var(--shadow-btn)}
.mainTabCount{font-size:10.5px;font-weight:700;padding:0 6px;border-radius:999px;
  background:var(--surface-inset);color:var(--muted);border:1px solid var(--line);
  font-variant-numeric:tabular-nums}
.mainTab.on .mainTabCount{background:rgba(255,255,255,.25);color:#fff;border-color:transparent}
@media (max-width:760px){
  .mainTab{padding:8px 13px;font-size:13px;min-height:44px} /* alvo de toque confortável (Apple HIG) */
}
.anBlock { background:var(--surface-card); border:1px solid var(--line); border-radius:var(--radius-card, 16px);
  box-shadow:var(--shadow-card); padding:16px; margin-bottom:16px; }
.anBlock > h3 { margin:0 0 4px; font-size:15px; }
.anBlock > .anHint { color:var(--muted); font-size:12.5px; margin:0 0 12px; }
.anGrid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
.miniStat { background:var(--surface-inset); border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
.miniStat .ms-k { color:var(--muted); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:.02em; }
.miniStat .ms-v { font-size:17px; font-weight:700; margin-top:3px; font-variant-numeric:tabular-nums; }
.miniStat .ms-s { color:var(--muted); font-size:11.5px; margin-top:2px; }
.miniStat.hl { background:var(--accent-soft); border-color:var(--accent); }

/* selo de posição no ranking */
.rankPos { display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:26px;
  padding:0 7px; border-radius:8px; background:var(--surface-inset); border:1px solid var(--line);
  font-weight:700; font-variant-numeric:tabular-nums; font-size:12.5px; }
.rankPos.top { background:var(--accent); color:#fff; border-color:var(--accent); }

.rankTable { width:100%; border-collapse:collapse; font-size:13.5px; }
.rankTable th, .rankTable td { padding:9px 10px; border-bottom:1px solid var(--line); text-align:left; }
.rankTable th { color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.02em; }
.rankTable td.num, .rankTable th.num { text-align:right; font-variant-numeric:tabular-nums; }
.rankTable tr.selRow td { background:var(--accent-soft); }
.rankTable tr.clickRow { cursor:pointer; }
.rankTable tr.clickRow:hover td { background:var(--surface-hover); }

/* info / "como ler" */
.infoTip { position:relative; display:inline-flex; }
.infoDot { width:18px; height:18px; border-radius:999px; border:1px solid var(--line-strong); background:var(--surface-inset);
  color:var(--muted); font-size:11px; font-weight:800; display:inline-flex; align-items:center; justify-content:center;
  cursor:pointer; font-style:italic; font-family:Georgia,serif; }
.infoDot:hover { border-color:var(--accent); color:var(--accent); }
.infoBox { position:absolute; z-index:40; top:24px; left:0; width:min(320px,80vw); background:var(--surface-card);
  border:1px solid var(--line-strong); border-radius:12px; box-shadow:var(--shadow-pop, 0 12px 30px rgba(0,0,0,.16));
  padding:12px 13px; font-size:12.5px; color:var(--ink-2); line-height:1.5; }
.infoBox b { color:var(--ink); }

.chartHead { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.chartHead .ch-title { font-weight:700; font-size:13.5px; }
.chartWrap svg { width:100%; height:auto; display:block; }
.axisLbl { fill:var(--muted); font-size:10.5px; }
.barLbl { fill:var(--ink-2); font-size:11px; }
.barVal { fill:var(--ink); font-size:11px; font-weight:700; }

/* leitura textual da análise */
.verdict { display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px;
  font-weight:700; font-size:12.5px; }
.verdict.caro { background:var(--bad-soft); color:var(--bad); }
.verdict.barato { background:var(--good-soft); color:var(--good); }
.verdict.media { background:var(--surface-inset); color:var(--ink-2); border:1px solid var(--line); }
.readOut { background:var(--surface-inset); border:1px solid var(--line); border-left:3px solid var(--accent);
  border-radius:10px; padding:11px 13px; font-size:13px; line-height:1.6; color:var(--ink-2); }
.readOut b { color:var(--ink); }
.readOut + .readOut { margin-top:8px; }

/* barra de posição min–média–máx */
.posTrack { position:relative; height:44px; margin:6px 0 2px; }
.posLine { position:absolute; top:22px; left:0; right:0; height:4px; border-radius:3px;
  background:linear-gradient(90deg,var(--good-soft),var(--surface-inset),var(--bad-soft)); }
.posTick { position:absolute; top:14px; width:2px; height:20px; background:var(--line-strong); }
.posTickLbl { position:absolute; top:0; transform:translateX(-50%); font-size:10.5px; color:var(--muted); white-space:nowrap; }
.posDot { position:absolute; top:15px; width:16px; height:16px; border-radius:999px; background:var(--accent);
  border:3px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.25); transform:translateX(-50%); }
.posValLbl { position:absolute; top:30px; transform:translateX(-50%); font-size:11px; font-weight:700; color:var(--accent-ink); white-space:nowrap; }

/* agenda */
.agHead { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.agDayTitle { font-weight:700; font-size:16px; text-transform:capitalize; }
.agItem { display:flex; gap:12px; align-items:flex-start; background:var(--surface-card); border:1px solid var(--line);
  border-radius:14px; padding:12px 14px; margin-bottom:10px; box-shadow:var(--shadow-card); }
.agItem.done { opacity:.62; }
.agItem.cancel { opacity:.5; text-decoration:line-through; }
.agTime { font-weight:800; font-size:16px; font-variant-numeric:tabular-nums; min-width:58px; color:var(--accent-ink); }
.agBody { flex:1; min-width:0; }
.agBody .ag-t { font-weight:700; font-size:14px; }
.agBody .ag-m { color:var(--ink-2); font-size:12.5px; margin-top:2px; }
.agBody .ag-m b { color:var(--ink); }
.agTagRow { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
.agActions { display:flex; flex-direction:column; gap:6px; }
.agEmpty { color:var(--muted); text-align:center; padding:30px 10px; }
.pill { display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px; font-size:11.5px; font-weight:600;
  background:var(--surface-inset); border:1px solid var(--line); color:var(--ink-2); }
.pill.corretor { background:var(--norte-soft); color:var(--norte); border-color:transparent; }
.pill.proprietario { background:var(--sul-soft); color:var(--sul); border-color:transparent; }
.pill.imobiliaria { background:var(--venda-soft); color:var(--venda); border-color:transparent; }

/* ============================ RESPONSIVO ============================ */
/* ============================================================================================
   RESPONSIVO — três larguras de referência, usadas de forma consistente em todo o app:
     1040px — o painel de filtros vira gaveta (dá mais espaço de verdade para a tabela);
      760px — a tabela vira lista de cartões (mesmo breakpoint usado em ListingTable via JS);
      420px — ajustes finos para telas muito pequenas (iPhone SE e afins).
============================================================================================ */

/* ---------- ≤1040px: filtros em gaveta, mais espaço para a tabela ---------- */
@media (max-width:1040px){
  .menuBtn{display:inline-flex}
  .layout{grid-template-columns:1fr}
  aside.filters{position:fixed;top:0;left:0;height:100dvh;width:88vw;max-width:340px;z-index:45;
    transform:translateX(-100%);transition:transform .28s var(--ease-spring);box-shadow:var(--shadow-pop)}
  aside.filters.open{transform:translateX(0)}
  .drawerBg{display:block;position:fixed;inset:0;background:var(--backdrop);backdrop-filter:blur(2px);z-index:44;animation:fade .2s}
  .drawerOnly{display:flex}
}

/* ---------- ≤760px: cartões no lugar da tabela, cabeçalho/abas condensados, página rola normalmente ---------- */
@media (max-width:760px){
  header.top{padding:8px 10px;gap:6px}
  header.top .brand{font-size:14.5px}
  header.top .who{display:none}
  header.top .btn,.header .btn{padding:6px 10px}
  input,select,textarea{font-size:16px !important} /* evita zoom automático do iOS ao focar campo */
  main{overflow-y:visible;padding:8px 10px 14px;gap:8px}
  .listCol{overflow:visible}
  .chipsBar{gap:6px}
  .crmGrid{grid-template-columns:1fr}
  .kv{grid-template-columns:1fr 1fr}
  .modalBg{padding:0;align-items:flex-end}
  .modal{width:100%;max-height:94dvh;border-radius:20px 20px 0 0;animation:slideup .3s var(--ease-spring)}
  .mhead{padding:16px 16px 4px}
  .mbody{padding:6px 16px 20px}
  .negForm{grid-template-columns:1fr 1fr;gap:8px}
  .negForm > :nth-child(4){grid-column:1/-1}
  .negForm > :nth-child(5){grid-column:1/-1}
  .bulkBar{bottom:6px;border-radius:12px;padding:8px 10px;gap:6px}
  .bulkBtn{padding:6px 9px;font-size:11.5px}
  .actGrid{grid-template-columns:repeat(2,1fr)}
  .sugCard{flex-direction:column}
  .sugActions{flex-direction:row;flex-wrap:wrap}
  .rowCardGrid{grid-template-columns:1fr 1fr}
  .colPickerPanel{position:fixed;top:auto;bottom:0;left:0;right:0;width:100%;max-height:70vh;
    border-radius:16px 16px 0 0;box-shadow:var(--shadow-pop)}
}

/* ---------- ≤420px: telas muito estreitas ---------- */
@media (max-width:420px){
  .rowCardGrid{grid-template-columns:1fr}
  header.top .brand small{display:none}
  .negForm{grid-template-columns:1fr}
  .negForm > *{grid-column:1/-1}
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* ============================ Adições (login, galeria, lightbox, miniatura) ============================ */
#login{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--bg),#eef0ea);font-family:var(--font-sans)}
.loginCard{background:var(--surface-card);width:min(380px,92vw);padding:36px 30px;border-radius:var(--radius-modal);
  box-shadow:var(--shadow-pop);animation:pop .5s var(--ease-spring)}
.loginCard h1{font-size:21px;margin:0 0 4px;letter-spacing:-.01em;font-weight:800}
.loginCard p{color:var(--muted);margin:0 0 22px;font-size:var(--text-sm)}
.loginField{margin-bottom:14px}
.loginField label{display:block;font-size:var(--text-xs);color:var(--muted);margin-bottom:6px;font-weight:700;
  text-transform:uppercase;letter-spacing:var(--label-tracking)}
.loginField input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius-input);
  background:var(--surface-inset);font:inherit;font-size:var(--text-base);color:var(--ink);
  transition:all var(--dur-fast) ease;box-sizing:border-box}
.loginField input:focus{outline:none;border-color:var(--accent);background:#fff;box-shadow:var(--focus-ring)}
.loginBtn{background:var(--accent);color:var(--on-accent);padding:11px 16px;border-radius:var(--radius-btn);
  font-weight:700;width:100%;border:none;cursor:pointer;font:inherit;font-size:var(--text-base);
  transition:all var(--dur-fast) ease;box-shadow:var(--shadow-btn)}
.loginBtn:hover{background:var(--accent-ink);transform:translateY(-1px)}
.loginErr{color:var(--bad);font-size:12.5px;min-height:16px;margin-top:6px}
.bootLoading{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--muted);
  font-size:var(--text-sm);gap:8px;font-family:var(--font-sans)}
.bootSpin{width:20px;height:20px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;
  display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.galleryGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:14px 0}
.galleryGrid img{width:100%;height:88px;object-fit:cover;border-radius:var(--radius-input);
  border:1px solid var(--line);cursor:zoom-in;transition:transform var(--dur-fast) ease,box-shadow var(--dur-fast) ease;
  background:var(--surface-inset)}
.galleryGrid img:hover{transform:scale(1.03);box-shadow:var(--shadow-card)}
.lightboxBg{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:80;display:none;align-items:center;
  justify-content:center;padding:20px;cursor:zoom-out}
.lightboxBg.open{display:flex;animation:fade .2s}
.lightboxBg img{max-width:96vw;max-height:92vh;border-radius:10px}
.lbNav{position:fixed;top:50%;transform:translateY(-50%);z-index:82;width:52px;height:52px;border-radius:999px;
  border:none;background:rgba(255,255,255,.14);color:#fff;font-size:30px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .15s ease;-webkit-tap-highlight-color:transparent}
.lbNav:hover{background:rgba(255,255,255,.28)}
.lbPrev{left:16px}.lbNext{right:16px}
.lbClose{position:fixed;top:16px;right:18px;z-index:82;width:40px;height:40px;border-radius:999px;border:none;
  background:rgba(255,255,255,.14);color:#fff;font-size:20px;cursor:pointer}
.lbClose:hover{background:rgba(255,255,255,.28)}
.lbCount{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:82;color:#fff;font-size:14px;
  font-weight:600;background:rgba(0,0,0,.45);padding:6px 14px;border-radius:999px;font-variant-numeric:tabular-nums}
.lbThumbs{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);z-index:82;display:flex;gap:6px;
  max-width:92vw;overflow-x:auto;padding:6px}
.lbThumbs img{width:52px;height:40px;flex:0 0 auto;object-fit:cover;border-radius:6px;cursor:pointer;opacity:.5;border:2px solid transparent}
.lbThumbs img.on{opacity:1;border-color:#fff}
@media (max-width:640px){ .lbNav{width:44px;height:44px;font-size:26px} .lbThumbs{display:none} }

/* botão/estado do pool de interesse */
.tBtn.pool.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.poolStar{color:var(--accent);font-weight:800}

.tThumb{width:34px;height:26px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex:0 0 auto}

.filterSubLabel{margin:8px 0 2px;font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:var(--label-tracking)}
.viewsBadge{font-size:11px;color:var(--muted);background:var(--surface-inset);border:1px solid var(--line);
  border-radius:var(--radius-pill);padding:1px 7px;font-variant-numeric:tabular-nums}
.tBtn.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink)}
.markList{margin-top:10px;font-size:var(--text-sm);color:var(--ink-2)}
.markList b{color:var(--ink);font-weight:700;font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--label-tracking)}
.markList ul{margin:4px 0 0;padding-left:18px}
.markList li{margin:2px 0}


/* ============================ NOVO · v3 ============================ */

/* ---------- barra de seleção em massa ---------- */
.bulkBar{position:sticky;bottom:10px;z-index:25;display:flex;gap:8px;align-items:center;flex-wrap:wrap;
  background:var(--ink);color:#fff;border-radius:14px;padding:10px 14px;box-shadow:var(--shadow-pop);margin-top:8px}
.bulkBar b{font-variant-numeric:tabular-nums}
.bulkBtn{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font:inherit;
  font-size:12.5px;font-weight:600;padding:7px 11px;border-radius:9px;cursor:pointer;transition:background .15s}
.bulkBtn:hover{background:rgba(255,255,255,.2)}
.bulkBtn.danger{background:var(--bad);border-color:var(--bad)}
.bulkBtn.ok{background:var(--accent);border-color:var(--accent)}
.bulkBtn:disabled{opacity:.5;cursor:default}
.bulkSpacer{flex:1}
.selHint{font-size:12px;color:rgba(255,255,255,.75)}

/* ---------- score / oportunidades ---------- */
.scoreBadge{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:12.5px;padding:3px 10px;
  border-radius:var(--radius-pill);font-variant-numeric:tabular-nums;white-space:nowrap}
.scoreBadge.exc{background:var(--good);color:#fff}
.scoreBadge.boa{background:var(--good-soft);color:var(--good);border:1px solid var(--good)}
.scoreBadge.obs2{background:var(--warn-soft);color:var(--warn);border:1px solid var(--warn)}
.scoreBadge.neutro{background:var(--surface-inset);color:var(--muted);border:1px solid var(--line)}
.scoreBadge.susp{background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad)}
.oppHead{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.oppDelta{font-size:11.5px;font-weight:700;font-variant-numeric:tabular-nums}
.oppDelta.neg{color:var(--good)}
.oppDelta.pos{color:var(--bad)}
.breakTable{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px}
.breakTable th,.breakTable td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left}
.breakTable td.pts{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;white-space:nowrap}
.breakTable td.nt{color:var(--ink-2)}

/* ---------- modal de metodologia / algoritmo ---------- */
.methodBody h4{margin:18px 0 6px;font-size:14px}
.methodBody p,.methodBody li{font-size:13px;color:var(--ink-2);line-height:1.65}
.methodBody b{color:var(--ink)}
.methodBody ol,.methodBody ul{padding-left:20px;margin:6px 0}
.methodBody .formula{background:var(--surface-inset);border:1px solid var(--line);border-radius:10px;
  padding:10px 12px;font-size:12.5px;margin:8px 0;font-variant-numeric:tabular-nums}

/* ---------- sugestões ---------- */
.sugCard{background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);padding:12px 14px;display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.sugThumb{width:92px;height:70px;object-fit:cover;border-radius:10px;border:1px solid var(--line);flex:0 0 auto;background:var(--surface-inset)}
.sugBody{flex:1;min-width:0}
.sugTitle{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sugTitle .p{font-weight:800;font-size:15px}
.sugSpecs{color:var(--ink-2);font-size:12.5px;margin-top:2px}
.sugSpecs b{color:var(--ink)}
.sugWhy{margin-top:7px;font-size:12.5px;background:var(--accent-soft);border-radius:10px;padding:8px 11px;color:var(--accent-ink);line-height:1.5}
.sugWhy .lnk{cursor:pointer;text-decoration:underline;font-weight:700}
.sugActions{display:flex;flex-direction:column;gap:6px;flex:0 0 auto}
.simBadge{display:inline-flex;align-items:center;font-weight:800;font-size:12px;padding:2px 9px;border-radius:var(--radius-pill);
  background:var(--accent);color:#fff;font-variant-numeric:tabular-nums}

/* ---------- atividade (interações) ---------- */
.actGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.actCard{background:var(--surface-card);border:1px solid var(--line);border-radius:var(--radius-card);
  padding:12px 14px;cursor:pointer;transition:all var(--dur-fast) ease;box-shadow:var(--shadow-card)}
.actCard:hover{border-color:var(--accent);transform:translateY(-1px)}
.actCard.on{border-color:var(--accent);background:var(--accent-soft);box-shadow:var(--focus-ring)}
.actCard .n{font-size:var(--text-num);font-weight:800;font-variant-numeric:tabular-nums}
.actCard .l{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--label-tracking);color:var(--muted);font-weight:700;margin-top:2px}
.actWho{font-size:11.5px;color:var(--muted);margin-top:2px}

/* ---------- linha do tempo (histórico do imóvel) ---------- */
.tl{margin:8px 0 0;padding:0;list-style:none}
.tl li{position:relative;padding:0 0 12px 20px;font-size:12.5px;color:var(--ink-2);line-height:1.5}
.tl li::before{content:"";position:absolute;left:5px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.tl li::after{content:"";position:absolute;left:8px;top:15px;bottom:-2px;width:2px;background:var(--line)}
.tl li:last-child::after{display:none}
.tl .tlDate{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.tl .down{color:var(--good);font-weight:700}
.tl .up{color:var(--bad);font-weight:700}

/* ---------- barra de ordenação (visível só no mobile / vista de cartões) ---------- */
.sortBarMob{display:none;gap:8px;align-items:center}

/* ---------- chips de ação rápida no topo ---------- */
.quickRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.quickBtn{border:1px dashed var(--line-strong);background:var(--surface-card);color:var(--ink-2);font:inherit;
  font-size:12px;font-weight:600;padding:6px 11px;border-radius:var(--radius-pill);cursor:pointer}
.quickBtn:hover{border-color:var(--accent);color:var(--accent-ink);background:var(--accent-soft)}
.quickBtn.on{border-style:solid;border-color:var(--accent);background:var(--accent);color:#fff}

/* resumo de ações no topo do modal */
.actSummary{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 2px}

/* aviso pequeno */
.miniNote{font-size:11.5px;color:var(--muted)}

/* mostra a barra de ordenação (modo cartão) só abaixo do breakpoint tabela->cartão */
@media (max-width:760px){
  .sortBarMob{display:flex}
}

/* abas sem painel de filtros: o conteúdo ocupa a largura toda */
.layout > main:only-child{grid-column:1 / -1}

</style>
</head>
<body>

<div id="login">
  <div class="loginCard">
    <h1>Nossa Casa</h1>
    <p>Painel de apartamentos — acesso restrito.</p>
    <div class="loginField"><label>E-mail</label><input id="email" type="email" autocomplete="username" placeholder="voce@email.com"></div>
    <div class="loginField"><label>Senha</label><input id="senha" type="password" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="loginBtn" id="btnLogin" type="button">Entrar</button>
    <div class="loginErr" id="loginErr"></div>
  </div>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ============================================================================================
   CONFIG + BOOTSTRAP — a chave ANON é pública por design (segura sozinha; o RLS protege os dados).
   NUNCA coloque aqui a service_role.
============================================================================================ */
const SUPABASE_URL = "https://qxhgylbajvavdvrtbbta.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF4aGd5bGJhanZhdmR2cnRiYnRhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMjU5NzgsImV4cCI6MjA5ODgwMTk3OH0.UL32kC6UYH4goT532jGVgVVhmDZLpaYMFDWInRadM74";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY,
  { auth: { persistSession: true, autoRefreshToken: true } });
window.sb = sb;

const VENDA_OUTLIER = 100000000, ALUGUEL_OUTLIER = 200000;
function sanitizaPreco(r) {
  let p = r.preco;
  if (p != null) {
    if (r.tipo === "Venda") { while (p >= VENDA_OUTLIER) p /= 1000; }
    else if (r.tipo === "Aluguel") { while (p >= ALUGUEL_OUTLIER) p /= 1000; }
    p = Math.round(p * 100) / 100;
    if (p !== r.preco) {
      r = { ...r, preco: p, preco_m2: r.metragem_m2 ? Math.round((p / r.metragem_m2) * 100) / 100 : r.preco_m2 };
    }
  }
  return r;
}

function diasDesdePub(r) {
  if (!r.data_publicacao) return null;
  const d = new Date(r.data_publicacao + "T00:00:00");
  return Math.max(0, Math.round((new Date() - d) / 86400000));
}

function andarDe(r) {
  const t = ((r.titulo || "") + " " + (r.descricao || "")).toLowerCase();
  if (/t[ée]rreo/.test(t)) return 0;
  if (/cobertura/.test(t)) return 99;
  let m = t.match(/(\d{1,2})\s*[ºo°]?\s*(?:andar|pavimento|pav\.)/);
  if (m) return parseInt(m[1]);
  m = t.match(/(?:andar|pavimento)\s*(\d{1,2})/);
  if (m) return parseInt(m[1]);
  return null;
}

function emailPrefix(email) {
  return (email || "").split("@")[0];
}

/* Extrai um código de quadra reconhecível (ex.: "SQN 113", "SQS 108", "CLN 210", "SHIS QI 5")
   de um texto livre. Usado tanto para normalizar a quadra quanto para derivar a região — assim
   o que aparece na tela e o que é usado para filtrar NUNCA divergem entre si, mesmo quando um
   scraper só preenche "localizacao_exata" (texto livre) e deixa "quadra" vazio/nulo. */
function extrairCodigoQuadra(txt) {
  const t = String(txt || "").toUpperCase();
  const m = t.match(/\b(SQNW|SQSW|SQN|SQS|CLSW|CLN|CLS|SHIN|SHIS|SHCN|SHCS)\s*\d+[A-Z]?\b/);
  return m ? m[0].replace(/\s+/g, " ").trim() : null;
}
window.extrairCodigoQuadra = extrairCodigoQuadra;

/* Região SEMPRE derivada do CÓDIGO DE QUADRA normalizado (nunca do campo "regiao" bruto do
   banco, que pode vir ausente/inconsistente). Cai no valor bruto do banco só como último
   recurso, quando nenhum código reconhecível foi encontrado em nenhum dos dois campos. */
function regiaoDe(codigoQuadra, regiaoBanco) {
  const q = String(codigoQuadra || "").toUpperCase();
  if (/^(SQNW|SQN|CLN|SHIN|SHCN)/.test(q)) return "Asa Norte";
  if (/^(SQSW|SQS|CLSW|CLS|SHIS|SHCS)/.test(q)) return "Asa Sul";
  return regiaoBanco || null;
}
window.regiaoDe = regiaoDe;

/* Deduplica por id: se a VIEW devolver mais de uma linha para o mesmo imóvel (típico de um JOIN
   que multiplica linhas — ex.: contra marcações de vários usuários), mantemos só a primeira
   ocorrência. Sem isso, linhas duplicadas quebram a key do React (mesmo id repetido) e podem
   deixar uma linha "fantasma" na tabela que não desaparece ao filtrar. */
function dedupPorId(rows) {
  const vistos = new Map();
  let duplicados = 0;
  rows.forEach((r) => {
    if (vistos.has(r.id)) duplicados++;
    else vistos.set(r.id, r);
  });
  if (duplicados > 0) {
    console.warn("[Nossa Casa] " + duplicados + " linha(s) duplicada(s) por id vindas de v_dashboard — mantendo só a primeira ocorrência de cada. Vale conferir a view no Supabase (provável JOIN 1-para-N sem agregação).");
  }
  return [...vistos.values()];
}
window.dedupPorId = dedupPorId;

function mapRow(r0) {
  const r = sanitizaPreco(r0);
  /* código de quadra normalizado: tenta no campo "quadra" (bruto) primeiro; se não achar nada
     reconhecível, tenta em "localizacao_exata" (texto livre, ex.: "Asa Norte SQN 113"); se ainda
     assim nada bater, usa o que houver em "quadra" tal como veio do banco. */
  const codigo = extrairCodigoQuadra(r.quadra) || extrairCodigoQuadra(r.localizacao_exata) || (r.quadra || null);
  return {
    id: r.id, tipo: r.tipo, regiao: regiaoDe(codigo, r.regiao),
    quadra: r.localizacao_exata || r.quadra, quadraBase: codigo || r.quadra,
    quartos: r.quartos, banheiros: r.banheiros, suites: r.suites, vagas: r.vagas,
    m2: r.metragem_m2, preco: r.preco, precoM2: r.preco_m2, condominio: r.condominio,
    andar: andarDe(r), dias: diasDesdePub(r), ativo: r.ativo,
    contatado: r.contatado, dataContato: r.data_contato,
    nota: r.nota, proposta: r.proposta, contraproposta: r.contraproposta,
    contatoNome: r.contato_nome, contatoWhats: r.contato_whats, contatoTipo: r.contato_tipo,
    comentarios: r.comentarios, lat: r.latitude, lng: r.longitude,
    descricao: r.descricao, creci: r.creci, link: r.link,
    imagens: r.imagens || [], foto: (r.imagens && r.imagens[0]) || null,
    titulo: r.titulo,
    primeiroVisto: r.primeiro_visto || null, iptu: r.iptu,
    /* fonte do anúncio: usa a coluna origem quando existir; senão deriva do id
       (o scraper do DF Imóveis prefixa todo id com "df"; o do W Imóveis é numérico puro) */
    origem: r.origem || (String(r.id).startsWith("df") ? "DF Imóveis" : "W Imóveis"),
    /* marcações compartilhadas (visualizado / sem interesse) — minhas e de todos os usuários */
    meuVisualizado: r.meu_visualizado || false,
    minhaDataVisualizacao: r.minha_data_visualizacao || null,
    meuSemInteresse: r.meu_sem_interesse || false,
    minhaDataSemInteresse: r.minha_data_sem_interesse || null,
    visualizadoPor: r.visualizado_por || [],
    totalVisualizadoPor: r.total_visualizado_por || 0,
    semInteressePor: r.sem_interesse_por || [],
    totalSemInteresse: r.total_sem_interesse || 0,
  };
}

async function fetchAllData() {
  let all = [], from = 0, size = 1000;
  while (true) {
    const { data, error } = await sb.from("v_dashboard").select("*").range(from, from + size - 1);
    if (error) { console.error(error); throw error; }
    all = all.concat(data);
    if (data.length < size) break;
    from += size;
  }
  return all;
}
window.fetchAllData = fetchAllData;
window.mapRow = mapRow;
window.sanitizaPreco = sanitizaPreco;
window.emailPrefix = emailPrefix;

/* ---------- POOL DE INTERESSE (compartilhado entre usuários) ----------
   Tabela public.interesse (imovel_id, user_id). Um imóvel está no pool se
   pelo menos um usuário o marcou. Buscamos junto a tabela usuarios p/ saber quem. */
async function fetchInteresseMap() {
  try {
    const [ri, ru] = await Promise.all([
      sb.from("interesse").select("imovel_id,user_id,criado_em"),
      sb.from("usuarios").select("id,email"),
    ]);
    if (ri.error) throw ri.error;
    const emailById = new Map((ru.data || []).map((u) => [u.id, u.email]));
    const map = new Map();
    (ri.data || []).forEach((row) => {
      if (!map.has(row.imovel_id)) map.set(row.imovel_id, []);
      map.get(row.imovel_id).push({ user_id: row.user_id, email: emailById.get(row.user_id) || null, data: row.criado_em ? String(row.criado_em).slice(0, 10) : null });
    });
    return map;
  } catch (e) {
    /* tabela ainda não criada? o app segue funcionando; o pool fica vazio até rodar interesse.sql */
    console.warn("Pool de interesse indisponível (rode interesse.sql no Supabase):", e && e.message ? e.message : e);
    return new Map();
  }
}
function applyInteresse(rows, map, uid) {
  return rows.map((r) => {
    const arr = map.get(r.id) || [];
    return { ...r, interessePor: arr, totalInteresse: arr.length, meuInteresse: arr.some((x) => x.user_id === uid) };
  });
}
/* carrega TUDO já mesclado (imóveis + pool) — usado no load inicial e no "Atualizar" */
async function loadAllMapped(uid) {
  const [rows, imap] = await Promise.all([fetchAllData(), fetchInteresseMap()]);
  return applyInteresse(dedupPorId(rows).map(mapRow), imap, uid);
}
window.fetchInteresseMap = fetchInteresseMap;
window.applyInteresse = applyInteresse;
window.loadAllMapped = loadAllMapped;

let __resolveAuth;
window.__authReady = new Promise((res) => { __resolveAuth = res; });

function showApp(user) {
  document.getElementById("login").style.display = "none";
  document.getElementById("root").innerHTML = '<div class="bootLoading"><span class="bootSpin"></span> Carregando seus dados…</div>';
  __resolveAuth({ user });
}

async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("senha").value;
  const errEl = document.getElementById("loginErr");
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Preencha e-mail e senha."; return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = "Falha no login: " + error.message; return; }
  showApp(data.user);
}
document.getElementById("btnLogin").addEventListener("click", doLogin);
document.getElementById("senha").addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) showApp(session.user);
})();
</script>
<script>
/* ============================================================================================
   CAMADA DE DADOS · v3 — histórico de preços, agendamentos compartilhados, operações em massa
   e utilitários estatísticos (mediana/quantis). Complementa (e sobrepõe) a camada acima.
============================================================================================ */

/* ---------- utilitários estatísticos ---------- */
function quantile(sortedArr, q) {
  if (!sortedArr.length) return null;
  const pos = (sortedArr.length - 1) * q, base = Math.floor(pos), rest = pos - base;
  return sortedArr[base + 1] !== undefined ? sortedArr[base] + rest * (sortedArr[base + 1] - sortedArr[base]) : sortedArr[base];
}
function medianOf(values) {
  const v = values.filter((x) => x != null && isFinite(x)).sort((a, b) => a - b);
  return v.length ? quantile(v, 0.5) : null;
}
window.quantile = quantile;
window.medianOf = medianOf;

/* ---------- moeda "R$ 1.234.567,89" -> número ---------- */
function parseMoeda(txt) {
  if (txt == null) return null;
  const s = String(txt).replace(/[^\d,.-]/g, "").replace(/\./g, "").replace(",", ".");
  const n = parseFloat(s);
  return isFinite(n) ? n : null;
}
window.parseMoeda = parseMoeda;

/* ---------- histórico de mudanças (tabela public.historico, gravada pelo scraper) ----------
   Carrega TODAS as mudanças de preço e condomínio e agrupa por imóvel. Usado para:
   (1) linha do tempo no modal de detalhes; (2) sinal de "queda de preço" no score de oportunidade. */
async function fetchHistoricoMudancas() {
  try {
    let all = [], from = 0, size = 1000;
    while (true) {
      const { data, error } = await sb.from("historico")
        .select("imovel_id,data,campo,valor_antigo,valor_novo")
        .in("campo", ["preço", "preco", "condomínio", "condominio"])
        .order("data", { ascending: true })
        .range(from, from + size - 1);
      if (error) throw error;
      all = all.concat(data || []);
      if (!data || data.length < size) break;
      from += size;
    }
    const map = new Map();
    all.forEach((h) => {
      if (!h.imovel_id) return;
      if (!map.has(h.imovel_id)) map.set(h.imovel_id, []);
      map.get(h.imovel_id).push({
        data: h.data, campo: /pre/i.test(h.campo || "") ? "preço" : "condomínio",
        de: parseMoeda(h.valor_antigo), para: parseMoeda(h.valor_novo),
      });
    });
    return map;
  } catch (e) {
    console.warn("Histórico indisponível:", e && e.message ? e.message : e);
    return new Map();
  }
}
window.fetchHistoricoMudancas = fetchHistoricoMudancas;

/* aplica o histórico ao dataset: r.histMudancas (linha do tempo) e r.quedaPct
   (maior queda % de preço registrada — usado pelo score de oportunidade) */
function applyHistorico(rows, hmap) {
  return rows.map((r) => {
    const arr = hmap.get(r.id) || [];
    let quedaPct = 0, altas = 0;
    arr.forEach((h) => {
      if (h.campo !== "preço" || h.de == null || h.para == null || h.de <= 0) return;
      const varPct = (h.para - h.de) / h.de * 100;
      if (varPct < 0) quedaPct = Math.max(quedaPct, -varPct);
      else if (varPct > 0) altas++;
    });
    return { ...r, histMudancas: arr, quedaPct: quedaPct || 0, teveAltaPreco: altas > 0 };
  });
}
window.applyHistorico = applyHistorico;

/* ---------- agendamentos (compartilhados) — usados na Agenda e na aba Atividade ---------- */
async function fetchAgendamentosAll() {
  try {
    const { data, error } = await sb.from("agendamentos").select("*").order("quando", { ascending: true });
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.warn("Agendamentos indisponíveis:", e && e.message ? e.message : e);
    return [];
  }
}
window.fetchAgendamentosAll = fetchAgendamentosAll;

/* ---------- CRM (tabela public.crm, uma linha por imóvel — compartilhada pela equipe) ----------
   Lida DIRETO da tabela (não da view v_dashboard) para não depender de a view já expor as
   colunas novas (visitado, quer_segunda_visita, resumo de negociação etc.). Fonte de verdade
   única para tudo que a equipe registra manualmente sobre um imóvel. */
async function fetchCrmMap() {
  try {
    const { data, error } = await sb.from("crm").select("*");
    if (error) throw error;
    const map = new Map();
    (data || []).forEach((c) => map.set(c.imovel_id, c));
    return map;
  } catch (e) {
    console.warn("CRM indisponível (rode a migração crm_v4.sql no Supabase):", e && e.message ? e.message : e);
    return new Map();
  }
}
window.fetchCrmMap = fetchCrmMap;

function applyCrm(rows, crmMap) {
  return rows.map((r) => {
    const c = crmMap.get(r.id) || {};
    return {
      ...r,
      contatado: !!c.contatado, dataContato: c.data_contato || null,
      nota: c.nota != null ? c.nota : null,
      contatoNome: c.contato_nome || null, contatoWhats: c.contato_whats || null, contatoTipo: c.contato_tipo || null,
      comentarios: c.comentarios || null,
      visitado: !!c.visitado, dataVisita: c.data_visita || null,
      querSegundaVisita: !!c.quer_segunda_visita,
      notaVisita: c.nota_visita || null,
      ultimaPropostaValor: c.ultima_proposta_valor != null ? Number(c.ultima_proposta_valor) : null,
      ultimaPropostaData: c.ultima_proposta_data || null,
      ultimaRespostaValor: c.ultima_resposta_valor != null ? Number(c.ultima_resposta_valor) : null,
      ultimaRespostaData: c.ultima_resposta_data || null,
      rodadasNegociacao: c.rodadas_negociacao || 0,
    };
  });
}
window.applyCrm = applyCrm;

/* ---------- negociações (tabela public.negociacoes, histórico ilimitado de propostas/respostas) ----------
   Cada linha é UMA rodada: "nossa_proposta" (o que oferecemos) ou "resposta_deles" (o que os
   moradores/corretor responderam). Não há limite de rodadas — a tela mostra a linha do tempo
   inteira, e um gatilho no banco mantém crm.ultima_proposta_valor / ultima_resposta_valor /
   rodadas_negociacao sempre em dia, para os filtros e a tabela não precisarem recalcular nada. */
async function fetchNegociacoesAll() {
  try {
    const { data, error } = await sb.from("negociacoes").select("*").order("data", { ascending: true }).order("id", { ascending: true });
    if (error) throw error;
    return data || [];
  } catch (e) {
    console.warn("Negociações indisponíveis (rode a migração crm_v4.sql no Supabase):", e && e.message ? e.message : e);
    return [];
  }
}
window.fetchNegociacoesAll = fetchNegociacoesAll;

/* ---------- carregamento completo v3 (imóveis + pool + histórico + agendamentos + CRM/negociação) ---------- */
async function loadAllMappedV3(uid) {
  const [rows, imap, hmap, ags, crmMap, negs] = await Promise.all([
    fetchAllData(), fetchInteresseMap(), fetchHistoricoMudancas(), fetchAgendamentosAll(), fetchCrmMap(), fetchNegociacoesAll(),
  ]);
  const agByImovel = new Map();
  ags.forEach((a) => {
    if (!a.imovel_id) return;
    if (!agByImovel.has(a.imovel_id)) agByImovel.set(a.imovel_id, []);
    agByImovel.get(a.imovel_id).push(a);
  });
  const negByImovel = new Map();
  negs.forEach((n) => {
    if (!n.imovel_id) return;
    if (!negByImovel.has(n.imovel_id)) negByImovel.set(n.imovel_id, []);
    negByImovel.get(n.imovel_id).push(n);
  });
  let mapped = applyInteresse(dedupPorId(rows).map(mapRow), imap, uid);
  mapped = applyHistorico(mapped, hmap);
  mapped = applyCrm(mapped, crmMap);
  mapped = mapped.map((r) => {
    const ag = agByImovel.get(r.id) || [];
    const neg = negByImovel.get(r.id) || [];
    return { ...r, agendamentos: ag, temAgendamento: ag.some((a) => a.status !== "Cancelada"), negociacoes: neg };
  });
  return { rows: mapped, agendamentos: ags };
}
window.loadAllMappedV3 = loadAllMappedV3;

/* ============================================================================================
   OPERAÇÕES EM MASSA — grava em lotes no Supabase (chunks) e devolve para atualização otimista.
============================================================================================ */
const BULK_CHUNK = 400;
function chunked(arr, n) { const out = []; for (let i = 0; i < arr.length; i += n) out.push(arr.slice(i, i + n)); return out; }

/* marca/desmarca visualizado ou sem_interesse para vários imóveis de uma vez.
   `estadoAtual` = Map(id -> row) para preservar a outra flag de cada linha. */
async function bulkMarcacoes(ids, userId, patchFn, estadoAtual) {
  const hoje = new Date().toISOString().slice(0, 10);
  const rows = ids.map((id) => {
    const r = estadoAtual.get(id) || {};
    const merged = patchFn(r, hoje);
    return {
      imovel_id: id, user_id: userId,
      visualizado: !!merged.meuVisualizado, data_visualizacao: merged.minhaDataVisualizacao || null,
      sem_interesse: !!merged.meuSemInteresse, data_sem_interesse: merged.minhaDataSemInteresse || null,
      atualizado_em: new Date().toISOString(),
    };
  });
  for (const part of chunked(rows, BULK_CHUNK)) {
    const { error } = await sb.from("marcacoes").upsert(part, { onConflict: "imovel_id,user_id" });
    if (error) throw error;
  }
}
window.bulkMarcacoes = bulkMarcacoes;

async function bulkAddInteresse(ids, userId) {
  const rows = ids.map((id) => ({ imovel_id: id, user_id: userId }));
  for (const part of chunked(rows, BULK_CHUNK)) {
    const { error } = await sb.from("interesse").upsert(part, { onConflict: "imovel_id,user_id" });
    if (error && error.code !== "23505") throw error;
  }
}
async function bulkDelInteresse(ids, userId) {
  for (const part of chunked(ids, BULK_CHUNK)) {
    const { error } = await sb.from("interesse").delete().in("imovel_id", part).eq("user_id", userId);
    if (error) throw error;
  }
}
window.bulkAddInteresse = bulkAddInteresse;
window.bulkDelInteresse = bulkDelInteresse;
</script>

<script>
/* ============================================================================================
   MOTOR DE ANÁLISE · v3
   (A) Benchmarks por quadra / vizinhas / região (medianas de R$/m², robustas a outliers)
   (B) Score de Oportunidade 0–100 com breakdown explicável (metodologia no modal)
   (C) Algoritmo de sugestões por semelhança com o pool de interesse
============================================================================================ */

function parseQuadraV3(qb) {
  const m = String(qb || "").match(/([A-Za-zÀ-ÿ]+)\s*0*(\d+)/);
  return m ? { pre: m[1].toUpperCase(), num: parseInt(m[2], 10) } : { pre: "", num: NaN };
}
window.parseQuadraV3 = parseQuadraV3;

/* ---------- (A) BENCHMARKS ----------
   Só imóveis ATIVOS, do MESMO tipo de operação (Venda/Aluguel), com preço e m² válidos. */
function buildBenchmarks(data) {
  const porTipo = {};
  ["Venda", "Aluguel"].forEach((tipo) => {
    const base = data.filter((r) => r.ativo !== false && r.tipo === tipo && r.precoM2 != null && isFinite(r.precoM2) && r.quadraBase);
    const porQuadra = new Map();
    base.forEach((r) => {
      if (!porQuadra.has(r.quadraBase)) porQuadra.set(r.quadraBase, []);
      porQuadra.get(r.quadraBase).push(r);
    });
    const quadras = new Map();
    porQuadra.forEach((rows, q) => {
      const pq = parseQuadraV3(q);
      quadras.set(q, {
        quadra: q, pre: pq.pre, num: pq.num, regiao: rows[0].regiao, n: rows.length,
        medPm2: window.medianOf(rows.map((r) => r.precoM2)),
        medPreco: window.medianOf(rows.map((r) => r.preco)),
      });
    });
    /* vizinhas = mesmo prefixo (SQN/SQS/…) e número a até 2 de distância (ex.: SQN 314–318 p/ SQN 316) */
    const vizinhasDe = (q) => {
      const pq = parseQuadraV3(q);
      if (!pq.pre || isNaN(pq.num)) return [];

function StatsView({ view }) {

    if (!a.length) return null;

        <StatCard label="Venda · preço mediano" value={vp ? fmtBRL(vp.mediana) : "—"} sub={vp ? fmtBRL(vp.min) + " – " + fmtBRL(vp.max) : "sem dados"} />
        <StatCard label="Aluguel · R$/m² mediano" value={am ? fmtBRL2(am.mediana) : "—"} sub={am ? "média " + fmtBRL2(am.med) + " · " + am.n + " anúncios" : "sem dados"} />

}

  { key: "ultimaProposta", label: "Nossa proposta", width: "150px", numeric: true, sortKey: "ultimaPropostaValor", render: (r) => (r.ultimaPropostaValor != null ? fmtBRL(r.ultimaPropostaValor) + (r.ultimaPropostaData ? " · " + dtBR(r.ultimaPropostaData) : "") : "—") },
  { key: "ultimaResposta", label: "Resposta deles", width: "150px", numeric: true, sortKey: "ultimaRespostaValor", render: (r) => (r.ultimaRespostaValor != null ? fmtBRL(r.ultimaRespostaValor) + (r.ultimaRespostaData ? " · " + dtBR(r.ultimaRespostaData) : "") : "—") },
  { key: "rodadas", label: "Rodadas", width: "72px", numeric: true, sortKey: "rodadasNegociacao", render: (r) => r.rodadasNegociacao || 0 },
];
const DEFAULT_VISIBLE_COLS = ["quadra", "m2", "pm2", "quartos", "banheiros", "vagas", "andar", "dias", "visitado", "ultimaProposta", "ultimaResposta"];
const COLS_STORAGE_KEY = "nossaCasa:colunas:v1";
const SEL_COL_W = 36; /* precisa bater com a regra .pinLeft1{left:36px} no CSS */

function loadVisibleCols() {
  try {
    const raw = window.localStorage.getItem(COLS_STORAGE_KEY);
    if (raw) {
      const arr = JSON.parse(raw).filter((k) => COLUMN_REGISTRY.some((c) => c.key === k));
      if (arr.length) return arr;
    }
  } catch (e) { /* localStorage indisponível — segue com o padrão */ }
  return DEFAULT_VISIBLE_COLS;
}

function ColumnPicker({ visible, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onDoc);
    return () => document.removeEventListener("mousedown", onDoc);
  }, [open]);
  const toggle = (key) => onChange(visible.includes(key) ? visible.filter((k) => k !== key) : [...visible, key]);
  return (
    <div className="colPickerWrap" ref={ref}>
      <button type="button" className="quickBtn colPickerBtn" onClick={(e) => { e.stopPropagation(); setOpen((o) => !o); }}>
        ⚙ Colunas ({visible.length})
      </button>
      {open ? (
        <div className="colPickerPanel" onClick={(e) => e.stopPropagation()}>
          <div className="colPickerHead">
            <b>Colunas da tabela</b>
            <button className="fsecReset" onClick={() => onChange(DEFAULT_VISIBLE_COLS)}>padrão</button>
          </div>
          <div className="colPickerList">
            {COLUMN_REGISTRY.map((c) => (
              <label key={c.key} className="colPickerItem">
                <input type="checkbox" checked={visible.includes(c.key)} onChange={() => toggle(c.key)} />
                {c.label}
              </label>
            ))}
          </div>
          <div className="miniNote" style={{ padding: "6px 12px 10px" }}>Anúncio e Status/Ações aparecem sempre.</div>
        </div>
      ) : null}
    </div>
  );
}

/* opções de ordenação no modo cartão (celular) — inclui colunas que talvez não estejam visíveis */
const SORT_OPTIONS_MOB = [
  { value: "preco", label: "Preço" }, { value: "precoM2", label: "R$/m²" }, { value: "m2", label: "Metragem" },
  { value: "quadraBase", label: "Quadra" }, { value: "quartos", label: "Quartos" }, { value: "andar", label: "Andar" },
  { value: "dias", label: "Dias no site" }, { value: "condominio", label: "Condomínio" },
  { value: "visitado", label: "Visitado" }, { value: "nota", label: "Nota" },
  { value: "ultimaPropostaValor", label: "Nossa proposta" }, { value: "ultimaRespostaValor", label: "Resposta deles" },
];

function RowActions({ r, onDetails, onToggleView, onToggleNoInterest, onToggleInteresse }) {
  return (
    <div className="tActions">
      <button className="tBtn" onClick={() => onDetails(r.id)}>detalhes</button>
      {r.link ? <a className="tBtn" href={r.link} target="_blank" rel="noopener" title="Abrir o anúncio original">abrir ↗</a> : null}
      <button className={"tBtn" + (r.meuVisualizado ? " on" : "")} onClick={() => onToggleView(r.id)}
        title={r.meuVisualizado ? "Visualizado — clique para desmarcar" : "Marcar como visualizado"}>👁</button>
      {onToggleInteresse ? (
        <button className={"tBtn pool" + (r.meuInteresse ? " on" : "")} onClick={() => onToggleInteresse(r.id)}
          title={r.meuInteresse ? "No pool — clique para remover" : "Adicionar ao pool de interesse"}>
          {r.meuInteresse ? "✓ pool" : "+ pool"}
        </button>
      ) : null}
      <button className={"tBtn" + (r.meuSemInteresse ? " on" : "")} onClick={() => onToggleNoInterest(r.id)}
        title={r.meuSemInteresse ? "Sem interesse — clique para desmarcar" : "Marcar sem interesse"}>✕</button>
    </div>
  );
}

function ListingTable({ rows, sortCol, sortDir, onSort, onDetails, showFotos,
  onToggleView, onToggleNoInterest, onToggleInteresse,
  selectable, selIds, onToggleSel, onToggleSelAll, scoreOf }) {
  const [visibleCols, setVisibleCols] = React.useState(loadVisibleCols);
  React.useEffect(() => {
    try { window.localStorage.setItem(COLS_STORAGE_KEY, JSON.stringify(visibleCols)); } catch (e) { /* ok, sem persistência */ }
  }, [visibleCols]);
  const isNarrow = useIsNarrow(TABLE_BREAKPOINT);
  const cols = React.useMemo(() => COLUMN_REGISTRY.filter((c) => visibleCols.includes(c.key)), [visibleCols]);
  const allSel = selectable && rows.length > 0 && rows.every((r) => selIds.has(r.id));
  const arrowFor = (key) => (sortCol === key ? (sortDir > 0 ? "▲" : "▼") : "↕");

  /* ---------- MODO CARTÃO (celular) ---------- */
  if (isNarrow) {
    return (
      <div className="cardListWrap">
        <div className="cardListHead">
          {selectable ? (
            <label className="cardSelAll">
              <input type="checkbox" className="selBox" checked={allSel} onChange={onToggleSelAll} />
              selecionar {rows.length} filtrado{rows.length === 1 ? "" : "s"}
            </label>
          ) : <span />}
          <ColumnPicker visible={visibleCols} onChange={setVisibleCols} />
        </div>
        <div className="cardList">
          {rows.map((r) => {
            const thumb = showFotos && r.imagens && r.imagens[0];
            const opp = scoreOf ? scoreOf(r) : null;
            const isSel = selectable && selIds.has(r.id);
            return (
              <div key={r.id} className={"rowCard" + (!r.ativo ? " inativo" : "") + (isSel ? " sel" : "")} onClick={() => onDetails(r.id)}>
                <div className="rowCardTop">
                  {selectable ? (
                    <input type="checkbox" className="selBox rowCardCheck" checked={isSel}
                      onClick={(e) => e.stopPropagation()} onChange={() => onToggleSel(r.id)} />
                  ) : null}
                  {thumb ? <img src={thumb} alt="" loading="lazy" className="tThumb" /> : null}
                  <div className="rowCardTitle">
                    <div className="rowCardPrice">
                      <span className="tPreco">{fmtBRL(r.preco)}</span>
                      <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"}>{r.tipo}</Tag>
                      {!r.ativo ? <Tag kind="inativo">Inativo</Tag> : null}
                      {opp ? <ScoreBadge opp={opp} compact /> : null}
                    </div>
                    <div className="rowCardSub"><b>{r.quadraBase}</b> · {r.regiao}</div>
                  </div>
                </div>
                {cols.length ? (
                  <div className="rowCardGrid">
                    {cols.map((c) => (
                      <div className="rowCardField" key={c.key}>
                        <span className="rcLbl">{c.label}</span>
                        <span className="rcVal">{c.render(r)}</span>
                      </div>
                    ))}
                  </div>
                ) : null}
                <StatusIcons r={r} />
                <div onClick={(e) => e.stopPropagation()}>
                  <RowActions r={r} onDetails={onDetails} onToggleView={onToggleView} onToggleNoInterest={onToggleNoInterest} onToggleInteresse={onToggleInteresse} />
                </div>
              </div>
            );
          })}
          {rows.length === 0 ? <div className="tEmpty">Nenhum anúncio com esses filtros.</div> : null}
        </div>
      </div>
    );
  }

  /* ---------- MODO TABELA (tablet/desktop) — grade real, cabeçalho e 1ª coluna fixos ---------- */
  const gridTemplate = [
    selectable ? SEL_COL_W + "px" : null,
    "minmax(240px,2.3fr)",
    scoreOf ? "88px" : null,
    ...cols.map((c) => c.width),
    "minmax(220px,1.7fr)",
  ].filter(Boolean).join(" ");

  return (
    <div className="tableScroll">
      <div className="gridTable" style={{ gridTemplateColumns: gridTemplate }} role="table" aria-rowcount={rows.length}>
        <div className="gridRow gridHead" role="row">
          {selectable ? (
            <div className="gCell gHead pinLeft0" role="columnheader">
              <input type="checkbox" className="selBox" checked={allSel} onChange={onToggleSelAll}
                title={allSel ? "Desmarcar todos os filtrados" : "Selecionar todos os filtrados"} />
            </div>
          ) : null}
          <div className={"gCell gHead sortable " + (selectable ? "pinLeft1" : "pinLeft0")} role="columnheader" onClick={() => onSort("preco")}>
            Anúncio <span className="arrow">{arrowFor("preco")}</span>
          </div>
          {scoreOf ? (
            <div className="gCell gHead sortable" role="columnheader" onClick={() => onSort("__score")}>
              Score <span className="arrow">{arrowFor("__score")}</span>
            </div>
          ) : null}
          {cols.map((c) => (
            <div key={c.key} className={"gCell gHead sortable" + (c.numeric ? " num" : "")} role="columnheader" onClick={() => onSort(c.sortKey || c.key)}>
              {c.label} <span className="arrow">{arrowFor(c.sortKey || c.key)}</span>
            </div>
          ))}
          <div className="gCell gHead gHeadStatus" role="columnheader">
            <span>Status / Ações</span>
            <ColumnPicker visible={visibleCols} onChange={setVisibleCols} />
          </div>
        </div>
        {rows.map((r) => {
          const thumb = showFotos && r.imagens && r.imagens[0];
          const opp = scoreOf ? scoreOf(r) : null;
          const isSel = selectable && selIds.has(r.id);
          return (
            <div key={r.id} className={"gridRow" + (!r.ativo ? " inativo" : "") + (isSel ? " rowSel" : "")} role="row" onClick={() => onDetails(r.id)}>
              {selectable ? (
                <div className="gCell pinLeft0" role="cell" onClick={(e) => e.stopPropagation()}>
                  <input type="checkbox" className="selBox" checked={isSel} onChange={() => onToggleSel(r.id)} />
                </div>
              ) : null}
              <div className={"gCell gMain " + (selectable ? "pinLeft1" : "pinLeft0")} role="cell">
                <div className="tPrimary">
                  {thumb ? <img src={thumb} alt="" loading="lazy" className="tThumb" /> : null}
                  <span className="tPreco">{fmtBRL(r.preco)}</span>
                  <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"}>{r.tipo}</Tag>
                  {!r.ativo ? <Tag kind="inativo">Inativo</Tag> : null}
                </div>
                <div className="tSub"><b>{r.quadraBase}</b> · {r.regiao}</div>
              </div>
              {scoreOf ? <div className="gCell num" role="cell"><ScoreBadge opp={opp} compact /></div> : null}
              {cols.map((c) => (
                <div key={c.key} className={"gCell" + (c.numeric ? " num" : "")} role="cell">{c.render(r)}</div>
              ))}
              <div className="gCell gStatus" role="cell" onClick={(e) => e.stopPropagation()}>
                <StatusIcons r={r} />
                <RowActions r={r} onDetails={onDetails} onToggleView={onToggleView} onToggleNoInterest={onToggleNoInterest} onToggleInteresse={onToggleInteresse} />
              </div>
            </div>
          );
        })}
        {rows.length === 0 ? <div className="gridEmptyRow">Nenhum anúncio com esses filtros.</div> : null}
      </div>
    </div>
  );
}

/* barra de ordenação usada no modo cartão (celular) */
function SortBarMobile({ sortCol, sortDir, onSortCol, onFlip, extra }) {
  const opts = extra ? [...SORT_OPTIONS_MOB, extra] : SORT_OPTIONS_MOB;
  return (
    <div className="sortBarMob">
      <span className="miniNote">Ordenar:</span>
      <Select size="sm" value={opts.some((o) => o.value === sortCol) ? sortCol : opts[0].value}
        onChange={(e) => onSortCol(e.target.value)} options={opts} />
      <button className="dirBtn" onClick={onFlip} title="Inverter ordem">{sortDir > 0 ? "▲ crescente" : "▼ decrescente"}</button>
    </div>
  );
}

/* ---------- MODAL DE DETALHES (ampliado) ---------- */
function DetailModal({ listing: r, allData, bench, onClose, onSave, onToast, onToggleView, onToggleNoInterest, onToggleInteresse, onSaveNegociacao, onDeleteNegociacao, onShowMethod }) {
  const [cont, setCont] = React.useState(!!r.contatado);
  const [nota, setNota] = React.useState(r.nota ?? "");
  const [nome, setNome] = React.useState(r.contatoNome ?? "");
  const [whats, setWhats] = React.useState(r.contatoWhats ?? "");
  const [ctipo, setCtipo] = React.useState(r.contatoTipo ?? "");
  const [com, setCom] = React.useState(r.comentarios ?? "");
  const [visitado, setVisitado] = React.useState(!!r.visitado);
  const [dataVisita, setDataVisita] = React.useState(r.dataVisita ?? "");
  const [querVoltar, setQuerVoltar] = React.useState(!!r.querSegundaVisita);
  const [notaVisita, setNotaVisita] = React.useState(r.notaVisita ?? "");
  const [saved, setSaved] = React.useState(false);
  const [saving, setSaving] = React.useState(false);
  const [marcando, setMarcando] = React.useState(false);
  const [zoomIdx, setZoomIdx] = React.useState(null);
  /* ---- formulário de nova rodada de negociação ---- */
  const [negTipo, setNegTipo] = React.useState("nossa_proposta");
  const [negValor, setNegValor] = React.useState("");
  const [negData, setNegData] = React.useState(new Date().toISOString().slice(0, 10));
  const [negObs, setNegObs] = React.useState("");
  const [negSaving, setNegSaving] = React.useState(false);
  const opp = React.useMemo(() => (bench && window.computeOportunidade ? window.computeOportunidade(r, bench) : null), [r, bench]);
  const cell = (k, v) => (<div className="cell"><div className="kk">{k}</div><div className="vv">{v}</div></div>);
  const save = async () => {
    const patch = {
      contatado: cont,
      dataContato: cont ? (r.dataContato || new Date().toISOString().slice(0, 10)) : null,
      nota: nota === "" ? null : parseInt(nota),
      contatoNome: nome || null, contatoWhats: whats || null,
      contatoTipo: ctipo || null, comentarios: com || null,
      visitado, dataVisita: visitado ? (dataVisita || new Date().toISOString().slice(0, 10)) : (dataVisita || null),
      querSegundaVisita: querVoltar, notaVisita: notaVisita === "" ? null : parseInt(notaVisita),
    };
    setSaving(true);
    try {
      await onSave(r.id, patch);
      setSaved(true);
      setTimeout(() => setSaved(false), 1500);
      onToast("Anotações salvas");
    } catch (e) { onToast("Erro ao salvar: " + (e && e.message ? e.message : e)); }
    finally { setSaving(false); }
  };
  const addNegociacao = async () => {
    if (negValor === "" || !isFinite(+negValor)) { onToast("Informe um valor válido"); return; }
    setNegSaving(true);
    try {
      await onSaveNegociacao(r.id, { tipo: negTipo, valor: negValor, data: negData, observacao: negObs });
      setNegValor(""); setNegObs("");
