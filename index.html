      onToast(negTipo === "nossa_proposta" ? "Proposta registrada" : "Resposta registrada");
    } catch (e) { onToast("Erro ao registrar: " + (e && e.message ? e.message : e)); }
    finally { setNegSaving(false); }
  };
  const removerNegociacao = async (negId) => {
    try { await onDeleteNegociacao(r.id, negId); onToast("Rodada removida"); }
    catch (e) { onToast("Erro ao remover: " + (e && e.message ? e.message : e)); }
  };
  const marcar = async (fn) => {
    if (marcando) return;
    setMarcando(true);
    try { await fn(r.id); } catch (e) { onToast("Erro: " + (e && e.message ? e.message : e)); }
    finally { setMarcando(false); }
  };
  const imagens = r.imagens || [];
  const zoomNav = (d) => setZoomIdx((i) => { const n = imagens.length; return n ? (((i + d) % n) + n) % n : null; });
  React.useEffect(() => {
    if (zoomIdx == null) return;
    const onKey = (e) => {
      if (e.key === "ArrowRight") zoomNav(1);
      else if (e.key === "ArrowLeft") zoomNav(-1);
      else if (e.key === "Escape") setZoomIdx(null);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [zoomIdx, imagens.length]);
  const listaMarcacao = (arr) => (arr || []).map((v, i) => (
    <li key={i}>{window.emailPrefix(v.email)} <span style={{ color: "var(--muted)" }}>— {v.data || "sem data"}</span></li>
  ));
  const mudancasPreco = (r.histMudancas || []);
  const agsAtivos = (r.agendamentos || []).filter((a) => a.status !== "Cancelada");
  return (
    <div className="modalBg" onClick={(e) => { if (e.target.classList.contains("modalBg")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="mhead">
          <div>
            <h2>{fmtBRL(r.preco)} <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"} style={{ verticalAlign: "3px" }}>{r.tipo}</Tag>
              {opp ? <span style={{ marginLeft: 8, verticalAlign: "3px" }}><ScoreBadge opp={opp} /></span> : null}</h2>
            <div className="sub">
              {r.quadra} · {r.regiao} · {r.origem}
              {r.link ? <> · <a href={r.link} target="_blank" rel="noopener">abrir anúncio ↗</a></> : null}
            </div>
            {/* resumo de TODAS as ações tomadas sobre este imóvel — sempre visível */}
            <div className="actSummary"><StatusIcons r={r} /></div>
          </div>
          <button className="xBtn" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="mbody">
          {imagens.length ? (
            <div className="galleryGrid">
              {imagens.map((src, i) => (<img key={i} src={src} alt="" loading="lazy" onClick={() => setZoomIdx(i)} />))}
            </div>
          ) : null}
          <div className="kv">
            {cell("Quartos", r.quartos ?? "—")}{cell("Banheiros", r.banheiros ?? "—")}
            {cell("Suítes", r.suites ?? "—")}{cell("Vagas", r.vagas ?? "—")}
            {cell("Metragem", (r.m2 ?? "—") + " m²")}{cell("R$/m²", fmtBRL2(r.precoM2))}
            {cell("Condomínio", fmtBRL(r.condominio))}{cell("Andar", andarLabel(r.andar))}
            {cell("No site há", (r.dias ?? "—") + " dias")}{cell("Ativo", r.ativo ? "Sim" : "Não")}
            {cell("Primeiro visto", dtBR(r.primeiroVisto) !== "—" ? dtBR(r.primeiroVisto) : "—")}
            {cell("CRECI", r.creci ?? "—")}
          </div>
          {r.descricao ? <div className="cell descCell"><div className="kk">Descrição</div><div className="descTxt">{r.descricao}</div></div> : null}

          {/* ---- Score de oportunidade com breakdown explicável ---- */}
          {opp ? (
            <div className="crm">
              <h3>Score de oportunidade <span style={{ marginLeft: 6 }}><ScoreBadge opp={opp} /></span>
                {onShowMethod ? <button className="fsecReset" style={{ marginLeft: 8 }} onClick={onShowMethod}>ver metodologia completa</button> : null}
              </h3>
              <div className="quickRow" style={{ marginBottom: 6 }}>
                <span className={"oppDelta " + (opp.dQuadra > 0 ? "neg" : "pos")}>vs quadra: {opp.dQuadra != null ? pctS(-opp.dQuadra) : "s/ base"}</span>
                <span className={"oppDelta " + (opp.dVizinhas > 0 ? "neg" : "pos")}>vs vizinhas: {opp.dVizinhas != null ? pctS(-opp.dVizinhas) : "s/ base"}</span>
                <span className={"oppDelta " + (opp.dRegiao > 0 ? "neg" : "pos")}>vs região: {opp.dRegiao != null ? pctS(-opp.dRegiao) : "s/ base"}</span>
              </div>
              {opp.suspeito ? <div className="readOut" style={{ borderColor: "var(--bad)" }}><b>Atenção:</b> o desconto está acima de {Math.round(window.OPP_CFG.limiteSuspeito * 100)}% frente a todas as referências — padrão típico de erro de digitação no anúncio (preço, metragem) ou de situação atípica (leilão, fração ideal). Verifique antes de contatar.</div> : null}
              <table className="breakTable">
                <thead><tr><th>Critério</th><th style={{ textAlign: "right" }}>Pontos</th><th>Leitura</th></tr></thead>
                <tbody>
                  {opp.breakdown.map((b, i) => (
                    <tr key={i}><td><b>{b.label}</b></td><td className="pts">{b.pts} / {b.max}</td><td className="nt">{b.note}</td></tr>
                  ))}
                  <tr><td><b>Total</b></td><td className="pts"><b>{opp.score} / 100</b></td><td className="nt">{opp.classe}</td></tr>
                </tbody>
              </table>
            </div>
          ) : null}

          {/* ---- Linha do tempo: mudanças de preço/condomínio registradas pelo robô ---- */}
          {mudancasPreco.length ? (
            <div className="crm">
              <h3>Histórico de mudanças <span style={{ color: "var(--muted)", fontWeight: 500 }}>(registrado automaticamente)</span></h3>
              <ul className="tl">
                {mudancasPreco.map((h, i) => {
                  const varPct = h.de && h.para ? (h.para - h.de) / h.de * 100 : null;
                  return (
                    <li key={i}>
                      <span className="tlDate">{dtBR(h.data)}</span> — {h.campo} mudou de <b>{fmtBRL(h.de)}</b> para <b>{fmtBRL(h.para)}</b>
                      {varPct != null ? <span className={varPct < 0 ? " down" : " up"}> ({(varPct > 0 ? "+" : "") + varPct.toFixed(1).replace(".", ",")}%)</span> : null}
                    </li>
                  );
                })}
              </ul>
            </div>
          ) : null}

          {/* ---- Visitas agendadas para este imóvel ---- */}
          {agsAtivos.length ? (
            <div className="crm">
              <h3>Visitas agendadas</h3>
              <ul className="tl">
                {agsAtivos.map((a, i) => (
                  <li key={i}><span className="tlDate">{new Date(a.quando).toLocaleString("pt-BR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</span> — {a.titulo || "Visita"}{a.contato_nome ? " · " + a.contato_nome : ""} <span className="miniNote">({a.status})</span></li>
                ))}
              </ul>
            </div>
          ) : null}

          {allData && window.ImovelProfile ? <window.ImovelProfile imovel={r} data={allData} /> : null}

          <div className="crm">
            <h3>Visita ao imóvel</h3>
            <div className="togs">
              <Toggle label="Já visitei" detail={r.dataVisita || null} on={visitado} onChange={setVisitado} />
              <Toggle label="Quero voltar (2ª visita)" on={querVoltar} onChange={setQuerVoltar} />
            </div>
            <div className="crmGrid">
              <Input label="Data da visita" type="date" value={dataVisita} onChange={(e) => setDataVisita(e.target.value)} />
              <Input label="Nota da visita (0–10)" type="number" min="0" max="10" value={notaVisita} onChange={(e) => setNotaVisita(e.target.value)} />
            </div>
          </div>

          <div className="crm">
            <h3>Negociação <span style={{ color: "var(--muted)", fontWeight: 500 }}>({r.rodadasNegociacao || 0} rodada{(r.rodadasNegociacao || 0) === 1 ? "" : "s"})</span></h3>
            {(r.negociacoes || []).length ? (
              <ul className="tl negTl">
                {(r.negociacoes || []).map((n) => (
                  <li key={n.id}>
                    <span className="tlDate">{dtBR(n.data)}</span> —{" "}
                    <b className={n.tipo === "nossa_proposta" ? "negNossa" : "negDeles"}>
                      {n.tipo === "nossa_proposta" ? "Nossa proposta" : "Resposta deles"}: {fmtBRL(n.valor)}
                    </b>
                    {n.observacao ? <span className="miniNote"> — {n.observacao}</span> : null}
                    <button className="negDel" title="Remover esta rodada" onClick={() => removerNegociacao(n.id)}>✕</button>
                  </li>
                ))}
              </ul>
            ) : <div className="miniNote" style={{ marginBottom: "8px" }}>Nenhuma rodada registrada ainda.</div>}
            <div className="negForm">
              <Select size="sm" value={negTipo} onChange={(e) => setNegTipo(e.target.value)}
                options={[{ value: "nossa_proposta", label: "Nossa proposta" }, { value: "resposta_deles", label: "Resposta deles" }]} />
              <Input size="sm" type="number" placeholder="Valor (R$)" value={negValor} onChange={(e) => setNegValor(e.target.value)} />
              <Input size="sm" type="date" value={negData} onChange={(e) => setNegData(e.target.value)} />
              <Input size="sm" placeholder="Observação (opcional)" value={negObs} onChange={(e) => setNegObs(e.target.value)} />
              <Button size="sm" onClick={addNegociacao} disabled={negSaving}>{negSaving ? "Registrando…" : "+ Registrar rodada"}</Button>
            </div>
          </div>

          <div className="crm">
            <h3>Visualização e interesse <span style={{ color: "var(--muted)", fontWeight: 500 }}>(compartilhado entre usuários)</span></h3>
            <div className="togs">
              <Toggle label="Eu já visualizei" detail={r.minhaDataVisualizacao || null} on={!!r.meuVisualizado} onChange={() => marcar(onToggleView)} />
              <Toggle label="Sem interesse" detail={r.minhaDataSemInteresse || null} on={!!r.meuSemInteresse} onChange={() => marcar(onToggleNoInterest)} />
              {onToggleInteresse ? (
                <Toggle label="No pool de interesse" detail={r.totalInteresse > 0 ? (r.totalInteresse + " marcaram") : null} on={!!r.meuInteresse} onChange={() => marcar(onToggleInteresse)} />
              ) : null}
            </div>
            {(r.interessePor || []).length ? (
              <div className="markList"><b>No pool de interesse ({r.totalInteresse}):</b><ul>{listaMarcacao(r.interessePor)}</ul></div>
            ) : null}
            {(r.visualizadoPor || []).length ? (
              <div className="markList"><b>Visualizado por ({r.totalVisualizadoPor}):</b><ul>{listaMarcacao(r.visualizadoPor)}</ul></div>
            ) : null}
            {(r.semInteressePor || []).length ? (
              <div className="markList"><b>Marcaram sem interesse ({r.totalSemInteresse}):</b><ul>{listaMarcacao(r.semInteressePor)}</ul></div>
            ) : null}
          </div>

          <div className="crm">
            <h3>Anotações da equipe <span style={{ color: "var(--muted)", fontWeight: 500 }}>(uma ficha por imóvel)</span></h3>
            <div className="togs">
              <Toggle label="Contatado" detail={r.dataContato || null} on={cont} onChange={setCont} />
            </div>
            <div className="crmGrid">
              <Input label="Nota (0–10)" type="number" min="0" max="10" value={nota} onChange={(e) => setNota(e.target.value)} />
              <Select label="Tipo de contato" value={ctipo} onChange={(e) => setCtipo(e.target.value)}
                options={["", "Corretor", "Proprietário", "Imobiliária", "Outro"]} />
              <Input label="Nome do contato" value={nome} onChange={(e) => setNome(e.target.value)} />
              <Input label="WhatsApp" value={whats} onChange={(e) => setWhats(e.target.value)} />
            </div>
            <label className="areaLbl">Comentários
              <textarea rows="3" value={com} onChange={(e) => setCom(e.target.value)}></textarea>
            </label>
            <div className="savebar">
              <Button onClick={save} disabled={saving}>{saving ? "Salvando…" : "Salvar anotações"}</Button>
              <span className={"savedMsg" + (saved ? " show" : "")}>✓ salvo</span>
            </div>
          </div>
        </div>
      </div>
      {zoomIdx != null && imagens.length ? (
        <div className="lightboxBg open" onClick={() => setZoomIdx(null)}>
          <button className="lbClose" onClick={(e) => { e.stopPropagation(); setZoomIdx(null); }} aria-label="Fechar">✕</button>
          {imagens.length > 1 ? (<button className="lbNav lbPrev" onClick={(e) => { e.stopPropagation(); zoomNav(-1); }} aria-label="Foto anterior">‹</button>) : null}
          <img src={imagens[zoomIdx]} alt="" onClick={(e) => e.stopPropagation()} />
          {imagens.length > 1 ? (<button className="lbNav lbNext" onClick={(e) => { e.stopPropagation(); zoomNav(1); }} aria-label="Próxima foto">›</button>) : null}
          {imagens.length > 1 ? (
            <div className="lbThumbs" onClick={(e) => e.stopPropagation()}>
              {imagens.map((src, i) => (<img key={i} src={src} alt="" className={i === zoomIdx ? "on" : ""} onClick={() => setZoomIdx(i)} />))}
            </div>
          ) : null}
          <div className="lbCount" onClick={(e) => e.stopPropagation()}>{zoomIdx + 1} / {imagens.length}</div>
        </div>
      ) : null}
    </div>
  );
}

/* ordenação genérica reutilizada por todas as telas (dois sentidos, nulos por último) */
function sortRows(rows, col, dir) {
  return [...rows].sort((a, b) => {
    const x = a[col], y = b[col];
    if (x == null && y == null) return 0;
    if (x == null) return 1; if (y == null) return -1;
    return (typeof x === "string" ? x.localeCompare(y, "pt-BR") : x - y) * dir;
  });
}
/* ---------- NAVEGAÇÃO PRINCIPAL (7 abas) ----------
   Componente dedicado (não reaproveita o Segmented genérico, usado em toggles pequenos de 2-3
   opções). Sempre rola na horizontal, em qualquer largura de tela — nunca tenta encolher os
   rótulos. Cada aba usa flex:0 0 auto + white-space:nowrap, o que por especificação do CSS
   IMPEDE qualquer compressão/sobreposição de texto, independente do navegador ou do tamanho
   da tela: é o mesmo padrão usado em abas de categoria do Gmail, Notion e afins. */
function MainTabs({ options, value, onChange }) {
  const railRef = React.useRef(null);
  React.useEffect(() => {
    const el = railRef.current;
    if (!el) return;
    const active = el.querySelector('[aria-selected="true"]');
    if (active && active.scrollIntoView) active.scrollIntoView({ block: "nearest", inline: "nearest" });
  }, [value]);
  return (
    <div className="mainTabs" role="tablist" ref={railRef}>
      {options.map((o) => {
        const active = o.value === value;
        return (
          <button key={o.value} type="button" role="tab" aria-selected={active}
            className={"mainTab" + (active ? " on" : "")} onClick={() => onChange(o.value)}>
            {o.label}
            {o.count != null ? <span className="mainTabCount">{o.count}</span> : null}
          </button>
        );
      })}
    </div>
  );
}

Object.assign(window, { StatsView, DetailModal, ListingTable, SortBarMobile, StatusIcons, ScoreBadge, sortRows, fmtBRL, fmtBRL2, andarLabel, pctS, dtBR, MainTabs });
</script>

<script type="text/babel">
/* ============================================================================================
   MÓDULO DE ANÁLISES  —  rankings e comparação de quadras, perfil de cada imóvel,
   gráficos em SVG (com explicação dinâmica, sem pizza, sem emojis) e AGENDA de visitas.
   Tudo consome os mesmos dados já carregados (window.mapRow) e o Supabase para a agenda.
============================================================================================ */
/* fmtBRL / fmtBRL2 já existem no escopo global (declarados no bloco anterior) — NÃO redeclarar
   aqui: const/let de nível de topo são compartilhados entre TODAS as tags <script> da página,
   e uma redeclaração quebra (SyntaxError) o bloco inteiro, silenciosamente, no navegador. */
const fmtInt  = (v) => (v == null ? "—" : Number(v).toLocaleString("pt-BR"));
const pctTxt  = (v) => (v == null || !isFinite(v) ? "—" : (v > 0 ? "+" : "") + v.toFixed(1).replace(".", ",") + "%");
const ord     = (n) => n + "º";

/* ---- parse de quadra: "SQN 316" -> {pre:'SQN', num:316} ---- */
function parseQuadra(qb) {
  const m = String(qb || "").match(/([A-Za-zÀ-ÿ]+)\s*0*(\d+)/);
  return m ? { pre: m[1].toUpperCase(), num: parseInt(m[2], 10) } : { pre: "", num: NaN };
}

/* ---- estatística de um campo (min/média/máx) ---- */
function statsOf(arr, field) {
  const v = arr.map((r) => r[field]).filter((x) => x != null && isFinite(x));
  if (!v.length) return null;
  return { n: v.length, min: Math.min(...v), med: v.reduce((a, b) => a + b, 0) / v.length, max: Math.max(...v) };
}

/* ---- bloco de estatísticas (venda + aluguel) de um conjunto de imóveis ---- */
function statsBlock(rows) {
  const R = rows.filter((r) => r.ativo !== false);
  const v = R.filter((r) => r.tipo === "Venda"), a = R.filter((r) => r.tipo === "Aluguel");
  return {
    venda:   { n: v.length, preco: statsOf(v, "preco"), m2: statsOf(v, "precoM2") },
    aluguel: { n: a.length, preco: statsOf(a, "preco"), m2: statsOf(a, "precoM2") },
    nTotal: R.length,
  };
}

/* ---- estatísticas de TODAS as quadras (só ativos) ---- */
function buildQuadraStats(data) {
  const byQ = new Map();
  data.filter((r) => r.ativo !== false && r.quadraBase).forEach((r) => {
    if (!byQ.has(r.quadraBase)) byQ.set(r.quadraBase, []);
    byQ.get(r.quadraBase).push(r);
  });
  return [...byQ.entries()].map(([quadra, rows]) => {
    const pq = parseQuadra(quadra);
    return { quadra, regiao: rows[0].regiao, pre: pq.pre, num: pq.num, ...statsBlock(rows) };
  });
}

/* ---- métricas disponíveis para ranking ---- */
const METRICS = [
  { key: "venda_med", label: "Venda — preço médio",              pick: (q) => q.venda.preco && q.venda.preco.med, fmt: fmtBRL,  un: "preço médio de venda" },
  { key: "venda_min", label: "Venda — mais barato (real)",       pick: (q) => q.venda.preco && q.venda.preco.min, fmt: fmtBRL,  un: "menor preço de venda" },
  { key: "venda_max", label: "Venda — mais caro (real)",         pick: (q) => q.venda.preco && q.venda.preco.max, fmt: fmtBRL,  un: "maior preço de venda" },
  { key: "venda_m2",  label: "Venda — R$/m² médio",              pick: (q) => q.venda.m2 && q.venda.m2.med,       fmt: fmtBRL2, un: "R$/m² médio de venda" },
  { key: "alug_med",  label: "Aluguel — preço médio",            pick: (q) => q.aluguel.preco && q.aluguel.preco.med, fmt: fmtBRL,  un: "aluguel médio" },
  { key: "alug_min",  label: "Aluguel — mais barato (real)",     pick: (q) => q.aluguel.preco && q.aluguel.preco.min, fmt: fmtBRL,  un: "menor aluguel" },
  { key: "alug_max",  label: "Aluguel — mais caro (real)",       pick: (q) => q.aluguel.preco && q.aluguel.preco.max, fmt: fmtBRL,  un: "maior aluguel" },
  { key: "alug_m2",   label: "Aluguel — R$/m² médio",            pick: (q) => q.aluguel.m2 && q.aluguel.m2.med,   fmt: fmtBRL2, un: "R$/m² médio de aluguel" },
  { key: "qtd_venda", label: "Quantidade à venda",               pick: (q) => q.venda.n || 0,   fmt: fmtInt, un: "imóveis à venda" },
  { key: "qtd_alug",  label: "Quantidade para aluguel",          pick: (q) => q.aluguel.n || 0, fmt: fmtInt, un: "imóveis para aluguel" },
  { key: "qtd_total", label: "Quantidade total (ativos)",        pick: (q) => q.nTotal || 0,    fmt: fmtInt, un: "imóveis ativos" },
];
const metricByKey = (k) => METRICS.find((m) => m.key === k) || METRICS[0];

/* ---- ordena quadras por métrica; devolve [{q,value,rank}] ---- */
function rankQuadras(list, metric, dir) {
  const arr = list.map((q) => ({ q, value: metric.pick(q) })).filter((x) => x.value != null && isFinite(x.value));
  arr.sort((a, b) => (dir === "asc" ? a.value - b.value : b.value - a.value));
  return arr.map((x, i) => ({ ...x, rank: i + 1 }));
}

/* ---- quadras vizinhas (mesmo prefixo; número anterior/próximo que EXISTE) ---- */
function neighborsOf(quadra, list) {
  const me = parseQuadra(quadra);
  const same = list.filter((q) => q.pre === me.pre && isFinite(q.num));
  const menor = same.filter((q) => q.num < me.num).sort((a, b) => b.num - a.num)[0] || null;
  const maior = same.filter((q) => q.num > me.num).sort((a, b) => a.num - b.num)[0] || null;
  return { anterior: menor, proxima: maior };
}

/* ---- veredito caro/barato/na média (tolerância de 5% em torno da média) ---- */
function verdictVs(value, med) {
  if (value == null || med == null || !isFinite(med) || med === 0) return { cls: "media", label: "sem base", diff: null, pct: null };
  const diff = value - med, p = (diff / med) * 100;
  if (Math.abs(p) <= 5) return { cls: "media", label: "na média", diff, pct: p };
  return p > 0 ? { cls: "caro", label: "acima da média", diff, pct: p } : { cls: "barato", label: "abaixo da média", diff, pct: p };
}

/* ================= COMPONENTES VISUAIS ================= */

/* dica "como ler" — um "i" que abre uma caixa explicativa (texto dinâmico) */
function InfoTip({ text }) {
  const [open, setOpen] = React.useState(false);
  return (
    <span className="infoTip">
      <span className="infoDot" title="Como ler" onClick={() => setOpen((o) => !o)}>i</span>
      {open ? <span className="infoBox" onClick={() => setOpen(false)}>{text}</span> : null}
    </span>
  );
}

/* cartão min/valor/legenda */
function MiniStat({ k, v, s, hl }) {
  return (
    <div className={"miniStat" + (hl ? " hl" : "")}>
      <div className="ms-k">{k}</div>
      <div className="ms-v">{v}</div>
      {s ? <div className="ms-s">{s}</div> : null}
    </div>
  );
}

/* gráfico de barras horizontais (comprimento = valor); barra destacada em verde */
function BarsH({ items, fmt, title, info }) {
  const vals = items.map((i) => i.value || 0);
  const max = Math.max(1, ...vals);
  const rowH = 26, pad = 4, labelW = 104, valW = 90, W = 580;
  const h = items.length * rowH + 8;
  return (
    <div className="chartWrap">
      <div className="chartHead"><span className="ch-title">{title}</span>{info ? <InfoTip text={info} /> : null}</div>
      <svg viewBox={"0 0 " + W + " " + h} preserveAspectRatio="xMinYMin meet" role="img">
        {items.map((it, i) => {
          const y = i * rowH + pad;
          const bw = Math.max(2, ((it.value || 0) / max) * (W - labelW - valW));
          return (
            <g key={i}>
              <text x={0} y={y + 15} className="barLbl">{it.label}</text>
              <rect x={labelW} y={y + 3} width={bw} height={rowH - 10} rx="4"
                fill={it.highlight ? "var(--accent)" : "var(--line-strong)"} />
              <text x={labelW + bw + 6} y={y + 15} className="barVal">{fmt(it.value)}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

/* linha numérica: posiciona um valor entre mínimo, média e máximo */
function RangePos({ min, med, max, value, fmt, title, info }) {
  const span = (max - min) || 1;
  const pos = (x) => Math.max(0, Math.min(100, ((x - min) / span) * 100));
  return (
    <div>
      <div className="chartHead"><span className="ch-title">{title}</span>{info ? <InfoTip text={info} /> : null}</div>
      <div className="posTrack">
        <div className="posLine"></div>
        <div className="posTick" style={{ left: "0%" }}></div>
        <div className="posTickLbl" style={{ left: "0%" }}>mín<br />{fmt(min)}</div>
        <div className="posTick" style={{ left: pos(med) + "%" }}></div>
        <div className="posTickLbl" style={{ left: pos(med) + "%", transform: "translateX(-50%)" }}>média<br />{fmt(med)}</div>
        <div className="posTick" style={{ left: "100%" }}></div>
        <div className="posTickLbl" style={{ left: "100%", transform: "translateX(-100%)" }}>máx<br />{fmt(max)}</div>
        <div className="posDot" style={{ left: pos(value) + "%" }}></div>
        <div className="posValLbl" style={{ left: pos(value) + "%" }}>este: {fmt(value)}</div>
      </div>
    </div>
  );
}

/* trio de cartões min/média/máx para um par (preço + R$/m²) */
function TripletCards({ title, s, sm2 }) {
  return (
    <div style={{ marginBottom: "10px" }}>
      <div style={{ fontWeight: 700, fontSize: "13px", margin: "2px 0 8px" }}>{title}</div>
      <div className="anGrid">
        <MiniStat k="Preço mínimo" v={s ? fmtBRL(s.min) : "—"} s={s ? s.n + " anúncios" : "sem dados"} />
        <MiniStat k="Preço médio"  v={s ? fmtBRL(s.med) : "—"} />
        <MiniStat k="Preço máximo" v={s ? fmtBRL(s.max) : "—"} />
        <MiniStat k="R$/m² mín"    v={sm2 ? fmtBRL2(sm2.min) : "—"} />
        <MiniStat k="R$/m² médio"  v={sm2 ? fmtBRL2(sm2.med) : "—"} />
        <MiniStat k="R$/m² máx"    v={sm2 ? fmtBRL2(sm2.max) : "—"} />
      </div>
    </div>
  );
}

/* ================= PERFIL DE UMA QUADRA ================= */
function QuadraProfile({ quadra, statsAll, allData, onOpenImovel }) {
  const [metricKey, setMetricKey] = React.useState("venda_med");
  const me = statsAll.find((q) => q.quadra === quadra);
  if (!me) return <div className="anBlock">Sem dados ativos para {quadra}.</div>;
  const metric = metricByKey(metricKey);
  const nb = neighborsOf(quadra, statsAll);
  const ranked = rankQuadras(statsAll, metric, "desc");
  const myRank = ranked.find((x) => x.q.quadra === quadra);
  const total = ranked.length;
  const globalMed = (() => {
    const v = ranked.map((x) => x.value); return v.length ? v.reduce((a, b) => a + b, 0) / v.length : null;
  })();

  /* barras: vizinha anterior, esta (destaque), vizinha próxima, média geral */
  const barItems = [];
  if (nb.anterior) barItems.push({ label: nb.anterior.quadra, value: metric.pick(nb.anterior) });
  barItems.push({ label: quadra, value: metric.pick(me), highlight: true });
  if (nb.proxima) barItems.push({ label: nb.proxima.quadra, value: metric.pick(nb.proxima) });
  if (globalMed != null) barItems.push({ label: "Média geral", value: globalMed });

  const listasImoveis = (tipo) => allData.filter((r) => r.ativo !== false && r.quadraBase === quadra && r.tipo === tipo);
  const cheapExp = (tipo) => {
    const arr = listasImoveis(tipo).filter((r) => r.preco != null).sort((a, b) => a.preco - b.preco);
    return { barato: arr[0] || null, caro: arr[arr.length - 1] || null };
  };
  const ceV = cheapExp("Venda"), ceA = cheapExp("Aluguel");

  const infoBar = "Cada barra é uma quadra. O comprimento representa " + metric.un +
    ". A barra verde é a quadra " + quadra + ". Comparamos com a quadra anterior e a próxima (por número) e com a média de todas as quadras (" +
    (globalMed != null ? metric.fmt(globalMed) : "—") + "). Quanto mais à direita, maior o valor.";

  const posTxt = myRank
    ? "A quadra " + quadra + " ocupa a " + ord(myRank.rank) + " posição entre " + total + " quadras em " + metric.label.toLowerCase() +
      " (" + metric.fmt(myRank.value) + "). " + (globalMed != null
        ? "A média de todas as quadras é " + metric.fmt(globalMed) + " — esta quadra está " +
          (myRank.value >= globalMed ? "acima" : "abaixo") + " da média em " + pctTxt(((myRank.value - globalMed) / globalMed) * 100) + "."
        : "")
    : "Sem valor para este critério nesta quadra.";

  return (
    <div>
      <div className="anBlock">
        <h3>Perfil da quadra {quadra} <span style={{ color: "var(--muted)", fontWeight: 500 }}>· {me.regiao} · {me.nTotal} ativos</span></h3>
        <p className="anHint">Valores calculados sobre anúncios ativos das fontes selecionadas.</p>
        <TripletCards title="Venda" s={me.venda.preco} sm2={me.venda.m2} />
        <TripletCards title="Aluguel" s={me.aluguel.preco} sm2={me.aluguel.m2} />
        <div className="anGrid" style={{ marginTop: "4px" }}>
          <MiniStat k="Venda — mais barato" v={ceV.barato ? fmtBRL(ceV.barato.preco) : "—"} s={ceV.barato ? ceV.barato.quadra : ""} />
          <MiniStat k="Venda — mais caro"   v={ceV.caro ? fmtBRL(ceV.caro.preco) : "—"} s={ceV.caro ? ceV.caro.quadra : ""} />
          <MiniStat k="Aluguel — mais barato" v={ceA.barato ? fmtBRL(ceA.barato.preco) : "—"} s={ceA.barato ? ceA.barato.quadra : ""} />
          <MiniStat k="Aluguel — mais caro"   v={ceA.caro ? fmtBRL(ceA.caro.preco) : "—"} s={ceA.caro ? ceA.caro.quadra : ""} />
        </div>
      </div>

      <div className="anBlock">
        <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap", marginBottom: "10px" }}>
          <b style={{ fontSize: "14px" }}>Comparar com vizinhas e média geral</b>
          <div style={{ flex: 1 }}></div>
          <Select size="sm" value={metricKey} onChange={(e) => setMetricKey(e.target.value)}
            options={METRICS.map((m) => ({ value: m.key, label: m.label }))} />
        </div>
        <div className="readOut" style={{ marginBottom: "12px" }}>{posTxt}</div>
        <BarsH items={barItems} fmt={metric.fmt} title={metric.label} info={infoBar} />
        <div className="anHint" style={{ marginTop: "8px" }}>
          Vizinhas de {quadra}: {nb.anterior ? nb.anterior.quadra : "—"} (anterior) e {nb.proxima ? nb.proxima.quadra : "—"} (próxima).
        </div>
      </div>
    </div>
  );
}

/* ================= ABA "QUADRAS": ranking + seleção ================= */
function QuadrasView({ data, onOpenImovel }) {
  const [metricKey, setMetricKey] = React.useState("venda_med");
  const [dir, setDir] = React.useState("desc");
  const [regiao, setRegiao] = React.useState("Todas");
  const [sel, setSel] = React.useState(null);
  const [busca, setBusca] = React.useState("");

  const statsAll = React.useMemo(() => buildQuadraStats(data), [data]);
  const metric = metricByKey(metricKey);
  const listReg = regiao === "Todas" ? statsAll : statsAll.filter((q) => q.regiao === regiao);
  const ranked = React.useMemo(() => rankQuadras(listReg, metric, dir), [listReg, metric, dir]);
  const filtered = ranked.filter((x) => x.q.quadra.toLowerCase().includes(busca.toLowerCase()));
  const values = ranked.map((x) => x.value);
  const media = values.length ? values.reduce((a, b) => a + b, 0) / values.length : null;

  const infoRank = "A lista mostra todas as quadras ordenadas por “" + metric.label + "”. A coluna Posição é o ranking (1 = " +
    (dir === "desc" ? "maior" : "menor") + " valor). O valor de cada quadra é " + metric.un +
    ". Troque o critério ou a ordem (maior/menor) para reorganizar. Clique numa quadra para ver o perfil completo.";

  return (
    <div>
      <div className="anBlock">
        <h3>Ranking de quadras</h3>
        <p className="anHint">Escolha o critério: a lista se reorganiza e mostra a posição de cada quadra. {statsAll.length} quadras com anúncios ativos.</p>
        <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", alignItems: "center", marginBottom: "12px" }}>
          <Select size="sm" value={metricKey} onChange={(e) => setMetricKey(e.target.value)}
            options={METRICS.map((m) => ({ value: m.key, label: m.label }))} />
          <Segmented size="sm" value={dir} onChange={setDir}
            options={[{ value: "desc", label: "Maior primeiro" }, { value: "asc", label: "Menor primeiro" }]} />
          <Segmented size="sm" value={regiao} onChange={setRegiao}
            options={[{ value: "Todas", label: "Todas" }, { value: "Asa Norte", label: "Asa Norte" }, { value: "Asa Sul", label: "Asa Sul" }]} />
          <Input size="sm" placeholder="buscar quadra…" value={busca} onChange={(e) => setBusca(e.target.value)} style={{ maxWidth: "150px" }} />
          <div style={{ flex: 1 }}></div>
          <InfoTip text={infoRank} />
        </div>
        <div style={{ overflowX: "auto" }}>
          <table className="rankTable">
            <thead>
              <tr>
                <th style={{ width: "60px" }}>Posição</th>
                <th>Quadra</th>
                <th>Região</th>
                <th className="num">{metric.label}</th>
                <th className="num">vs média</th>
                <th className="num">Ativos</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((x) => {
                const vsm = media ? ((x.value - media) / media) * 100 : null;
                return (
                  <tr key={x.q.quadra} className={"clickRow" + (sel === x.q.quadra ? " selRow" : "")} onClick={() => setSel(x.q.quadra)}>
                    <td><span className={"rankPos" + (x.rank <= 3 ? " top" : "")}>{x.rank}</span></td>
                    <td><b>{x.q.quadra}</b></td>
                    <td>{x.q.regiao}</td>
                    <td className="num">{metric.fmt(x.value)}</td>
                    <td className="num" style={{ color: vsm == null ? "var(--muted)" : vsm > 0 ? "var(--bad)" : vsm < 0 ? "var(--good)" : "var(--muted)" }}>{pctTxt(vsm)}</td>
                    <td className="num">{x.q.nTotal}</td>
                  </tr>
                );
              })}
              {filtered.length === 0 ? <tr><td colSpan={6} style={{ textAlign: "center", color: "var(--muted)", padding: "20px" }}>Nenhuma quadra.</td></tr> : null}
            </tbody>
          </table>
        </div>
        <div className="anHint" style={{ marginTop: "8px" }}>Média do critério entre as quadras listadas: <b>{media != null ? metric.fmt(media) : "—"}</b>.</div>
      </div>

      {sel ? <QuadraProfile quadra={sel} statsAll={statsAll} allData={data} onOpenImovel={onOpenImovel} /> : (
        <div className="anBlock" style={{ textAlign: "center", color: "var(--muted)" }}>Selecione uma quadra na lista para ver o perfil completo, vizinhas e gráficos.</div>
      )}
    </div>
  );
}

/* ================= PERFIL DE UM IMÓVEL (usado dentro do modal) ================= */
function ImovelProfile({ imovel: r, data }) {
  const statsAll = React.useMemo(() => buildQuadraStats(data), [data]);
  const [escopo, setEscopo] = React.useState("quadra"); /* quadra | todas | especifica */
  const [quadraEsc, setQuadraEsc] = React.useState(r.quadraBase);
  const tipo = r.tipo;

  const rowsDo = (pred) => data.filter((x) => x.ativo !== false && pred(x));
  const scopeRows =
    escopo === "todas" ? rowsDo(() => true) :
    escopo === "especifica" ? rowsDo((x) => x.quadraBase === quadraEsc) :
    rowsDo((x) => x.quadraBase === r.quadraBase);
  const sb = statsBlock(scopeRows);
  const sPreco = tipo === "Venda" ? sb.venda.preco : sb.aluguel.preco;
  const sM2 = tipo === "Venda" ? sb.venda.m2 : sb.aluguel.m2;

  const vP = verdictVs(r.preco, sPreco && sPreco.med);
  const vM = verdictVs(r.precoM2, sM2 && sM2.med);

  /* posição do imóvel dentro da própria quadra (mesmo tipo) */
  const naQuadra = data.filter((x) => x.ativo !== false && x.quadraBase === r.quadraBase && x.tipo === tipo && x.preco != null)
    .sort((a, b) => b.preco - a.preco);
  const posQuadra = naQuadra.findIndex((x) => x.id === r.id) + 1;

  const escopoNome = escopo === "todas" ? "todas as quadras" : escopo === "especifica" ? ("a quadra " + quadraEsc) : ("a quadra " + r.quadraBase);
  const quadrasOptions = [...new Set(data.filter((x) => x.quadraBase).map((x) => x.quadraBase))].sort().map((q) => ({ value: q, label: q }));

  const leituraPreco = (r.preco == null)
    ? "Este anúncio está sem preço divulgado (sob consulta), então não é possível posicioná-lo na faixa de preço. As comparações abaixo usam o que há disponível."
    : sPreco
    ? "Este imóvel custa " + fmtBRL(r.preco) + ". Em " + escopoNome + ", o preço de " + tipo.toLowerCase() +
      " varia de " + fmtBRL(sPreco.min) + " a " + fmtBRL(sPreco.max) + ", com média de " + fmtBRL(sPreco.med) + " (" + sPreco.n + " anúncios). " +
      "Ele está " + (vP.label) + (vP.pct != null ? " (" + pctTxt(vP.pct) + " frente à média, ou " + fmtBRL(Math.abs(vP.diff)) + " " + (vP.diff >= 0 ? "a mais" : "a menos") + ")" : "") + "."
    : "Sem base de comparação de preço em " + escopoNome + ".";
  const leituraM2 = sM2
    ? "Em R$/m², este imóvel está a " + fmtBRL2(r.precoM2) + ". A faixa em " + escopoNome + " vai de " + fmtBRL2(sM2.min) + " a " + fmtBRL2(sM2.max) +
      " (média " + fmtBRL2(sM2.med) + "). Ele está " + vM.label + (vM.pct != null ? " (" + pctTxt(vM.pct) + ")" : "") + "."
    : "Sem base de comparação de R$/m² em " + escopoNome + ".";
  const leituraPos = posQuadra > 0
    ? "Dentro da própria quadra (" + r.quadraBase + "), é o " + ord(posQuadra) + " mais caro dos " + naQuadra.length + " imóveis de " + tipo.toLowerCase() + " ativos."
    : "";

  /* vizinhas: média de preço do mesmo tipo */
  const nb = neighborsOf(r.quadraBase, statsAll);
  const medPreco = (q) => q ? (tipo === "Venda" ? (q.venda.preco && q.venda.preco.med) : (q.aluguel.preco && q.aluguel.preco.med)) : null;
  const barItems = [];
  if (nb.anterior) barItems.push({ label: nb.anterior.quadra, value: medPreco(nb.anterior) });
  barItems.push({ label: r.quadraBase + " (esta)", value: sPreco ? sPreco.med : null, highlight: false });
  if (nb.proxima) barItems.push({ label: nb.proxima.quadra, value: medPreco(nb.proxima) });
  const barItemsComEste = (r.preco != null ? [{ label: "ESTE imóvel", value: r.preco, highlight: true }] : []).concat(barItems.filter((b) => b.value != null));

  const infoRange = "A linha vai do imóvel mais barato (mín) ao mais caro (máx) de " + escopoNome + " para " + tipo.toLowerCase() +
    ". O ponto verde é ESTE imóvel (" + fmtBRL(r.preco) + "). Se estiver à esquerda da média, é mais barato que o típico; à direita, mais caro.";
  const infoBars = "Comparação do preço deste imóvel (barra verde) com a média de " + tipo.toLowerCase() + " da sua quadra e das quadras vizinhas. Barras maiores = preços maiores.";

  return (
    <div className="crm">
      <h3>Perfil e comparação deste imóvel</h3>
      <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap", marginBottom: "10px" }}>
        <span style={{ color: "var(--muted)", fontSize: "12.5px" }}>Comparar com:</span>
        <Segmented size="sm" value={escopo} onChange={setEscopo}
          options={[{ value: "quadra", label: "Própria quadra" }, { value: "todas", label: "Todas as quadras" }, { value: "especifica", label: "Outra quadra" }]} />
        {escopo === "especifica" ? (
          <Select size="sm" value={quadraEsc} onChange={(e) => setQuadraEsc(e.target.value)} options={quadrasOptions} />
        ) : null}
      </div>

      <div style={{ display: "flex", gap: "8px", flexWrap: "wrap", marginBottom: "10px" }}>
        <span className={"verdict " + vP.cls}>Preço: {vP.label}</span>
        <span className={"verdict " + vM.cls}>R$/m²: {vM.label}</span>
        {posQuadra > 0 ? <span className="pill">{ord(posQuadra)} mais caro de {naQuadra.length} na quadra</span> : null}
      </div>

      <div className="readOut">{leituraPreco}</div>
      <div className="readOut">{leituraM2}</div>
      {leituraPos ? <div className="readOut">{leituraPos}</div> : null}

      {sPreco && r.preco != null ? (
        <div style={{ marginTop: "14px" }}>
          <RangePos min={sPreco.min} med={sPreco.med} max={sPreco.max} value={r.preco} fmt={fmtBRL}
            title={"Onde este imóvel está na faixa de preço (" + escopoNome + ")"} info={infoRange} />
        </div>
      ) : null}

      {barItemsComEste.length > 1 ? (
        <div style={{ marginTop: "16px" }}>
          <BarsH items={barItemsComEste} fmt={fmtBRL} title={"Este imóvel vs. média das quadras vizinhas (" + tipo.toLowerCase() + ")"} info={infoBars} />
        </div>
      ) : null}
    </div>
  );
}

Object.assign(window, { QuadrasView, ImovelProfile, buildQuadraStats, InfoTip, BarsH, RangePos });
</script>
<script type="text/babel">
/* ============================================================================================
   AGENDA DE VISITAS  —  armazenada no Supabase (tabela public.agendamentos), editável e
   visível em qualquer dispositivo. Abre no dia atual; navega para passado e futuro.
============================================================================================ */
const TIPOS_CONTATO = ["Corretor", "Proprietário", "Imobiliária", "Outro"];
const STATUS_AG = ["Agendada", "Concluída", "Cancelada"];
const pad2 = (n) => String(n).padStart(2, "0");
const dateKey = (d) => d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
const parseWhen = (iso) => new Date(iso);
const horaStr = (d) => pad2(d.getHours()) + ":" + pad2(d.getMinutes());
const diaTitulo = (d) => d.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });
const pillClass = (t) => t === "Corretor" ? "pill corretor" : t === "Proprietário" ? "pill proprietario" : t === "Imobiliária" ? "pill imobiliaria" : "pill";

function AgendaForm({ user, data, editing, dayKey, onClose, onSaved, onToast }) {
  const ini = editing || {};
  const iniWhen = ini.quando ? parseWhen(ini.quando) : null;
  const [dataV, setDataV] = React.useState(iniWhen ? dateKey(iniWhen) : dayKey);
  const [hora, setHora] = React.useState(iniWhen ? horaStr(iniWhen) : "10:00");
  const [titulo, setTitulo] = React.useState(ini.titulo || "");
  const [nome, setNome] = React.useState(ini.contato_nome || "");
  const [ctipo, setCtipo] = React.useState(ini.contato_tipo || "Corretor");
  const [tel, setTel] = React.useState(ini.contato_telefone || "");
  const [local, setLocal] = React.useState(ini.local || "");
  const [desc, setDesc] = React.useState(ini.descricao || "");
  const [status, setStatus] = React.useState(ini.status || "Agendada");
  const [busca, setBusca] = React.useState("");
  const [imovel, setImovel] = React.useState(ini.imovel_id ? { id: ini.imovel_id, quadra: ini.imovel_quadra, link: ini.imovel_link } : null);
  const [saving, setSaving] = React.useState(false);

  const matches = busca.trim().length >= 2
    ? data.filter((r) => (r.quadra + " " + r.id + " " + (r.preco || "")).toLowerCase().includes(busca.toLowerCase())).slice(0, 8)
    : [];

  const salvar = async () => {
    if (!dataV || !hora) { onToast("Informe data e hora."); return; }
    const [Y, M, D] = dataV.split("-").map(Number);
    const [h, mi] = hora.split(":").map(Number);
    const quando = new Date(Y, M - 1, D, h, mi).toISOString();
    const payload = {
      user_id: user.id, usuario_email: user.email, quando,
      titulo: titulo || null, contato_nome: nome || null, contato_tipo: ctipo || null,
      contato_telefone: tel || null, local: local || null, descricao: desc || null, status,
      imovel_id: imovel ? imovel.id : null, imovel_quadra: imovel ? imovel.quadra : null, imovel_link: imovel ? imovel.link : null,
      atualizado_em: new Date().toISOString(),
    };
    setSaving(true);
    try {
      let error;
      if (editing && editing.id) ({ error } = await window.sb.from("agendamentos").update(payload).eq("id", editing.id));
      else ({ error } = await window.sb.from("agendamentos").insert(payload));
      if (error) throw error;
      onToast(editing ? "Agendamento atualizado" : "Agendamento criado");
      onSaved();
    } catch (e) { onToast("Erro ao salvar: " + (e && e.message ? e.message : e)); }
    finally { setSaving(false); }
  };

  return (
    <div className="modalBg" onClick={(e) => { if (e.target.classList.contains("modalBg")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true" style={{ maxWidth: "560px" }}>
        <div className="mhead">
          <h2 style={{ fontSize: "18px" }}>{editing ? "Editar agendamento" : "Novo agendamento"}</h2>
          <button className="xBtn" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="mbody">
          <div className="crmGrid">
            <Input label="Data" type="date" value={dataV} onChange={(e) => setDataV(e.target.value)} />
            <Input label="Hora" type="time" value={hora} onChange={(e) => setHora(e.target.value)} />
            <Input label="Nome de quem vamos falar" value={nome} onChange={(e) => setNome(e.target.value)} />
            <Select label="Tipo de contato" value={ctipo} onChange={(e) => setCtipo(e.target.value)} options={TIPOS_CONTATO} />
            <Input label="Telefone / WhatsApp" value={tel} onChange={(e) => setTel(e.target.value)} />
            <Select label="Status" value={status} onChange={(e) => setStatus(e.target.value)} options={STATUS_AG} />
            <Input label="Local (endereço do encontro)" value={local} onChange={(e) => setLocal(e.target.value)} />
            <Input label="Título (opcional)" value={titulo} onChange={(e) => setTitulo(e.target.value)} />
          </div>
          <label className="areaLbl">Observações
            <textarea rows="3" value={desc} onChange={(e) => setDesc(e.target.value)}></textarea>
          </label>

          <div style={{ marginTop: "10px" }}>
            <div style={{ fontWeight: 700, fontSize: "13px", marginBottom: "6px" }}>Imóvel vinculado</div>
            {imovel ? (
              <div style={{ display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" }}>
                <span className="pill">{imovel.quadra || imovel.id}</span>
                {imovel.link ? <a href={imovel.link} target="_blank" rel="noopener" className="tBtn">abrir anúncio ↗</a> : null}
                <button className="tBtn" onClick={() => setImovel(null)}>remover</button>
              </div>
            ) : (
              <div>
                <Input size="sm" placeholder="buscar por quadra, preço ou id…" value={busca} onChange={(e) => setBusca(e.target.value)} />
                {matches.length ? (
                  <div style={{ border: "1px solid var(--line)", borderRadius: "10px", marginTop: "6px", overflow: "hidden" }}>
                    {matches.map((r) => (
                      <div key={r.id} className="clickRow" style={{ padding: "8px 10px", borderBottom: "1px solid var(--line)", cursor: "pointer", fontSize: "13px" }}
                        onClick={() => { setImovel({ id: r.id, quadra: r.quadra, link: r.link }); setBusca(""); }}>
                        <b>{fmtBRL(r.preco)}</b> · {r.quadra} · {r.tipo} · {r.origem}
                      </div>
                    ))}
                  </div>
                ) : null}
              </div>
            )}
          </div>

          <div className="savebar" style={{ marginTop: "14px" }}>
            <Button onClick={salvar} disabled={saving}>{saving ? "Salvando…" : (editing ? "Salvar alterações" : "Criar agendamento")}</Button>
            <Button variant="outline" onClick={onClose}>Cancelar</Button>
          </div>
        </div>
      </div>
    </div>
  );
}

function AgendaView({ user, data, onOpenImovel, onToast }) {
  const [agenda, setAgenda] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [day, setDay] = React.useState(() => { const d = new Date(); d.setHours(0, 0, 0, 0); return d; });
  const [modo, setModo] = React.useState("dia"); /* dia | lista */
  const [form, setForm] = React.useState(null); /* null | {} (novo) | registro (editar) */

  const load = React.useCallback(async () => {
    setLoading(true);
    try {
      const { data: rows, error } = await window.sb.from("agendamentos").select("*").order("quando", { ascending: true });
      if (error) throw error;
      setAgenda(rows || []);
    } catch (e) { onToast("Erro ao carregar agenda: " + (e && e.message ? e.message : e)); }
    finally { setLoading(false); }
  }, [onToast]);
  React.useEffect(() => { load(); }, [load]);

  const excluir = async (rec) => {
    if (!window.confirm("Excluir este agendamento?")) return;
    try {
      const { error } = await window.sb.from("agendamentos").delete().eq("id", rec.id);
      if (error) throw error;
      onToast("Agendamento excluído"); load();
    } catch (e) { onToast("Erro ao excluir: " + (e && e.message ? e.message : e)); }
  };

  const addDays = (n) => { const d = new Date(day); d.setDate(d.getDate() + n); setDay(d); };
  const chave = dateKey(day);
  const doDia = agenda.filter((a) => a.quando && dateKey(parseWhen(a.quando)) === chave)
    .sort((a, b) => new Date(a.quando) - new Date(b.quando));
  const futuros = agenda.filter((a) => a.quando).sort((a, b) => new Date(a.quando) - new Date(b.quando));
  const imovelById = (id) => data.find((r) => r.id === id);

  const renderItem = (a) => {
    const w = parseWhen(a.quando);
    const cls = a.status === "Concluída" ? " done" : a.status === "Cancelada" ? " cancel" : "";
    const im = a.imovel_id ? imovelById(a.imovel_id) : null;
    const meu = a.user_id === user.id;
    return (
      <div className={"agItem" + cls} key={a.id}>
        <div className="agTime">{horaStr(w)}</div>
        <div className="agBody">
          <div className="ag-t">{a.titulo || (a.imovel_quadra ? ("Visita — " + a.imovel_quadra) : "Visita")}</div>
          <div className="ag-m">
            {a.contato_nome ? <><b>{a.contato_nome}</b>{a.contato_telefone ? " · " + a.contato_telefone : ""}</> : "Sem contato informado"}
            {a.local ? <> · {a.local}</> : null}
          </div>
          {a.descricao ? <div className="ag-m">{a.descricao}</div> : null}
          <div className="agTagRow">
            {a.contato_tipo ? <span className={pillClass(a.contato_tipo)}>{a.contato_tipo}</span> : null}
            <span className="pill">{a.status || "Agendada"}</span>
            <span className="pill">agendou: {window.emailPrefix(a.usuario_email || "")}</span>
            {a.imovel_link ? <a href={a.imovel_link} target="_blank" rel="noopener" className="tBtn">anúncio ↗</a> : null}
          </div>
        </div>
        <div className="agActions">
          {im ? <button className="tBtn" onClick={() => onOpenImovel(a.imovel_id)}>ver imóvel + análise</button> : null}
          {meu ? <button className="tBtn" onClick={() => setForm(a)}>editar</button> : null}
          {meu ? <button className="tBtn" onClick={() => excluir(a)}>excluir</button> : null}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="anBlock">
        <div className="agHead">
          <Segmented size="sm" value={modo} onChange={setModo}
            options={[{ value: "dia", label: "Por dia" }, { value: "lista", label: "Todos (lista)" }]} />
          {modo === "dia" ? (
            <>
              <Button size="sm" variant="outline" onClick={() => addDays(-1)}>‹ dia anterior</Button>
              <Button size="sm" variant="outline" onClick={() => { const d = new Date(); d.setHours(0, 0, 0, 0); setDay(d); }}>Hoje</Button>
              <Button size="sm" variant="outline" onClick={() => addDays(1)}>próximo dia ›</Button>
              <Input size="sm" type="date" value={chave} onChange={(e) => { const [Y, M, D] = e.target.value.split("-").map(Number); setDay(new Date(Y, M - 1, D)); }} />
            </>
          ) : null}
          <div style={{ flex: 1 }}></div>
          <Button size="sm" onClick={() => setForm({})}>+ Novo agendamento</Button>
        </div>
        {modo === "dia" ? <div className="agDayTitle">{diaTitulo(day)}</div> : <div className="agDayTitle">Todos os agendamentos</div>}
      </div>

      {loading ? <div className="anBlock agEmpty">Carregando agenda…</div> : (
        modo === "dia" ? (
          doDia.length ? <div>{doDia.map(renderItem)}</div> : <div className="anBlock agEmpty">Nenhum agendamento neste dia. Use “+ Novo agendamento”.</div>
        ) : (
          futuros.length ? (
            <div>{(() => {
              let ultimaData = null; const out = [];
              futuros.forEach((a) => {
                const dk = dateKey(parseWhen(a.quando));
                if (dk !== ultimaData) { ultimaData = dk; out.push(<div key={"h" + dk} className="agDayTitle" style={{ margin: "14px 0 8px" }}>{diaTitulo(parseWhen(a.quando))}</div>); }
                out.push(renderItem(a));
              });
              return out;
            })()}</div>
          ) : <div className="anBlock agEmpty">Nenhum agendamento cadastrado ainda.</div>
        )
      )}

      {form ? <AgendaForm user={user} data={data} editing={form.id ? form : null} dayKey={chave}
        onClose={() => setForm(null)} onSaved={() => { setForm(null); load(); }} onToast={onToast} /> : null}
    </div>
  );
}

Object.assign(window, { AgendaView });
</script>
<script type="text/babel">
/* ============================================================================================
   TELAS NOVAS · v3 — Oportunidades (+ modal de metodologia), Sugestões (+ modal do algoritmo),
   Atividade (interações por tipo) e barra de ações em massa.
============================================================================================ */
/* fmtBRL / fmtBRL2 / pctS / dtBR já existem no escopo global (bloco "NÚCLEO VISUAL"). Não
   redeclarar: const/let de nível de topo são compartilhados entre TODAS as tags <script> da
   página — uma redeclaração quebra (SyntaxError) o bloco inteiro, silenciosamente. */

/* ---------- modal genérico de texto ---------- */
function TextModal({ title, onClose, children }) {
  return (
    <div className="modalBg" onClick={(e) => { if (e.target.classList.contains("modalBg")) onClose(); }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="mhead">
          <div><h2 style={{ fontSize: "18px" }}>{title}</h2></div>
          <button className="xBtn" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="mbody methodBody">{children}</div>
      </div>
    </div>
  );
}

/* ---------- METODOLOGIA DO SCORE DE OPORTUNIDADE (completa, direta, sem omitir nada) ---------- */
function MethodologyModal({ onClose }) {
  const C = window.OPP_CFG;
  return (
    <TextModal title="Como o score de oportunidade é calculado" onClose={onClose}>
      <p><b>Objetivo:</b> encontrar apartamentos <b>bons e baratos</b> — pagar abaixo do que a localização e o
        padrão do imóvel justificam, sem cair em anúncios com dados errados.</p>

      <h4>1. Quem entra na avaliação</h4>
      <ul>
        <li>Apenas anúncios <b>ativos</b>, com <b>preço</b> e <b>metragem</b> válidos (logo, com R$/m² calculável) e com quadra identificada.</li>
        <li>Venda e Aluguel são avaliados <b>separadamente</b> — um nunca serve de referência para o outro.</li>
        <li>É preciso existir pelo menos <b>uma</b> base de comparação (quadra, vizinhas ou região). Sem base, não há score.</li>
      </ul>

      <h4>2. As três referências de preço (sempre em R$/m², sempre pela mediana)</h4>
      <p>Usamos a <b>mediana</b>, e não a média, porque um único anúncio com preço absurdo distorce a média,
        mas quase não move a mediana.</p>
      <ol>
        <li><b>Mediana da própria quadra</b> — só conta se a quadra tiver pelo menos {C.minComparaveisQuadra} anúncios ativos do mesmo tipo.</li>
        <li><b>Mediana das quadras vizinhas</b> — mesmo prefixo (SQN, SQS…) e numeração a até 2 de distância
          (ex.: para a SQN&nbsp;316, as vizinhas são SQN&nbsp;314, 315, 317 e 318). A mediana é ponderada pelo número
          de anúncios de cada vizinha e só conta com pelo menos {C.minComparaveisVizinhas} anúncios somados.</li>
        <li><b>Mediana da região</b> (Asa Norte ou Asa Sul) — sempre disponível, é a rede de segurança quando as bases locais são fracas.</li>
      </ol>
      <p>Para cada referência disponível calcula-se o <b>desconto</b>:</p>
      <div className="formula">desconto = (mediana de referência − R$/m² do imóvel) ÷ mediana de referência</div>
      <p>Os descontos são combinados numa média ponderada, com pesos {Math.round(C.pesoQuadra * 100)}% (quadra),
        {" "}{Math.round(C.pesoVizinhas * 100)}% (vizinhas) e {Math.round(C.pesoRegiao * 100)}% (região). Se alguma
        referência não existir, os pesos restantes são renormalizados — o imóvel nunca é punido por falta de dados dos outros.</p>

      <h4>3. Pontuação (total = 100 pontos)</h4>
      <ul>
        <li><b>Preço vs referências — até 55 pts.</b> O desconto ponderado é convertido linearmente em pontos:
          0% de desconto = 0 pts; {Math.round(C.descontoTeto * 100)}% ou mais = 55 pts.
          <div className="formula">pontos = mín(desconto ÷ {C.descontoTeto.toString().replace(".", ",")} ; 1) × 55</div></li>
        <li><b>Oferta e base de comparação na quadra — até 10 pts.</b> De 3 a 10 anúncios ativos na quadra = 10 pts
          (base estatística sólida e oferta não inflada); mais de 10 = 5 pts (muita concorrência entre vendedores,
          o "desconto" pode ser só o mercado local mais fraco); menos de 3 = 0 pts (a comparação local é frágil e o
          score passa a depender das vizinhas/região).</li>
        <li><b>Queda de preço registrada — até 15 pts.</b> O robô guarda toda mudança de preço. Queda acumulada de
          8% ou mais = 15 pts; de 4% a 8% = 10 pts; qualquer queda = 5 pts. Vendedor que já baixou o preço tende a negociar.</li>
        <li><b>Qualidade do imóvel — até 12 pts.</b> Vaga de garagem (+5), 3+ quartos (+4) ou 2 quartos (+2),
          suíte (+1), não ser térreo (+2). São os atributos que mais protegem valor de revenda no Plano Piloto.</li>
        <li><b>Tempo de anúncio — até 8 pts.</b> Até 7 dias no ar = 8 pts (barato e novo sai rápido — agir logo);
          60+ dias = 5 pts (anúncio parado abre espaço para proposta agressiva); entre os dois = 2 pts.</li>
      </ul>

      <h4>4. Trava de segurança contra dados errados</h4>
      <p>Se o desconto for de {Math.round(C.limiteSuspeito * 100)}% ou mais frente a <b>todas</b> as referências
        disponíveis, o imóvel é rebaixado para <b>"Verificar dados"</b> (score travado abaixo de 40). Na prática,
        desconto desse tamanho quase sempre é erro de digitação (um zero a menos, metragem errada) ou situação
        atípica (leilão, fração ideal, imóvel ocupado). Ele continua listado — vale conferir — mas não polui o topo.</p>

      <h4>5. Classificação</h4>
      <ul>
        <li><b>70 a 100 — Excelente:</b> desconto real e relevante, com contexto favorável. Prioridade de visita.</li>
        <li><b>55 a 69 — Boa:</b> abaixo do mercado local; vale contatar e entender o motivo do preço.</li>
        <li><b>40 a 54 — Observar:</b> levemente abaixo da referência; monitorar quedas de preço.</li>
        <li>Abaixo de 40 o imóvel não aparece na aba Oportunidades (mas o score continua visível no detalhe de qualquer imóvel).</li>
      </ul>

      <h4>6. O que o score NÃO enxerga</h4>
      <p>Estado de conservação, andar real quando o anúncio não informa, reformas, vista, orientação solar,
        situação do condomínio e documentação. Por isso o score <b>ordena a fila de investigação</b> — a decisão
        continua sendo de vocês, depois da visita.</p>
    </TextModal>
  );
}

/* ---------- EXPLICAÇÃO DO ALGORITMO DE SUGESTÕES ---------- */
function AlgorithmModal({ onClose }) {
  const C = window.SIM_CFG;
  return (
    <TextModal title="Como as sugestões são geradas" onClose={onClose}>
      <p>O algoritmo aprende o <b>perfil do pool</b>: cada imóvel que vocês marcaram com ♥ vira uma referência,
        e o sistema procura, entre os anúncios ativos, os que mais se parecem com cada referência.</p>
      <h4>Quem pode ser sugerido</h4>
      <ul>
        <li>Anúncios <b>ativos</b>, da <b>mesma operação</b> (Venda com Venda, Aluguel com Aluguel);</li>
        <li>que <b>ainda não estão no pool</b> e que <b>ninguém marcou como sem interesse</b>.</li>
      </ul>
      <h4>Nota de semelhança (0–100)</h4>
      <p>Cada característica contribui com um peso; a soma dá a nota:</p>
      <ul>
        <li><b>Preço — {C.pesoPreco} pts:</b> nota cheia se igual, caindo linearmente até zerar quando a diferença chega a {Math.round(C.escalaPreco * 100)}% do preço da referência.</li>
        <li><b>Metragem — {C.pesoM2} pts:</b> mesma lógica, tolerância de {Math.round(C.escalaM2 * 100)}%.</li>
        <li><b>R$/m² — {C.pesoPm2} pts:</b> tolerância de {Math.round(C.escalaPm2 * 100)}%.</li>
        <li><b>Localização — {C.pesoLocal} pts:</b> mesma quadra = 100% do peso; quadra vizinha (mesmo prefixo, até 2 números de distância) = 80%; mesma asa = 55%; outra asa = 20%.</li>
        <li><b>Quartos — {C.pesoQuartos} pts</b> e <b>vagas — {C.pesoVagas} pts:</b> quantidade igual = peso cheio; diferença de 1 = 45%; diferença maior = 0.</li>
        <li><b>Suítes — {C.pesoSuites} pts</b> e <b>faixa de andar — {C.pesoAndar} pts</b> (térreo / 1º–2º / 3º+ / cobertura): igual = cheio, faixa adjacente = metade.</li>
        <li>Dado ausente no anúncio conta como semelhança neutra (50% do peso) — nem premia, nem elimina.</li>
      </ul>
      <h4>Corte e apresentação</h4>
      <ul>
        <li>Só entram sugestões com nota <b>≥ {C.corte}</b>; cada sugestão mostra <b>por que</b> foi feita:
          o(s) imóvel(is) do pool que a motivaram e a nota de semelhança com cada um.</li>
        <li>A lista traz no máximo {C.maxSugestoes} sugestões, ordenadas da mais parecida para a menos parecida,
          e se reconstrói na hora sempre que o pool muda.</li>
      </ul>
    </TextModal>
  );
}

/* ---------- BARRA DE AÇÕES EM MASSA ---------- */
function BulkBar({ selCount, totalFiltered, onSelAll, onClear, onBulk, busy }) {
  return (
    <div className="bulkBar">
      <b>{selCount}</b>&nbsp;selecionado(s)
      <button className="bulkBtn" onClick={onSelAll} disabled={busy}>Selecionar todos os {totalFiltered} filtrados</button>
      <button className="bulkBtn" onClick={onClear} disabled={busy}>Limpar seleção</button>
      <span className="bulkSpacer"></span>
      <button className="bulkBtn danger" onClick={() => onBulk("semInteresse", true)} disabled={busy || !selCount}>✕ Sem interesse</button>
      <button className="bulkBtn" onClick={() => onBulk("semInteresse", false)} disabled={busy || !selCount}>desfazer</button>
      <button className="bulkBtn" onClick={() => onBulk("visualizado", true)} disabled={busy || !selCount}>👁 Visualizado</button>
      <button className="bulkBtn ok" onClick={() => onBulk("pool", true)} disabled={busy || !selCount}>♥ + Pool</button>
      <button className="bulkBtn" onClick={() => onBulk("pool", false)} disabled={busy || !selCount}>– Pool</button>
      {busy ? <span className="selHint">gravando…</span> : null}
    </div>
  );
}

/* ---------- ABA OPORTUNIDADES ---------- */
function OportunidadesView({ filtered, bench, tableProps, onShowMethod }) {
  const opps = React.useMemo(() => window.buildOportunidades(filtered.filter((r) => r.ativo !== false), bench), [filtered, bench]);
  const rows = React.useMemo(() => window.sortRows(opps.map((x) => ({ ...x.r, __score: x.opp.score })), tableProps.sortCol, tableProps.sortDir), [opps, tableProps.sortCol, tableProps.sortDir]);
  const oppById = React.useMemo(() => new Map(opps.map((x) => [x.r.id, x.opp])), [opps]);
  const nExc = opps.filter((x) => x.opp.classe === "Excelente").length;
  const nBoa = opps.filter((x) => x.opp.classe === "Boa").length;
  const nObs = opps.filter((x) => x.opp.classe === "Observar").length;
  const nSus = opps.filter((x) => x.opp.suspeito).length;
  const descMedio = opps.length ? opps.reduce((s, x) => s + x.opp.descontoRef, 0) / opps.length : null;
  return (
    <>
      <div className="topFixed">
        <div className="chipsBar">
          <span className="countLine"><b>{opps.length}</b> oportunidades no escopo filtrado (score ≥ 40)</span>
          <button className="quickBtn" onClick={onShowMethod}>ℹ Como funciona · metodologia completa</button>
        </div>
        <div className="statsGrid">
          <StatCard label="Excelentes (70+)" value={nExc} sub="prioridade de visita" />
          <StatCard label="Boas (55–69)" value={nBoa} sub="vale contatar" />
          <StatCard label="Observar (40–54)" value={nObs} sub="monitorar preço" />
          <StatCard label="Verificar dados" value={nSus} sub="desconto suspeito" />
          <StatCard label="Desconto médio" value={descMedio != null ? (descMedio * 100).toFixed(1).replace(".", ",") + "%" : "—"} sub="vs medianas de referência" />
        </div>
      </div>
      <div className="listCol">
        <ListingTable {...tableProps} rows={rows} scoreOf={(r) => oppById.get(r.id)} />
      </div>
    </>
  );
}

/* ---------- ABA SUGESTÕES ---------- */
function SugestoesView({ data, onOpen, onToggleInteresse, onToggleNoInterest, onShowAlgo }) {
  const sugs = React.useMemo(() => window.buildSugestoes(data), [data]);
  const nPool = data.filter((r) => r.totalInteresse > 0).length;
  if (!nPool) {
    return <div className="anBlock agEmpty" style={{ background: "var(--surface-card)", border: "1px solid var(--line)", borderRadius: "14px", padding: "30px" }}>
      As sugestões nascem do pool de interesse. Adicione pelo menos um imóvel ao pool (botão <b>+ pool</b>) e o
      algoritmo passa a procurar anúncios parecidos automaticamente.</div>;
  }
  return (
    <>
      <div className="topFixed">
        <div className="chipsBar">
          <span className="countLine"><b>{sugs.length}</b> sugestões com base nos <b>{nPool}</b> imóveis do pool dentro do escopo filtrado</span>
          <button className="quickBtn" onClick={onShowAlgo}>ℹ Como o algoritmo escolhe</button>
        </div>
      </div>
      <div className="list" style={{ overflowY: "auto" }}>
        {sugs.map(({ cand: r, sim, refs }) => (
          <div className="sugCard" key={r.id}>
            {r.imagens && r.imagens[0] ? <img className="sugThumb" src={r.imagens[0]} alt="" loading="lazy" onClick={() => onOpen(r.id)} style={{ cursor: "pointer" }} /> : null}
            <div className="sugBody">
              <div className="sugTitle">
                <span className="p">{fmtBRL(r.preco)}</span>
                <Tag kind={r.tipo === "Venda" ? "venda" : "aluguel"}>{r.tipo}</Tag>
                <span className="simBadge">{sim}% parecido</span>
                <StatusIcons r={r} />
              </div>
              <div className="sugSpecs"><b>{r.quadra}</b> · {r.m2 ?? "?"} m² · {fmtBRL2(r.precoM2)}/m² · {r.quartos ?? "?"}q {r.banheiros ?? "?"}b {r.vagas ?? "?"}v · {window.andarLabel(r.andar)}</div>
              <div className="sugWhy">
                Sugeri este porque vocês adicionaram ao pool:{" "}
                {refs.slice(0, 3).map((x, i) => (
                  <span key={x.ref.id}>
                    {i > 0 ? " · " : ""}
                    <span className="lnk" onClick={() => onOpen(x.ref.id)}>{x.ref.quadraBase} — {fmtBRL(x.ref.preco)}</span> ({x.sim}%)
                  </span>
                ))}
                {refs.length > 3 ? " e mais " + (refs.length - 3) : ""}
              </div>
            </div>
            <div className="sugActions">
              <Button size="sm" onClick={() => onToggleInteresse(r.id)}>♥ + pool</Button>
              <Button size="sm" variant="outline" onClick={() => onOpen(r.id)}>detalhes</Button>
              {r.link ? <a className="tBtn" href={r.link} target="_blank" rel="noopener">abrir ↗</a> : null}
              <Button size="sm" variant="ghost" onClick={() => onToggleNoInterest(r.id)}>✕ sem interesse</Button>
            </div>
          </div>
        ))}
        {sugs.length === 0 ? <div className="tEmpty" style={{ background: "var(--surface-card)", border: "1px solid var(--line)", borderRadius: "14px" }}>Nenhum anúncio ativo passou do corte de semelhança ({window.SIM_CFG.corte}%). Adicione mais imóveis ao pool para ampliar o perfil.</div> : null}
      </div>
    </>
  );
}

/* ---------- ABA ATIVIDADE (interações por tipo, clicáveis) ---------- */
function AtividadeView({ data, tableProps }) {
  const [sel, setSel] = React.useState("visualizado");
  const tipos = [
    { k: "visualizado", label: "Visualizados", test: (r) => r.totalVisualizadoPor > 0 },
    { k: "contatado", label: "Contatados", test: (r) => !!r.contatado },
    { k: "visitado", label: "Visitados", test: (r) => !!r.visitado },
    { k: "querVoltar", label: "Quero voltar", test: (r) => !!r.querSegundaVisita },
    { k: "pool", label: "No pool ♥", test: (r) => r.totalInteresse > 0 },
    { k: "semInteresse", label: "Sem interesse", test: (r) => r.totalSemInteresse > 0 },
    { k: "nota", label: "Com nota", test: (r) => r.nota != null },
    { k: "proposta", label: "Com proposta nossa", test: (r) => r.ultimaPropostaValor != null },
    { k: "resposta", label: "Com resposta deles", test: (r) => r.ultimaRespostaValor != null },
    { k: "obs", label: "Com observações", test: (r) => !!r.comentarios },
    { k: "agendado", label: "Com visita agendada", test: (r) => !!r.temAgendamento },
    { k: "qualquer", label: "Qualquer interação", test: (r) => r.totalVisualizadoPor > 0 || r.contatado || r.visitado || r.querSegundaVisita || r.totalInteresse > 0 || r.totalSemInteresse > 0 || r.nota != null || r.ultimaPropostaValor != null || r.ultimaRespostaValor != null || !!r.comentarios || !!r.temAgendamento },
  ];
  const counts = React.useMemo(() => Object.fromEntries(tipos.map((t) => [t.k, data.filter(t.test).length])), [data]);
  const tipo = tipos.find((t) => t.k === sel);
  const rows = React.useMemo(() => window.sortRows(data.filter(tipo.test), tableProps.sortCol, tableProps.sortDir), [data, sel, tableProps.sortCol, tableProps.sortDir]);
  return (
    <>
      <div className="topFixed">
        <div className="chipsBar"><span className="countLine">Tudo que a equipe já fez dentro do escopo filtrado, por tipo de interação — clique num cartão para ver quais são.</span></div>
        <div className="actGrid">
          {tipos.map((t) => (
            <div key={t.k} className={"actCard" + (sel === t.k ? " on" : "")} onClick={() => setSel(t.k)}>
              <div className="n">{counts[t.k]}</div>
              <div className="l">{t.label}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="listCol">
        <ListingTable {...tableProps} rows={rows} />
      </div>
    </>
  );
}

Object.assign(window, { MethodologyModal, AlgorithmModal, BulkBar, OportunidadesView, SugestoesView, AtividadeView, TextModal });
</script>

<script type="text/babel">
/* ============================================================================================
   APP PRINCIPAL · v3 — abas Imóveis · Oportunidades · Sugestões · Pool · Quadras · Atividade ·
   Agenda; filtros facetados (todos reagem entre si), busca livre, seleção em massa, chips,
   ordenação em todas as colunas e modais de detalhe/metodologia/algoritmo.
============================================================================================ */
const FILTER_DEFAULTS = {
  busca: "",
  origens: ["W Imóveis", "DF Imóveis"],
  regioes: ["Asa Norte", "Asa Sul"],
  tipos: ["Venda", "Aluguel"],
  quadras: [],
  ativos: true, inativos: false,
  dias: "",
  precoMin: "", precoMax: "",
  m2Min: "", m2Max: "",
  pm2Min: "", pm2Max: "",
  condMax: "",
  quartos: [], banheiros: [], suites: [], vagas: [], andares: [],
  soCont: false, soNota: false, notaMin: "", soObs: false, soProposta: false,
  soPool: false, soAgendado: false,
  soVisitado: false, soQuerVoltar: false, soComResposta: false,
  soMeuVisualizado: false, visualizadoPor: [],
  mostrarSemInteresse: false, semInteressePor: [],
  soComFoto: false,
  fotos: true,
};

const toggleIn = (arr, v) => (arr.includes(v) ? arr.filter((x) => x !== v) : [...arr, v]);

function NumGroup({ values, selected, onToggle }) {
  return (
    <div className="numGroup">
      {values.map((v) => (
        <button key={v} type="button" className={"numBtn" + (selected.includes(v) ? " on" : "")}
          onClick={() => onToggle(v)}>{v === 4 ? "4+" : v}</button>
      ))}

}
function LabelGroup({ options, selected, onToggle }) {
  return (
    <div className="numGroup">
      {options.map((o) => (

      ))}
